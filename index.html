<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campus Map Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<!-- FIX 1: switched from jsDelivr to unpkg for Tabler Icons (more reliable on Vercel) -->
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#c8860a;--amber-bg:#fdf3dc;--amber-bd:#e8c96a;
  --green:#2d6a3f;--red:#9b2c2c;--blue:#1e40af;
  --bg-primary:#1a1814;--bg-secondary:#232118;--bg-tertiary:#2c2920;
  --bg-panel:#1e1c17;--bg-input:#272420;
  --text-primary:#f0ead8;--text-secondary:#c0b898;--text-tertiary:#6a6050;
  --border-t:rgba(100,88,60,.5);--border-s:rgba(140,120,80,.5);
  --canvas-bg:#e8e3d4;
}
/* FIX 2: robust font-family fallback stack so UI renders even if Google Fonts is slow */
html,body{height:100%;font-family:'Outfit',system-ui,-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg-tertiary);color:var(--text-primary);overflow:hidden}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── NAVBAR (single row, no wrap) ── */
.nav{
  display:flex;align-items:center;gap:6px;
  padding:0 10px;height:48px;
  background:#111009;border-bottom:1.5px solid #2e2a1e;
  flex-shrink:0;overflow:hidden;position:relative;z-index:50
}
.nav-brand{display:flex;align-items:center;gap:7px;flex-shrink:0;margin-right:4px}
.nav-logo{width:28px;height:28px;background:linear-gradient(135deg,#c8860a,#e8a820);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-title{font-size:14px;font-weight:700;color:#f0ead8;letter-spacing:-.2px}
.nav-tag{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#5a5040;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);padding:1px 6px;border-radius:3px}

/* divider */
.nav-div{width:1px;height:24px;background:rgba(255,255,255,.08);flex-shrink:0;margin:0 2px}

/* save badge */
.save-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px;border:1.5px solid;flex-shrink:0;transition:all .2s}

/* icon-only button */
.ibtn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#7a7060;cursor:pointer;transition:all .12s;flex-shrink:0;font-size:14px}
.ibtn:hover{background:rgba(255,255,255,.1);color:#c8c0a8;border-color:rgba(255,255,255,.2)}
.ibtn.active{background:rgba(200,134,10,.18);border-color:#c8860a;color:#e8c96a}
.ibtn:disabled{opacity:.3;cursor:default;pointer-events:none}

/* text button */
.tbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;height:32px;border-radius:5px;font-family:'Outfit',system-ui,sans-serif;font-size:11px;font-weight:600;letter-spacing:.3px;cursor:pointer;border:1.5px solid;transition:all .12s;white-space:nowrap;flex-shrink:0}
.tbtn-ghost{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#7a7060}
.tbtn-ghost:hover{background:rgba(255,255,255,.1);color:#c8c0a8;border-color:rgba(255,255,255,.2)}
.tbtn-active{background:rgba(200,134,10,.15);border-color:#c8860a;color:#e8c96a}
.tbtn-amber{background:#c8860a;border-color:#a06c00;color:#fff}
.tbtn-amber:hover{background:#b07508}
.tbtn-green{background:#1e4a2c;border-color:#166534;color:#86efac}
.tbtn-green:hover{background:#166534}
.tbtn-blue{background:#1e3a8a;border-color:#1e40af;color:#93c5fd}
.tbtn-blue:hover{background:#1e40af}
.tbtn-red{background:rgba(153,27,27,.15);border-color:rgba(153,27,27,.4);color:#fca5a5}
.tbtn-red:hover{background:rgba(153,27,27,.25)}
.tbtn:disabled{opacity:.35;cursor:default;pointer-events:none}

/* mode tabs */
.mode-tabs{display:inline-flex;border:1.5px solid rgba(255,255,255,.1);border-radius:5px;overflow:hidden;flex-shrink:0}
.mtab{padding:4px 10px;height:32px;display:inline-flex;align-items:center;gap:4px;cursor:pointer;border:none;background:transparent;font-family:'Outfit',system-ui,sans-serif;font-size:11px;font-weight:600;color:#6a6050;transition:all .12s;border-right:1px solid rgba(255,255,255,.08)}
.mtab:last-child{border-right:none}
.mtab:hover:not(.on){background:rgba(255,255,255,.06);color:#c8c0a8}
.mtab.on{background:rgba(200,134,10,.15);color:#e8c96a}

.draw-banner{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:5px;border:1.5px solid #c8860a;background:rgba(200,134,10,.1);font-size:11px;font-weight:600;color:#e8c96a;flex-shrink:0}
.fp-draw-banner{border-color:#10b981;background:rgba(16,185,129,.1);color:#6ee7b7}

.nav-sp{flex:1;min-width:0}

/* ── BODY ── */
.body{display:flex;flex:1;overflow:hidden;position:relative}

/* ── CANVAS AREA ── */
.canvas-wrap{flex:1;overflow:hidden;position:relative;background:var(--canvas-bg)}
.canvas-wrap.pan-mode{cursor:grab}
.canvas-wrap.pan-mode:active{cursor:grabbing}
.canvas-wrap.draw-mode{cursor:crosshair}
#transform-root{position:absolute;transform-origin:0 0;will-change:transform}

/* ── LEFT SIDEBAR: SHAPES PALETTE ── */
.lside{width:210px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--border-t);display:flex;flex-direction:column;overflow:hidden;transition:width .18s}
.lside.collapsed{width:36px}
.lside-hdr{height:36px;display:flex;align-items:center;padding:0 8px;border-bottom:1px solid var(--border-t);flex-shrink:0;gap:6px}
.lside-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);flex:1;overflow:hidden;white-space:nowrap}
.lside-body{flex:1;overflow-y:auto;padding:6px}
.lside-body::-webkit-scrollbar{width:3px}
.lside-body::-webkit-scrollbar-thumb{background:var(--border-t);border-radius:2px}
.pg-hdr{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);padding:7px 4px 4px;border-bottom:1px solid var(--border-t);margin-bottom:4px}
.pg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:6px}
.pg-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border:1.5px solid var(--border-t);border-radius:5px;background:var(--bg-secondary);cursor:pointer;font-size:8.5px;font-weight:600;color:var(--text-secondary);transition:all .12s;text-align:center;line-height:1.2;user-select:none}
.pg-btn:hover{border-color:#c8860a;color:var(--text-primary);background:rgba(200,134,10,.08);transform:translateY(-1px)}
.pg-btn:active{transform:translateY(0)}
.pg-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-secondary)}
.pg-btn:hover .pg-icon{color:#e8c96a}

/* ── RIGHT SIDEBAR: PROPERTIES ── */
.rside{width:270px;flex-shrink:0;background:var(--bg-panel);border-left:1px solid var(--border-t);display:flex;flex-direction:column;overflow:hidden}
.rside-hdr{padding:10px 12px;border-bottom:1px solid var(--border-t);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg-secondary)}
.rside-title{font-size:12px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:6px}
.rside-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.rside-body::-webkit-scrollbar{width:3px}
.rside-body::-webkit-scrollbar-thumb{background:var(--border-t);border-radius:2px}

/* ── BOTTOM TOOLBAR ── */
.bottom-bar{
  display:flex;align-items:center;gap:0;
  height:40px;flex-shrink:0;
  background:#111009;border-top:1.5px solid #2e2a1e;
  position:relative;z-index:30
}
.bb-left{display:flex;align-items:center;gap:4px;padding:0 8px;flex:1}
.bb-center{display:flex;align-items:center;gap:0;position:absolute;left:50%;transform:translateX(-50%)}
.bb-right{display:flex;align-items:center;gap:4px;padding:0 8px;justify-content:flex-end;flex:1}

/* SVG strip at bottom */
.svg-strip{background:var(--bg-panel);border-top:1px solid var(--border-t);flex-shrink:0;overflow:hidden;transition:height .2s;height:0}
.svg-strip.open{height:200px}
.svg-strip-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--border-t);flex-shrink:0}
.svg-strip-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary)}
.svg-strip-ta{flex:1;width:100%;padding:8px 12px;font-family:monospace;font-size:10px;background:var(--bg-input);border:none;outline:none;resize:none;line-height:1.6;color:var(--text-secondary);height:calc(200px - 38px)}

/* zoom controls */
.zoom-ctrl{display:flex;align-items:center;gap:0;border:1.5px solid rgba(255,255,255,.1);border-radius:5px;overflow:hidden}
.zbtn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:none;color:#7a7060;cursor:pointer;font-size:14px;font-weight:600;transition:all .1s;border-right:1px solid rgba(255,255,255,.08)}
.zbtn:hover{background:rgba(255,255,255,.1);color:#c8c0a8}
.zbtn:last-child{border-right:none}
.zlbl{padding:0 8px;font-size:10px;font-weight:600;color:var(--text-secondary);white-space:nowrap;background:rgba(255,255,255,.04)}

/* coords */
.coords{font-size:10px;font-weight:500;color:var(--text-tertiary);letter-spacing:.5px;padding:0 8px}

/* ── FORM FIELDS ── */
.flabel{display:block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:3px}
.finp,.fsel,.ftxt{width:100%;border:1.5px solid var(--border-t);border-radius:4px;background:var(--bg-input);color:var(--text-primary);font-family:'Outfit',system-ui,sans-serif;font-size:12px;padding:5px 8px;outline:none;transition:border-color .12s;-webkit-appearance:none;appearance:none}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:#c8860a;box-shadow:0 0 0 2px rgba(200,134,10,.1)}
.finp:disabled,.fsel:disabled,.ftxt:disabled{opacity:.5;cursor:default}
.ftxt{resize:none;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}

/* color swatches */
.sw-grid{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.sw{width:22px;height:22px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:all .1s}
.sw:hover{transform:scale(1.15)}
.sw.on{border-color:#c8860a;box-shadow:0 0 0 2px rgba(200,134,10,.3)}
.sw-custom{width:22px;height:22px;border-radius:3px;cursor:pointer;border:1.5px dashed var(--border-s);background:var(--bg-input);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-tertiary);position:relative;overflow:hidden}
.sw-custom input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* toggle */
.tog{position:relative;display:inline-flex;align-items:center;width:34px;height:18px;border:1.5px solid var(--border-t);border-radius:3px;background:var(--bg-input);cursor:pointer;transition:all .15s;flex-shrink:0}
.tog.on{border-color:#c8860a;background:rgba(200,134,10,.15)}
.tog-k{position:absolute;left:2px;width:11px;height:11px;background:var(--border-s);border-radius:2px;transition:all .15px}
.tog.on .tog-k{left:19px;background:#c8860a}

/* range */
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--border-t);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:3px;background:#c8860a;cursor:pointer}
.range-row{display:flex;align-items:center;gap:6px}
.range-val{font-size:10px;color:var(--text-tertiary);width:30px;text-align:right;flex-shrink:0}

/* badge */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* align buttons */
.align-row{display:flex;gap:3px;flex-wrap:wrap}
.abtn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:3px;border:1.5px solid var(--border-t);background:var(--bg-input);cursor:pointer;font-size:12px;color:var(--text-secondary);transition:all .1s}
.abtn:hover{border-color:#c8860a;color:#e8c96a;background:rgba(200,134,10,.08)}

/* z-order */
.zrow{display:flex;gap:3px}
.zbtn2{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:3px;border:1.5px solid var(--border-t);background:var(--bg-input);cursor:pointer;font-size:11px;color:var(--text-secondary);transition:all .1s}
.zbtn2:hover{border-color:#c8860a;color:#e8c96a}

/* selection box */
.sel-box{position:absolute;border:1.5px dashed #f59e0b;background:rgba(245,158,11,.06);pointer-events:none;z-index:35}

/* legend */
.legend{position:absolute;top:10px;left:10px;z-index:20;background:var(--bg-panel);border:1px solid var(--border-t);border-radius:5px;padding:8px 10px;min-width:140px;box-shadow:0 1px 8px rgba(0,0,0,.3)}
.leg-title{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-t);padding-bottom:4px}
.leg-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:9px;font-weight:500;color:var(--text-secondary)}
.leg-sw{width:10px;height:10px;border-radius:2px;border:1px solid rgba(0,0,0,.15);flex-shrink:0}
.leg-n{margin-left:auto;font-size:8px;color:var(--text-tertiary)}

/* search */
.search-wrap{position:absolute;top:10px;right:10px;z-index:25}
.search-inp{background:var(--bg-panel);border:1px solid var(--border-t);border-radius:5px;padding:5px 10px 5px 30px;font-family:'Outfit',system-ui,sans-serif;font-size:11px;color:var(--text-primary);outline:none;width:180px;transition:border-color .12s}
.search-inp:focus{border-color:#c8860a}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);font-size:13px;pointer-events:none}
.search-results{position:absolute;top:100%;right:0;background:var(--bg-panel);border:1px solid var(--border-t);border-radius:5px;box-shadow:0 4px 16px rgba(0,0,0,.4);min-width:200px;max-height:200px;overflow-y:auto;margin-top:3px}
.sr-item{padding:6px 10px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border-t)}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--bg-secondary)}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg-panel);border:1px solid var(--border-t);border-radius:6px;width:min(760px,94vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 40px rgba(0,0,0,.5)}
.modal-hdr{padding:12px 16px;border-bottom:1px solid var(--border-t);display:flex;justify-content:space-between;align-items:center;background:var(--bg-secondary);flex-shrink:0}
.modal-title{font-size:14px;font-weight:700;color:var(--text-primary)}
.modal-body{padding:16px;overflow-y:auto;flex:1}
.modal-foot{padding:8px 16px;border-top:1px solid var(--border-t);display:flex;gap:6px;justify-content:flex-end;background:var(--bg-secondary);flex-shrink:0}

/* shortcuts table */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc-group{border:1px solid var(--border-t);border-radius:4px;overflow:hidden}
.sc-hdr{padding:6px 10px;background:var(--bg-secondary);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);border-bottom:1px solid var(--border-t)}
.sc-row{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;border-bottom:1px solid rgba(100,88,60,.2);font-size:11px;color:var(--text-secondary)}
.sc-row:last-child{border-bottom:none}
.sc-keys{display:flex;gap:2px}
.sc-k{background:var(--bg-secondary);border:1px solid var(--border-s);border-bottom:2px solid var(--border-s);border-radius:3px;padding:0 5px;font-size:9px;font-family:monospace;color:var(--text-secondary)}

/* toast */
.toast{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);padding:7px 16px;border-radius:5px;font-family:'Outfit',system-ui,sans-serif;font-size:11px;font-weight:600;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.4);pointer-events:none;transition:opacity .3s;white-space:nowrap}

/* shape preview swatches */
.shape-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:3px}
.shape-opt{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;border:1.5px solid var(--border-t);border-radius:4px;background:var(--bg-input);cursor:pointer;font-size:8px;color:var(--text-tertiary);transition:all .1s}
.shape-opt:hover,.shape-opt.on{border-color:#c8860a;color:#e8c96a;background:rgba(200,134,10,.08)}
.shape-opt svg{width:20px;height:20px}

/* callout */
.callout{background:rgba(30,64,175,.08);border:1px solid rgba(30,64,175,.2);border-left:3px solid #60a5fa;border-radius:4px;padding:8px 10px}
.callout-lbl{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#60a5fa;margin-bottom:3px}

/* pan indicator */
.pan-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.6);color:#f0ead8;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .2s;z-index:30}
.pan-hint.show{opacity:1}

/* FIX 3: loading overlay so user sees something while JS boots */
#loading-overlay{position:fixed;inset:0;background:#1a1814;display:flex;align-items:center;justify-content:center;z-index:9000;transition:opacity .3s}
#loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-inner{text-align:center;color:#c0b898}
.loading-inner .spinner{width:32px;height:32px;border:3px solid rgba(200,134,10,.2);border-top-color:#c8860a;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-inner p{font-size:13px;font-weight:600;color:#c0b898;letter-spacing:.5px}
.loading-inner small{font-size:10px;color:#6a6050;display:block;margin-top:4px}
</style>
</head>
<body>
<!-- FIX 3: Loading overlay -->
<div id="loading-overlay">
  <div class="loading-inner">
    <div class="spinner"></div>
    <p>Campus Map Editor</p>
    <small>Loading map data…</small>
  </div>
</div>

<div class="app" id="app">
  <nav class="nav" id="nav"></nav>
  <div class="body">
    <!-- LEFT: shapes palette -->
    <div class="lside" id="lside">
      <div class="lside-hdr">
        <span class="lside-title" id="lside-title">Components</span>
        <button class="ibtn" id="lside-tog" title="Collapse" style="width:22px;height:22px;font-size:11px">&#9664;</button>
      </div>
      <div class="lside-body" id="lside-body"></div>
    </div>
    <!-- CANVAS -->
    <div class="canvas-wrap" id="canvas-wrap">
      <div id="transform-root">
        <svg id="map-svg" xmlns="http://www.w3.org/2000/svg">
          <title>Campus Map</title>
        </svg>
      </div>
      <div class="legend" id="legend" style="display:none"></div>
      <div class="search-wrap" id="search-wrap">
        <i class="ti ti-search search-icon"></i>
        <input class="search-inp" id="search-inp" placeholder="Search buildings…" autocomplete="off"/>
        <div class="search-results" id="search-results" style="display:none"></div>
      </div>
      <div id="sel-box" class="sel-box" style="display:none"></div>
      <div class="pan-hint" id="pan-hint">Hold Space or Alt + drag to pan</div>
    </div>
    <!-- RIGHT: properties -->
    <div class="rside" id="rside" style="display:none"></div>
  </div>
  <!-- BOTTOM BAR -->
  <div class="bottom-bar" id="bottom-bar">
    <div class="bb-left">
      <div class="zoom-ctrl">
        <button class="zbtn" id="zoom-in" title="Zoom in">+</button>
        <div class="zbtn zlbl" id="zoom-lbl">100%</div>
        <button class="zbtn" id="zoom-out" title="Zoom out">&minus;</button>

const M={
  upd(id,p){ST.buildings=ST.buildings.map(b=>b.id===id?{...b,...p}:b)},
  updR(id,p,c='roads'){ST[c]=ST[c].map(r=>r.id===id?{...r,...p}:r)},
  del(ids){ST.buildings=ST.buildings.filter(b=>!ids.has(b.id))},
  delR(id){ST.roads=ST.roads.filter(r=>r.id!==id)},
  delFP(id){ST.footpaths=ST.footpaths.filter(p=>p.id!==id)},
  add(b){ST.buildings=[...ST.buildings,b]},
  toFront(id){const b=ST.buildings.find(x=>x.id===id);if(b)ST.buildings=[...ST.buildings.filter(x=>x.id!==id),b]},
  toBack(id){const b=ST.buildings.find(x=>x.id===id);if(b)ST.buildings=[b,...ST.buildings.filter(x=>x.id!==id)]},
  fwd(id){const i=ST.buildings.findIndex(b=>b.id===id);if(i<ST.buildings.length-1){const a=[...ST.buildings];[a[i],a[i+1]]=[a[i+1],a[i]];ST.buildings=a}},
  bwd(id){const i=ST.buildings.findIndex(b=>b.id===id);if(i>0){const a=[...ST.buildings];[a[i],a[i-1]]=[a[i-1],a[i]];ST.buildings=a}},
};

function redo(){if(!redoStack.length)return;undoStack.push(JSON.stringify(ST));ST=JSON.parse(redoStack.pop());renderAll()}

  ST=JSON.parse(JSON.stringify(INITIAL_STATE));
}
function scheduleSave(){saveStatus='unsaved';renderNav();clearTimeout(saveTimer);saveTimer=setTimeout(()=>{saveStatus='saving';renderNav();save();saveStatus='saved';renderNav()},700)}

// ═══════════════════════════════════════════════════════════
//  SNAP / TRANSFORM
// ═══════════════════════════════════════════════════════════
function sv(v){return snapOn?Math.round(v/SNAP)*SNAP:Math.round(v)}

function applyTr(){
  if(!trRoot)return;
  trRoot.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  const lbl=document.getElementById('zoom-lbl');
  if(lbl)lbl.textContent=Math.round(zoom*100)+'%';
}
function fitView(){
  if(!canvasEl||!svgEl)return;
  const r=canvasEl.getBoundingClientRect();
  const sx=(r.width-40)/MAP_W,sy=(r.height-40)/MAP_H;
  zoom=Math.min(sx,sy,.97);
  panX=(r.width-MAP_W*zoom)/2;
  panY=(r.height-MAP_H*zoom)/2;
  applyTr();
}
function toCanvas(cx,cy){
  const r=canvasEl.getBoundingClientRect();
  return{x:(cx-r.left-panX)/zoom,y:(cy-r.top-panY)/zoom};
}
function mkEl(tag,a){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(a))el.setAttribute(k,v);
  return el;
}

// ═══════════════════════════════════════════════════════════
//  SCROLL / ZOOM / PAN
// ═══════════════════════════════════════════════════════════
function initInteraction(){
  document.getElementById('zoom-in').onclick=()=>{zoom=Math.min(zoom*1.2,8);applyTr()};
  document.getElementById('zoom-out').onclick=()=>{zoom=Math.max(zoom/1.2,.1);applyTr()};
  document.getElementById('zoom-fit').onclick=fitView;

  canvasEl.addEventListener('wheel',e=>{
    e.preventDefault();
    if(e.ctrlKey||e.metaKey){
      const r=canvasEl.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;const oz=zoom;
      zoom=e.deltaY<0?Math.min(zoom*1.1,8):Math.max(zoom/1.1,.1);
      panX=mx-(mx-panX)*zoom/oz;panY=my-(my-panY)*zoom/oz;
    } else {
      panX-=e.deltaX||0;panY-=e.deltaY||0;
    }
    applyTr();
  },{passive:false});

  window.addEventListener('keydown',e=>{
    if(e.code==='Space'&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)){
      if(!spaceDown){spaceDown=true;canvasEl.classList.add('pan-mode');}
      e.preventDefault();
    }
  });
  window.addEventListener('keyup',e=>{
    if(e.code==='Space'){spaceDown=false;if(!isPanning)canvasEl.classList.remove('pan-mode');}
  });

  canvasEl.addEventListener('mousedown',e=>{
    if(e.button===1||(e.button===0&&(e.altKey||spaceDown))){
      isPanning=true;panStart={x:e.clientX,y:e.clientY};panOrig={x:panX,y:panY};
      canvasEl.classList.add('pan-mode');e.preventDefault();return;
    }
    if(e.button===0&&editMode&&editTarget==='buildings'&&!drawMode&&e.target===svgEl){
      const pt=toCanvas(e.clientX,e.clientY);
      selBox={active:true,start:{...pt},cur:{...pt}};
      if(!e.shiftKey)selIds.clear();
      e.preventDefault();
    }
  });

  window.addEventListener('mousemove',e=>{
    const pt=toCanvas(e.clientX,e.clientY);
    curPos={x:Math.round(pt.x),y:Math.round(pt.y)};
    const coords=document.getElementById('coords');
    if(coords)coords.textContent=`x:${curPos.x} y:${curPos.y}`;
    if(isPanning){panX=panOrig.x+(e.clientX-panStart.x);panY=panOrig.y+(e.clientY-panStart.y);applyTr();return}
    if(selBox.active){
      selBox.cur={...pt};
      const sb=document.getElementById('sel-box');
      const minX=Math.min(selBox.start.x,pt.x),minY=Math.min(selBox.start.y,pt.y);
      const maxX=Math.max(selBox.start.x,pt.x),maxY=Math.max(selBox.start.y,pt.y);
      sb.style.display='block';sb.style.left=(minX*zoom+panX)+'px';sb.style.top=(minY*zoom+panY)+'px';
      sb.style.width=((maxX-minX)*zoom)+'px';sb.style.height=((maxY-minY)*zoom)+'px';
      return;
    }
    if(rotDrag){
      const{cx,cy,sa,or}=rotDrag;
      const ang=Math.atan2(pt.y-cy,pt.x-cx)*180/Math.PI;
      let nr=or+(ang-sa);if(e.shiftKey)nr=Math.round(nr/15)*15;
      M.upd(rotDrag.id,{rotation:nr});renderSVG();return;
    }
    if(dragId){
      const ids=[...selIds];
      if(ids.length>1&&multiDragOff){
        const base=multiDragOff[dragId];
        const cur=ST.buildings.find(b=>b.id===dragId);
        const nx=sv(pt.x-base.x),ny=sv(pt.y-base.y);
        const dx=nx-cur.x,dy=ny-cur.y;
        ST.buildings=ST.buildings.map(b=>{
          if(!ids.includes(b.id))return b;
          return{...b,x:Math.max(0,Math.min(b.x+dx,MAP_W-b.width)),y:Math.max(0,Math.min(b.y+dy,MAP_H-b.height))};
        });
      } else {
        const b=ST.buildings.find(b=>b.id===dragId);
        M.upd(dragId,{x:Math.max(0,Math.min(sv(pt.x-dragOff.x),MAP_W-b.width)),y:Math.max(0,Math.min(sv(pt.y-dragOff.y),MAP_H-b.height))});
      }
      renderSVG();
    }
  });

  window.addEventListener('mouseup',e=>{
    if(isPanning){isPanning=false;if(!spaceDown)canvasEl.classList.remove('pan-mode')}
    if(selBox.active&&selBox.start&&selBox.cur){
      selBox.active=false;document.getElementById('sel-box').style.display='none';
      const minX=Math.min(selBox.start.x,selBox.cur.x),minY=Math.min(selBox.start.y,selBox.cur.y);
      const maxX=Math.max(selBox.start.x,selBox.cur.x),maxY=Math.max(selBox.start.y,selBox.cur.y);
      if(maxX-minX>5||maxY-minY>5){ST.buildings.forEach(b=>{if(b.x+b.width>minX&&b.x<maxX&&b.y+b.height>minY&&b.y<maxY)selIds.add(b.id)});renderAll()}
      selBox={active:false,start:null,cur:null};
    }
    if(rotDrag){rotDrag=null;scheduleSave();renderAll()}
    if(dragId){dragId=null;multiDragOff=null;scheduleSave();renderAll()}
  });

  canvasEl.addEventListener('touchstart',e=>{
    if(e.touches.length===2){e.preventDefault();const t0=e.touches[0],t1=e.touches[1];pinch={dist:Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY),zoom,panX,panY,mx:(t0.clientX+t1.clientX)/2,my:(t0.clientY+t1.clientY)/2};}
  },{passive:false});
  canvasEl.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&pinch){e.preventDefault();const t0=e.touches[0],t1=e.touches[1];const nd=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);const sc=nd/pinch.dist;const nz=Math.min(Math.max(pinch.zoom*sc,.1),8);const r=canvasEl.getBoundingClientRect();const mx=pinch.mx-r.left,my=pinch.my-r.top;panX=mx-(mx-pinch.panX)*nz/pinch.zoom;panY=my-(my-pinch.panY)*nz/pinch.zoom;zoom=nz;applyTr();}
  },{passive:false});
  canvasEl.addEventListener('touchend',()=>pinch=null);

  window.addEventListener('keydown',e=>{
    const tag=document.activeElement.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
    if(e.code==='Space')return;
    const ctrl=e.ctrlKey||e.metaKey;
    if(ctrl&&!e.shiftKey&&(e.key==='z'||e.key==='Z')){e.preventDefault();undo();return}
    if((ctrl&&(e.key==='y'||e.key==='Y'))||(ctrl&&e.shiftKey&&(e.key==='z'||e.key==='Z'))){e.preventDefault();redo();return}
    if(ctrl&&(e.key==='d'||e.key==='D')){e.preventDefault();doDup();return}
    if(ctrl&&(e.key==='a'||e.key==='A')&&editMode){e.preventDefault();ST.buildings.forEach(b=>selIds.add(b.id));renderAll();return}
    if(ctrl&&e.key===']'&&selIds.size===1){e.preventDefault();snap();M.fwd([...selIds][0]);scheduleSave();renderAll();return}
    if(ctrl&&e.key==='['&&selIds.size===1){e.preventDefault();snap();M.bwd([...selIds][0]);scheduleSave();renderAll();return}
    if(e.key==='Escape'){selIds.clear();selRoad=selPath=null;if(drawMode)cancelDraw();renderAll();return}
    if(e.key==='Delete'||e.key==='Backspace'){
      if(selIds.size){snap();M.del(selIds);selIds.clear();scheduleSave();renderAll()}
      if(selRoad){snap();M.delR(selRoad);selRoad=null;scheduleSave();renderAll()}
      if(selPath){snap();M.delFP(selPath);selPath=null;scheduleSave();renderAll()}
      return;
    }
    if(e.key==='f'||e.key==='F'){fitView();return}
    if(e.key==='g'||e.key==='G'){showGrid=!showGrid;renderSVG();return}
    if(e.key==='s'&&!ctrl){snapOn=!snapOn;renderNav();return}
    if(e.key==='l'||e.key==='L'){showLegend=!showLegend;renderLegend();return}
    if(e.key==='?'||e.key==='/'){showHelp();return}
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)&&selIds.size){
      e.preventDefault();const d=e.shiftKey?SNAP:4;
      const dx=e.key==='ArrowLeft'?-d:e.key==='ArrowRight'?d:0;
      const dy=e.key==='ArrowUp'?-d:e.key==='ArrowDown'?d:0;
      ST.buildings=ST.buildings.map(b=>selIds.has(b.id)?{...b,x:Math.max(0,Math.min(b.x+dx,MAP_W-b.width)),y:Math.max(0,Math.min(b.y+dy,MAP_H-b.height))}:b);
      renderSVG();scheduleSave();
    }
  });
}

// ═══════════════════════════════════════════════════════════

function doDup(){
  if(!selIds.size)return;snap();
  const newIds=new Set();
  [...selIds].forEach(id=>{
    const b=ST.buildings.find(x=>x.id===id);if(!b)return;
    const nid=`${id}-cp-${Date.now()%100000}`;
    M.add({...JSON.parse(JSON.stringify(b)),id:nid,x:b.x+SNAP,y:b.y+SNAP});
    newIds.add(nid);
  });
  selIds=newIds;scheduleSave();renderAll();toast(`Duplicated ${newIds.size} item${newIds.size>1?'s':''}`)
}

function addBlank(){
  if(!editMode){editMode=true;editTarget='buildings';renderNav()}
  snap();const id=`bldg-${Date.now()%100000}`;
  M.add({id,label:'NEW',x:Math.round(MAP_W/2-60),y:Math.round(MAP_H/2-45),width:120,height:90,rotation:0,fillColor:'#D1D5DB',strokeColor:'#374151',notes:'',shape:'rect',category:'Facility',fontSize:9.5});
  selIds=new Set([id]);scheduleSave();renderAll();toast('Building added')
}

function addFromPreset(item){
  if(!editMode){editMode=true;editTarget='buildings';renderNav()}
  if(item.data.isPath){
    snap();const id=`fp-${Date.now()%100000}`;
    ST.footpaths=[...ST.footpaths,{id,label:item.data.label,start:{x:400,y:398},segments:[{type:'L',end:{x:600,y:398}}],color:item.data.color,width:item.data.width,style:item.data.style}];
    selPath=id;editTarget='roads';scheduleSave();renderAll();toast(`${item.label} added`);return;
  }
  snap();const d=item.data;const id=`c-${Date.now()%100000}`;
  M.add({id,label:d.label,x:Math.round(MAP_W/2-d.w/2+Math.random()*80-40),y:Math.round(MAP_H/2-d.h/2+Math.random()*60-30),width:d.w,height:d.h,rotation:0,fillColor:d.fill,strokeColor:d.stroke||'#374151',notes:d.notes||'',shape:d.shape,category:d.cat,fontSize:9.5,isGate:d.isGate||false,isTree:d.isTree||false,isFountain:d.isFountain||false});
  selIds=new Set([id]);scheduleSave();renderAll();toast(`${item.label} added`)
}

function doAlign(type){
  if(selIds.size<2)return;snap();
  const sel=ST.buildings.filter(b=>selIds.has(b.id));
  const minX=Math.min(...sel.map(b=>b.x)),maxX=Math.max(...sel.map(b=>b.x+b.width));
  const minY=Math.min(...sel.map(b=>b.y)),maxY=Math.max(...sel.map(b=>b.y+b.height));
  const cx=(minX+maxX)/2,cy=(minY+maxY)/2;
  ST.buildings=ST.buildings.map(b=>{
    if(!selIds.has(b.id))return b;
    if(type==='l')return{...b,x:minX};if(type==='r')return{...b,x:maxX-b.width};if(type==='cx')return{...b,x:cx-b.width/2};
    if(type==='t')return{...b,y:minY};if(type==='b')return{...b,y:maxY-b.height};if(type==='cy')return{...b,y:cy-b.height/2};
    if(type==='dh'){const sorted=[...sel].sort((a,b2)=>a.x-b2.x);const tw=sorted.reduce((s,b2)=>s+b2.width,0);const gap=(maxX-minX-tw)/(sorted.length-1);let cur=minX;const map={};sorted.forEach(b2=>{map[b2.id]=cur;cur+=b2.width+gap});return{...b,x:map[b.id]??b.x}}
    if(type==='dv'){const sorted=[...sel].sort((a,b2)=>a.y-b2.y);const th=sorted.reduce((s,b2)=>s+b2.height,0);const gap=(maxY-minY-th)/(sorted.length-1);let cur=minY;const map={};sorted.forEach(b2=>{map[b2.id]=cur;cur+=b2.height+gap});return{...b,y:map[b.id]??b.y}}
    return b;
  });scheduleSave();renderSVG();
}

function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const s=d.ST||d.state||d;if(!s?.buildings)throw 0;snap();ST=s;if(!ST.footpaths)ST.footpaths=[];if(!ST.junctions)ST.junctions=[];ST.buildings=ST.buildings.map(b=>({fontSize:9.5,...b}));selIds.clear();selRoad=selPath=null;scheduleSave();renderAll();toast('Map imported','green')}catch{toast('Invalid file','red')}};r.readAsText(f);
  };inp.click();
}
function importHTML(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.html,.htm';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const html=ev.target.result;
        const m=html.match(/(?:INITIAL_STATE|state)\s*=\s*(\{[\s\S]*?\})(?:\s*;|\s*\n)/);
        if(!m)throw new Error('Cannot find map data in HTML');
        const s=JSON.parse(m[1]);
        if(!s?.buildings)throw 0;
        snap();ST=s;if(!ST.footpaths)ST.footpaths=[];if(!ST.junctions)ST.junctions=[];ST.buildings=ST.buildings.map(b=>({fontSize:9.5,...b}));selIds.clear();selRoad=selPath=null;scheduleSave();renderAll();toast('HTML map imported','green');
      }catch{toast('Could not parse HTML map data','red')}
    };r.readAsText(f);
  };inp.click();
}
function exportJSON(){const j=JSON.stringify({v:5,ST},null,2);const b=new Blob([j],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.download='campus-map.json';a.href=u;a.click();URL.revokeObjectURL(u)}

//  SVG BUILD
// ═══════════════════════════════════════════════════════════
function roadPath(r){let d=`M ${r.start.x} ${r.start.y}`;for(const s of r.segments){if(s.type==='L')d+=` L ${s.end.x} ${s.end.y}`;if(s.type==='C')d+=` C ${s.cp1.x} ${s.cp1.y} ${s.cp2.x} ${s.cp2.y} ${s.end.x} ${s.end.y}`}return d}

function buildSVG(sysFont=false){
  const ff=sysFont?"Arial,sans-serif":"'Outfit',sans-serif";
  const L=[];
  L.push(`<svg width="${MAP_W}" height="${MAP_H}" viewBox="0 0 ${MAP_W} ${MAP_H}" xmlns="http://www.w3.org/2000/svg">`);
  L.push(`<title>Campus Map</title>`);
  if(!sysFont)L.push(`<defs><style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap');</style></defs>`);
  L.push(`<rect width="${MAP_W}" height="${MAP_H}" fill="#EEF0E8"/>`);
  for(const fp of(ST.footpaths||[])){const d=roadPath(fp);const da=fp.style==='dashed'?`stroke-dasharray="${fp.width*1.5} ${fp.width}"`:fp.style==='dotted'?`stroke-dasharray="2 ${fp.width}"`:'';L.push(`<path d="${d}" stroke="rgba(0,0,0,.12)" stroke-width="${fp.width+2}" fill="none" stroke-linecap="round"/>`);L.push(`<path d="${d}" stroke="${fp.color}" stroke-width="${fp.width}" fill="none" stroke-linecap="round" stroke-linejoin="round" ${da}/>`);if(fp.style==='solid'&&fp.width>8)L.push(`<path d="${d}" stroke="rgba(255,255,255,.35)" stroke-width="2" fill="none" stroke-dasharray="12 10" stroke-linecap="round"/>`);}
  for(const road of ST.roads){const d=roadPath(road);L.push(`<path d="${d}" stroke="#C8860A" stroke-width="${road.width+8}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);L.push(`<path d="${d}" stroke="#E6A800" stroke-width="${road.width+4}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);L.push(`<path d="${d}" stroke="${road.color}" stroke-width="${road.width}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);if(road.showDashes)L.push(`<path d="${d}" stroke="white" stroke-width="2" fill="none" stroke-dasharray="22 14" stroke-linecap="round" opacity="0.7"/>`);}
  for(const j of ST.junctions)L.push(`<circle cx="${j.x}" cy="${j.y}" r="28" fill="#FDE68A" stroke="#E6A800" stroke-width="3"/>`);
  for(const b of ST.buildings){const cx=b.x+b.width/2,cy=b.y+b.height/2;const tf=b.rotation?` transform="rotate(${b.rotation} ${cx} ${cy})"`:''
    const sh=shapeStr(b);L.push(sh);
    const isGate=b.isGate||b.category==='Gate';
    if(isGate){const bH=b.height*.55,bW=3.5;L.push(`<rect x="${cx-b.width*.22-bW/2}" y="${cy-bH/2}" width="${bW}" height="${bH}" fill="#9CA3AF" rx="1"${tf}/>`);L.push(`<rect x="${cx+b.width*.22-bW/2}" y="${cy-bH/2}" width="${bW}" height="${bH}" fill="#9CA3AF" rx="1"${tf}/>`);L.push(`<path d="M ${b.x+4} ${cy} Q ${cx} ${b.y+2} ${b.x+b.width-4} ${cy}" stroke="#9CA3AF" stroke-width="2" fill="none"${tf}/>`);}
    if(b.isFountain){const r2=Math.min(b.width,b.height)/4;L.push(`<circle cx="${cx}" cy="${cy}" r="${r2}" fill="#7dd3fc" stroke="#0ea5e9" stroke-width="1"${tf}/>`);L.push(`<line x1="${cx}" y1="${cy-r2}" x2="${cx}" y2="${cy-r2*2.2}" stroke="#7dd3fc" stroke-width="2"${tf}/>`);}
    if(b.isTree){const r2=Math.min(b.width,b.height)/2;const nr=r2*.55;L.push(`<circle cx="${cx}" cy="${cy}" r="${nr}" fill="#d9f99d" stroke="none"${tf}/>`);L.push(`<line x1="${cx}" y1="${cy+nr}" x2="${cx}" y2="${b.y+b.height}" stroke="#92400e" stroke-width="2"${tf}/>`);}
    const fs=b.fontSize||9.5;if(b.label&&!b.isTree){const lines=b.label.split('\n').filter(Boolean);const lh=fs*1.3;const baseY=isGate?cy+b.height*.3:cy;const sy=baseY-(lines.length*lh)/2+lh*.5;lines.forEach((l,i)=>{const fill=(isGate||b.fillColor==='#1F2937'||b.fillColor==='#374151')?'#F9FAFB':'#374151';L.push(`<text x="${cx}" y="${sy+i*lh}" text-anchor="middle" dominant-baseline="middle" font-size="${fs}" font-family="${ff}" font-weight="700" fill="${fill}"${tf}>${l}</text>`)});}}
  L.push('</svg>');return L.join('\n');
}
function shapeStr(b){
  const cx=b.x+b.width/2,cy=b.y+b.height/2;
  const tf=b.rotation?` transform="rotate(${b.rotation} ${cx} ${cy})"`:''
  const sc=b.strokeColor,fc=b.fillColor,sw=1.5;
  if(b.shape==='circle')return`<circle cx="${cx}" cy="${cy}" r="${Math.min(b.width,b.height)/2}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;
  if(b.shape==='ellipse')return`<ellipse cx="${cx}" cy="${cy}" rx="${b.width/2}" ry="${b.height/2}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;
  if(b.shape==='hexagon'){const r2=Math.min(b.width,b.height)/2;const pts=Array.from({length:6},(_,i)=>{const a=Math.PI/180*(60*i-30);return`${cx+r2*Math.cos(a)},${cy+r2*Math.sin(a)}`}).join(' ');return`<polygon points="${pts}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;}
  if(b.shape==='diamond')return`<polygon points="${cx},${b.y} ${b.x+b.width},${cy} ${cx},${b.y+b.height} ${b.x},${cy}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;
  if(b.shape==='octagon'){const d2=Math.min(b.width,b.height)*.25;const pts=`${b.x+d2},${b.y} ${b.x+b.width-d2},${b.y} ${b.x+b.width},${b.y+d2} ${b.x+b.width},${b.y+b.height-d2} ${b.x+b.width-d2},${b.y+b.height} ${b.x+d2},${b.y+b.height} ${b.x},${b.y+b.height-d2} ${b.x},${b.y+d2}`;return`<polygon points="${pts}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;}
  if(b.shape==='triangle'){const pts=`${cx},${b.y} ${b.x+b.width},${b.y+b.height} ${b.x},${b.y+b.height}`;return`<polygon points="${pts}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;}
  if(b.shape==='pentagon'){const pts=Array.from({length:5},(_,i)=>{const a=Math.PI/180*(72*i-90);return`${cx+(b.width/2)*Math.cos(a)},${cy+(b.height/2)*Math.sin(a)}`}).join(' ');return`<polygon points="${pts}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;}
  return`<rect x="${b.x}" y="${b.y}" width="${b.width}" height="${b.height}" rx="4" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;
}

function renderGrid(g){
  if(!showGrid)return;
  for(let x=0;x<=MAP_W;x+=GRID_MINOR)g.appendChild(mkEl('line',{x1:x,y1:0,x2:x,y2:MAP_H,stroke:x%GRID_MAJOR===0?'rgba(160,134,80,.2)':'rgba(160,134,80,.07)','stroke-width':x%GRID_MAJOR===0?.7:.3}));
  for(let y=0;y<=MAP_H;y+=GRID_MINOR)g.appendChild(mkEl('line',{x1:0,y1:y,x2:MAP_W,y2:y,stroke:y%GRID_MAJOR===0?'rgba(160,134,80,.2)':'rgba(160,134,80,.07)','stroke-width':y%GRID_MAJOR===0?.7:.3}));
  for(let x=0;x<=MAP_W;x+=GRID_MAJOR)for(let y=0;y<=MAP_H;y+=GRID_MAJOR)g.appendChild(mkEl('circle',{cx:x,cy:y,r:1.5,fill:'rgba(160,134,80,.4)'}));
  for(let x=0;x<=MAP_W;x+=GRID_MAJOR){const t=mkEl('text',{x,y:MAP_H+14,'text-anchor':'middle','font-size':8,'font-family':'Outfit,sans-serif',fill:'rgba(122,112,96,.45)'});t.textContent=x;g.appendChild(t)}

}

//  RENDER: SVG CANVAS
// ═══════════════════════════════════════════════════════════
function renderSVG(){
  if(!svgEl)return;
  while(svgEl.firstChild)svgEl.removeChild(svgEl.firstChild);
  svgEl.appendChild(mkEl('rect',{x:0,y:0,width:MAP_W,height:MAP_H,fill:'#EEF0E8'}));
  const gGrid=mkEl('g',{});renderGrid(gGrid);svgEl.appendChild(gGrid);

  for(const fp of(ST.footpaths||[])){
    const d=roadPath(fp);const isSel=selPath===fp.id&&editMode;
    if(isSel)svgEl.appendChild(mkEl('path',{d,stroke:'#f59e0b','stroke-width':fp.width+10,fill:'none','stroke-linecap':'round',opacity:.3}));
    svgEl.appendChild(mkEl('path',{d,stroke:'rgba(0,0,0,.12)','stroke-width':fp.width+2,fill:'none','stroke-linecap':'round'}));
    const da=fp.style==='dashed'?`${fp.width*1.5} ${fp.width}`:fp.style==='dotted'?`2 ${fp.width}`:'none';
    svgEl.appendChild(mkEl('path',{d,stroke:fp.color,'stroke-width':fp.width,fill:'none','stroke-linecap':'round','stroke-linejoin':'round','stroke-dasharray':da}));
    if(fp.style==='solid'&&fp.width>8)svgEl.appendChild(mkEl('path',{d,stroke:'rgba(255,255,255,.35)','stroke-width':2,fill:'none','stroke-dasharray':'12 10','stroke-linecap':'round'}));
    if(editMode&&editTarget==='roads')addPathHandles(fp,'footpaths');
  }

  for(const road of ST.roads){
    const d=roadPath(road);
    svgEl.appendChild(mkEl('path',{d,stroke:'#C8860A','stroke-width':road.width+8,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));
    svgEl.appendChild(mkEl('path',{d,stroke:'#E6A800','stroke-width':road.width+4,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));
    svgEl.appendChild(mkEl('path',{d,stroke:road.color,'stroke-width':road.width,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));
    if(road.showDashes)svgEl.appendChild(mkEl('path',{d,stroke:'white','stroke-width':2,fill:'none','stroke-dasharray':'22 14','stroke-linecap':'round',opacity:.7}));
    if(selRoad===road.id&&editMode)svgEl.appendChild(mkEl('path',{d,stroke:'#f59e0b','stroke-width':road.width+14,fill:'none','stroke-linecap':'round',opacity:.2}));
    if(editMode&&editTarget==='roads')addPathHandles(road,'roads');
  }

  for(const j of ST.junctions){
    svgEl.appendChild(mkEl('circle',{cx:j.x,cy:j.y,r:28,fill:'#FDE68A',stroke:'#E6A800','stroke-width':3}));
    if(editMode&&editTarget==='roads'){
      const h=mkEl('circle',{cx:j.x,cy:j.y,r:28,fill:'transparent',stroke:'#f59e0b','stroke-width':2,cursor:'move',opacity:.6});
      h.addEventListener('mousedown',e=>{e.stopPropagation();const mm=ev=>{const p=toCanvas(ev.clientX,ev.clientY);ST.junctions=ST.junctions.map(jj=>jj.id===j.id?{...jj,x:sv(p.x),y:sv(p.y)}:jj);renderSVG()};const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave()};window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu)});
      svgEl.appendChild(h);
    }
  }

  for(const b of ST.buildings){
    const cx=b.x+b.width/2,cy=b.y+b.height/2;
    const isSel=selIds.has(b.id);
    const isGate=b.isGate||b.category==='Gate';
    const g=mkEl('g',{});
    if(b.rotation)g.setAttribute('transform',`rotate(${b.rotation} ${cx} ${cy})`);

    if(isSel){g.appendChild(mkEl('rect',{x:b.x-5,y:b.y-5,width:b.width+10,height:b.height+10,rx:6,fill:'none',stroke:'#f59e0b','stroke-width':2,'stroke-dasharray':'6 3',opacity:.9}));}

    const shapeSVG=makeShapeEl(b,isSel);g.appendChild(shapeSVG);

    if(isGate){const bH=b.height*.55,bW=3.5;g.appendChild(mkEl('rect',{x:cx-b.width*.22-bW/2,y:cy-bH/2,width:bW,height:bH,fill:'#9CA3AF',rx:1}));g.appendChild(mkEl('rect',{x:cx+b.width*.22-bW/2,y:cy-bH/2,width:bW,height:bH,fill:'#9CA3AF',rx:1}));g.appendChild(mkEl('path',{d:`M ${b.x+4} ${cy} Q ${cx} ${b.y+2} ${b.x+b.width-4} ${cy}`,stroke:'#9CA3AF','stroke-width':2,fill:'none'}));}

    if(b.isFountain){const r2=Math.min(b.width,b.height)/4;g.appendChild(mkEl('circle',{cx,cy,r:r2,fill:'#7dd3fc',stroke:'#0ea5e9','stroke-width':1}));g.appendChild(mkEl('line',{x1:cx,y1:cy-r2,x2:cx,y2:cy-r2*2.2,stroke:'#7dd3fc','stroke-width':2}));}

    if(b.isTree){const r2=Math.min(b.width,b.height)/2;const nr=r2*.55;g.appendChild(mkEl('circle',{cx,cy,r:nr,fill:'#d9f99d',stroke:'none'}));g.appendChild(mkEl('line',{x1:cx,y1:cy+nr,x2:cx,y2:b.y+b.height,stroke:'#92400e','stroke-width':2}));}

    const fs=b.fontSize||9.5;
    if(b.label&&!b.isTree){
      const lines=b.label.split('\n').filter(Boolean);const lh=fs*1.3;
      const baseY=isGate?cy+b.height*.3:cy;const sy=baseY-(lines.length*lh)/2+lh*.5;
      lines.forEach((line,i)=>{const t=mkEl('text',{x:cx,y:sy+i*lh,'text-anchor':'middle','dominant-baseline':'middle','font-size':fs,'font-family':"'Outfit',sans-serif",'font-weight':'700',fill:(isGate||b.fillColor==='#1F2937'||b.fillColor==='#374151')?'#F9FAFB':'#374151'});t.textContent=line;g.appendChild(t)});
    }

    if(isSel&&editMode&&editTarget==='buildings'&&selIds.size===1){
      g.appendChild(mkEl('line',{x1:cx,y1:b.y,x2:cx,y2:b.y-18,stroke:'#f59e0b','stroke-width':1.5,'stroke-dasharray':'3 2',opacity:.7}));
      const rh=mkEl('circle',{cx,cy:b.y-24,r:8,fill:'rgba(200,134,10,.2)',stroke:'#c8860a','stroke-width':1.5,cursor:'crosshair'});
      const rt=mkEl('text',{x:cx,y:b.y-23,'text-anchor':'middle','dominant-baseline':'middle','font-size':10,fill:'#e8c96a',style:'pointer-events:none'});rt.textContent='↻';
      rh.addEventListener('mousedown',ev=>{ev.stopPropagation();ev.preventDefault();const p=toCanvas(ev.clientX,ev.clientY);rotDrag={id:b.id,cx,cy,sa:Math.atan2(p.y-cy,p.x-cx)*180/Math.PI,or:b.rotation||0};snap()});
      g.appendChild(rh);g.appendChild(rt);
    }

    shapeSVG.style.cursor=(editMode&&editTarget==='buildings')?'move':'pointer';
    if(editMode&&editTarget==='buildings'){
      shapeSVG.addEventListener('mousedown',ev=>{ev.stopPropagation();const p=toCanvas(ev.clientX,ev.clientY);if(!ev.shiftKey&&!selIds.has(b.id))selIds.clear();selIds.add(b.id);selRoad=selPath=null;dragId=b.id;dragOff={x:p.x-b.x,y:p.y-b.y};if(selIds.size>1){multiDragOff={};selIds.forEach(id=>{const bb=ST.buildings.find(x=>x.id===id);if(bb)multiDragOff[id]={x:p.x-bb.x,y:p.y-bb.y}})}else multiDragOff=null;snap();renderAll()});
    } else {
      shapeSVG.addEventListener('click',ev=>{ev.stopPropagation();if(ev.shiftKey)selIds.has(b.id)?selIds.delete(b.id):selIds.add(b.id);else{selIds.clear();selIds.add(b.id)}selRoad=selPath=null;renderAll()});
    }
    shapeSVG.addEventListener('dblclick',ev=>{ev.stopPropagation();const r=canvasEl.getBoundingClientRect();zoom=Math.min(3,zoom+.5);panX=r.width/2-cx*zoom;panY=r.height/2-cy*zoom;applyTr()});
    svgEl.appendChild(g);
  }

  if(drawMode&&drawPts.length>0){
    let d=`M ${drawPts[0].x} ${drawPts[0].y}`;for(let i=1;i<drawPts.length;i++)d+=` L ${drawPts[i].x} ${drawPts[i].y}`;
    const col=drawType==='footpath'?'#10b981':'#f59e0b';
    svgEl.appendChild(mkEl('path',{d,stroke:col,'stroke-width':drawType==='footpath'?4:6,fill:'none','stroke-dasharray':'8 4','stroke-linecap':'round'}));
    drawPts.forEach(pt=>svgEl.appendChild(mkEl('circle',{cx:pt.x,cy:pt.y,r:5,fill:col,stroke:'white','stroke-width':1.5})));
    const last=drawPts[drawPts.length-1];
    svgEl.appendChild(mkEl('line',{x1:last.x,y1:last.y,x2:curPos.x,y2:curPos.y,stroke:col,'stroke-width':2,opacity:.4,'stroke-dasharray':'5 4'}));
  }

  if(snapOn&&editMode)svgEl.appendChild(mkEl('circle',{cx:sv(curPos.x),cy:sv(curPos.y),r:3,fill:'#f59e0b',opacity:.5}));

  updateStatus();
  if(svgStripOpen)document.getElementById('svg-strip-ta').value=buildSVG(false);
}

function makeShapeEl(b,isSel){
  const cx=b.x+b.width/2,cy=b.y+b.height/2;
  const sw=isSel?2.5:1.5,sc=isSel?'#f59e0b':b.strokeColor;
  if(b.shape==='circle')return mkEl('circle',{cx,cy,r:Math.min(b.width,b.height)/2,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='ellipse')return mkEl('ellipse',{cx,cy,rx:b.width/2,ry:b.height/2,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='hexagon'){const r2=Math.min(b.width,b.height)/2;const pts=Array.from({length:6},(_,i)=>{const a=Math.PI/180*(60*i-30);return`${cx+r2*Math.cos(a)},${cy+r2*Math.sin(a)}`}).join(' ');return mkEl('polygon',{points:pts,fill:b.fillColor,stroke:sc,'stroke-width':sw})}
  if(b.shape==='diamond')return mkEl('polygon',{points:`${cx},${b.y} ${b.x+b.width},${cy} ${cx},${b.y+b.height} ${b.x},${cy}`,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='octagon'){const d2=Math.min(b.width,b.height)*.25;const pts=`${b.x+d2},${b.y} ${b.x+b.width-d2},${b.y} ${b.x+b.width},${b.y+d2} ${b.x+b.width},${b.y+b.height-d2} ${b.x+b.width-d2},${b.y+b.height} ${b.x+d2},${b.y+b.height} ${b.x},${b.y+b.height-d2} ${b.x},${b.y+d2}`;return mkEl('polygon',{points:pts,fill:b.fillColor,stroke:sc,'stroke-width':sw})}
  if(b.shape==='triangle')return mkEl('polygon',{points:`${cx},${b.y} ${b.x+b.width},${b.y+b.height} ${b.x},${b.y+b.height}`,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='pentagon'){const pts=Array.from({length:5},(_,i)=>{const a=Math.PI/180*(72*i-90);return`${cx+(b.width/2)*Math.cos(a)},${cy+(b.height/2)*Math.sin(a)}`}).join(' ');return mkEl('polygon',{points:pts,fill:b.fillColor,stroke:sc,'stroke-width':sw})}
  return mkEl('rect',{x:b.x,y:b.y,width:b.width,height:b.height,rx:4,fill:b.fillColor,stroke:sc,'stroke-width':sw});
}

function addPathHandles(item,collection){
  const pts=[{key:'start',pos:item.start},...item.segments.flatMap((seg,i)=>{const r=[{key:`e${i}`,pos:seg.end}];if(seg.type==='C'){if(seg.cp1)r.push({key:`c${i}p1`,pos:seg.cp1,isH:true});if(seg.cp2)r.push({key:`c${i}p2`,pos:seg.cp2,isH:true})}return r})];
  pts.forEach(({key,pos,isH})=>{
    if(!pos)return;
    const isFP=collection==='footpaths';const c=mkEl('circle',{cx:pos.x,cy:pos.y,r:isH?4:6,fill:isH?(isFP?'#86efac':'#7dd3fc'):(isFP?'#10b981':'#f59e0b'),stroke:'white','stroke-width':1.5,cursor:'move'});
    c.addEventListener('mousedown',e=>{e.stopPropagation();if(collection==='roads')selRoad=item.id;else selPath=item.id;renderAll();const mm=ev=>{const p=toCanvas(ev.clientX,ev.clientY);const nx=sv(p.x),ny=sv(p.y);ST[collection]=ST[collection].map(r=>{if(r.id!==item.id)return r;if(key==='start')return{...r,start:{x:nx,y:ny}};if(key.startsWith('e')){const i2=parseInt(key.slice(1));return{...r,segments:r.segments.map((s,j)=>j===i2?{...s,end:{x:nx,y:ny}}:s)}}const m=key.match(/^c(\d+)(p[12])$/);if(m){const i2=parseInt(m[1]),h=m[2];return{...r,segments:r.segments.map((s,j)=>{if(j!==i2||s.type!=='C')return s;return h==='p1'?{...s,cp1:{x:nx,y:ny}}:{...s,cp2:{x:nx,y:ny}}})}}return r});renderSVG()};const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave()};window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu)});
    svgEl.appendChild(c);
  });
}

svgEl&&svgEl.addEventListener('mousemove',()=>{if(drawMode)renderSVG()});

function updateStatus(){
  const el=document.getElementById('bb-status');
  if(el)el.textContent=`${ST.buildings.length} buildings · ${ST.roads.length} roads · ${(ST.footpaths||[]).length} paths`;
}

function finishDraw(){
  if(drawPts.length<2){drawMode=false;drawPts=[];renderAll();return}
  snap();const id=`${drawType}-${Date.now()%100000}`;
  if(drawType==='footpath'){ST.footpaths=[...ST.footpaths,{id,label:`Path ${(ST.footpaths||[]).length+1}`,start:drawPts[0],segments:drawPts.slice(1).map(p=>({type:'L',end:p})),color:'#D4B896',width:10,style:'solid'}];selPath=id;editTarget='roads'}
  else{ST.roads=[...ST.roads,{id,label:`Road ${ST.roads.length+1}`,start:drawPts[0],segments:drawPts.slice(1).map(p=>({type:'L',end:p})),color:'#FDE68A',width:44,showDashes:false}];selRoad=id;editTarget='roads'}
  drawMode=false;drawPts=[];scheduleSave();renderAll()
}

      nav.appendChild(mkTBtn('tbtn-blue','<i class="ti ti-walk"></i>Path',()=>{drawMode=true;drawType='footpath';drawPts=[];renderNav()}));
      nav.appendChild(mkTBtn('tbtn-ghost','<i class="ti ti-circle-plus"></i>Junction',()=>{snap();ST.junctions=[...ST.junctions,{id:`j-${Date.now()%100000}`,x:700,y:398}];scheduleSave();renderSVG()}));
    }
  }

  if(drawMode){
    const isFP=drawType==='footpath';
    const ban=document.createElement('div');ban.className='draw-banner'+(isFP?' fp-draw-banner':'');
    ban.innerHTML=`<i class="ti ti-pencil"></i>${isFP?'Drawing Path':'Drawing Road'} &middot; ${drawPts.length} pts`;
    if(drawPts.length>0){const ub2=mkTBtn('tbtn-ghost','<i class="ti ti-corner-left-up"></i>Undo pt',()=>{drawPts=drawPts.slice(0,-1);renderSVG();renderNav()});ban.appendChild(ub2)}
    const fb=mkTBtn('tbtn-green','<i class="ti ti-check"></i>Finish',finishDraw);fb.disabled=drawPts.length<2;ban.appendChild(fb);
    const xb=document.createElement('button');xb.style.cssText='background:none;border:none;color:#7a7060;cursor:pointer;font-size:18px;padding:0 4px;line-height:1';xb.textContent='\u00d7';xb.onclick=cancelDraw;ban.appendChild(xb);
    nav.appendChild(ban);
  }

  nav.appendChild(mkDiv('nav-sp'));

  nav.appendChild(mkIBtn('ti-upload','Import JSON',importJSON,''));
  nav.appendChild(mkIBtn('ti-file-code','Import HTML',importHTML,''));
  nav.appendChild(mkTBtn('tbtn-amber','<i class="ti ti-download"></i>Export',()=>showExportMenu()));
  nav.appendChild(mkDiv('nav-div'));
  nav.appendChild(mkIBtn('ti-help','Keyboard shortcuts (?)',showHelp,''));
  nav.appendChild(mkIBtn('ti-refresh','Reset map',doReset,''));
}

let exportMenuEl=null;
function showExportMenu(){
  if(exportMenuEl){exportMenuEl.remove();exportMenuEl=null;return}
  const m=document.createElement('div');
  m.style.cssText='position:fixed;top:52px;right:10px;background:var(--bg-panel);border:1px solid var(--border-t);border-radius:5px;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:500;min-width:150px;overflow:hidden';
  const items=[
    {icon:'ti-file-type-svg',label:'SVG file',fn:downloadSVG},
    {icon:'ti-photo',label:'PNG file',fn:downloadPNG},
    {icon:'ti-file-type-json',label:'JSON file',fn:exportJSON},
    {icon:'ti-code',label:'SVG panel',fn:()=>{openSVGStrip();m.remove();exportMenuEl=null}},
  ];
  items.forEach(({icon,label,fn})=>{
    const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-primary);border-bottom:1px solid var(--border-t)';
    row.innerHTML=`<i class="ti ${icon}" style="font-size:13px;color:var(--text-tertiary)"></i>${label}`;
    row.onmouseenter=()=>row.style.background='var(--bg-secondary)';row.onmouseleave=()=>row.style.background='';
    row.onclick=()=>{fn();m.remove();exportMenuEl=null};
    m.appendChild(row);
  });
  document.body.appendChild(m);exportMenuEl=m;
  const close=e=>{if(!m.contains(e.target)){m.remove();exportMenuEl=null;document.removeEventListener('click',close)}};
  setTimeout(()=>document.addEventListener('click',close),10);
}

function addField(p,lbl,fn){const w=document.createElement('div');const l=document.createElement('label');l.className='flabel';l.textContent=lbl;w.appendChild(l);w.appendChild(fn());p.appendChild(w)}

function renderRside(){
  const rs=document.getElementById('rside');if(!rs)return;
  const arr=[...selIds];
  const b=arr.length===1?ST.buildings.find(x=>x.id===arr[0]):null;
  const road=ST.roads.find(x=>x.id===selRoad);
  const fp=(ST.footpaths||[]).find(x=>x.id===selPath);
  const multi=arr.length>1;
  if(!b&&!road&&!fp&&!multi){rs.style.display='none';return}
  rs.style.display='flex';rs.innerHTML='';

  if(multi&&!b){
    const sh=mkRsideHdr(`${arr.length} selected`,null,[
      {icon:'ti-copy',fn:doDup,title:'Duplicate'},
      {icon:'ti-trash',fn:()=>{snap();M.del(selIds);selIds.clear();scheduleSave();renderAll()},title:'Delete all',red:true},
    ]);
    rs.appendChild(sh);
    const ab=document.createElement('div');ab.style.cssText='padding:8px 12px;border-bottom:1px solid var(--border-t);background:var(--bg-secondary)';
    const al=document.createElement('div');al.style.cssText='font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:5px';al.textContent='Align & Distribute';ab.appendChild(al);
    const ar=document.createElement('div');ar.className='align-row';
    [['ti-layout-align-left','Align left','l'],['ti-layout-align-center','Centre H','cx'],['ti-layout-align-right','Align right','r'],['ti-layout-align-top','Align top','t'],['ti-layout-align-middle','Centre V','cy'],['ti-layout-align-bottom','Align bottom','b'],['ti-spacing-horizontal','Distribute H','dh'],['ti-spacing-vertical','Distribute V','dv']].forEach(([ic,ti,ty])=>{
      const btn=document.createElement('button');btn.className='abtn';btn.title=ti;btn.innerHTML=`<i class="ti ${ic}"></i>`;btn.onclick=()=>doAlign(ty);ar.appendChild(btn)});
    ab.appendChild(ar);rs.appendChild(ab);
    const sb=document.createElement('div');sb.className='rside-body';
    addField(sb,'Fill all',()=>{const w=document.createElement('div');w.className='sw-grid';FILL_COLS.forEach(({l,v})=>{const s=document.createElement('button');s.className='sw';s.style.background=v;s.title=l;s.onclick=()=>{snap();ST.buildings=ST.buildings.map(b2=>selIds.has(b2.id)?{...b2,fillColor:v}:b2);scheduleSave();renderSVG()};w.appendChild(s)});return w});
    rs.appendChild(sb);return;
  }

  if(b){
    const isEdit=editMode&&editTarget==='buildings';
    const cat=b.category,cc=CAT_FILL[cat]||'#E5E7EB';
    const extra=isEdit?[
      {icon:'ti-copy',fn:doDup,title:'Duplicate'},
      {icon:'ti-arrow-bar-to-up',fn:()=>{snap();M.toFront(b.id);scheduleSave();renderAll()},title:'Bring to front'},
      {icon:'ti-chevron-up',fn:()=>{snap();M.fwd(b.id);scheduleSave();renderAll()},title:'Forward'},
      {icon:'ti-chevron-down',fn:()=>{snap();M.bwd(b.id);scheduleSave();renderAll()},title:'Backward'},
      {icon:'ti-arrow-bar-to-down',fn:()=>{snap();M.toBack(b.id);scheduleSave();renderAll()},title:'Send to back'},
      {icon:'ti-trash',fn:()=>{snap();M.del(new Set([b.id]));selIds.clear();scheduleSave();renderAll()},title:'Delete',red:true},
    ]:[];
    rs.appendChild(mkRsideHdr((b.label||'Element').replace(/\n/g,' ').slice(0,24),`<span class="badge" style="background:${cc};color:#374151">${cat}</span>`,extra));
    const sb=document.createElement('div');sb.className='rside-body';
    addField(sb,'Label',()=>{const ta=document.createElement('textarea');ta.className='ftxt';ta.rows=2;ta.value=b.label||'';ta.disabled=!isEdit;ta.oninput=()=>updB(b.id,'label',ta.value);return ta});
    addField(sb,'Category',()=>{const sel=document.createElement('select');sel.className='fsel';sel.disabled=!isEdit;CATS.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;if(c===b.category)o.selected=true;sel.appendChild(o)});sel.onchange=()=>updB(b.id,'category',sel.value);return sel});
    addField(sb,'Notes',()=>{const ta=document.createElement('textarea');ta.className='ftxt';ta.rows=2;ta.value=b.notes||'';ta.disabled=!isEdit;ta.placeholder='Add description\u2026';ta.oninput=()=>updB(b.id,'notes',ta.value);return ta});
    if(isEdit){
      addField(sb,'Shape',()=>{
        const w=document.createElement('div');w.className='shape-opts';
        ALL_SHAPES.forEach(sh=>{
          const opt=document.createElement('div');opt.className='shape-opt'+(b.shape===sh.id?' on':'');
          opt.innerHTML=`<svg viewBox="0 0 20 20" fill="currentColor">${sh.svg}</svg><span>${sh.label}</span>`;
          opt.onclick=()=>updB(b.id,'shape',sh.id);w.appendChild(opt)});
        return w});
      addField(sb,`Font size \u00b7 ${b.fontSize||9.5}px`,()=>{const rr=document.createElement('div');rr.className='range-row';const inp=document.createElement('input');inp.type='range';inp.min=6;inp.max=24;inp.step=.5;inp.value=b.fontSize||9.5;const val=document.createElement('span');val.className='range-val';val.textContent=(b.fontSize||9.5)+'px';inp.oninput=()=>{val.textContent=inp.value+'px';updB(b.id,'fontSize',parseFloat(inp.value))};rr.appendChild(inp);rr.appendChild(val);return rr});
      addField(sb,'Fill',()=>{const w=document.createElement('div');w.className='sw-grid';FILL_COLS.forEach(({l,v})=>{const s=document.createElement('button');s.className='sw'+(b.fillColor===v?' on':'');s.style.background=v;s.title=l;s.onclick=()=>updB(b.id,'fillColor',v);w.appendChild(s)});const cpw=document.createElement('label');cpw.className='sw-custom';cpw.title='Custom';cpw.innerHTML='+<input type="color" value="'+b.fillColor+'">';cpw.querySelector('input').oninput=ev=>updB(b.id,'fillColor',ev.target.value);w.appendChild(cpw);return w});
      addField(sb,'Position',()=>{const g=document.createElement('div');g.className='frow';['x','y'].forEach(ax=>{const d=document.createElement('div');d.innerHTML=`<div class="flabel">${ax.toUpperCase()}</div>`;const inp=document.createElement('input');inp.type='number';inp.className='finp';inp.value=Math.round(b[ax]);inp.style.marginTop='2px';inp.oninput=()=>updB(b.id,ax,sv(parseFloat(inp.value)||0));d.appendChild(inp);g.appendChild(d)});return g});
      addField(sb,'Size',()=>{const g=document.createElement('div');g.className='frow';[['width','W'],['height','H']].forEach(([k,l])=>{const d=document.createElement('div');d.innerHTML=`<div class="flabel">${l}</div>`;const inp=document.createElement('input');inp.type='number';inp.className='finp';inp.value=Math.round(b[k]);inp.style.marginTop='2px';inp.oninput=()=>updB(b.id,k,Math.max(10,parseFloat(inp.value)||10));d.appendChild(inp);g.appendChild(d)});return g});
      addField(sb,'Rotation',()=>{const rr=document.createElement('div');rr.className='range-row';const inp=document.createElement('input');inp.type='range';inp.min=-180;inp.max=180;inp.step=1;inp.value=b.rotation||0;const val=document.createElement('span');val.className='range-val';val.textContent=(b.rotation||0)+'\u00b0';const ni=document.createElement('input');ni.type='number';ni.className='finp';ni.style.cssText='width:52px;flex-shrink:0';ni.value=Math.round(b.rotation||0);inp.oninput=()=>{val.textContent=inp.value+'\u00b0';ni.value=inp.value;updB(b.id,'rotation',parseFloat(inp.value))};ni.oninput=()=>{inp.value=ni.value;val.textContent=ni.value+'\u00b0';updB(b.id,'rotation',parseFloat(ni.value)||0)};rr.appendChild(inp);rr.appendChild(val);rr.appendChild(ni);return rr});
      addField(sb,'Stroke',()=>{const w=document.createElement('div');w.style.cssText='display:flex;align-items:center;gap:7px';const cpw=document.createElement('label');cpw.className='sw-custom';cpw.style.cssText=`width:32px;height:24px;border-radius:3px;background:${b.strokeColor};border:1.5px solid var(--border-t)`;cpw.innerHTML=`<input type="color" value="${b.strokeColor}">`;cpw.querySelector('input').oninput=ev=>{cpw.style.background=ev.target.value;updB(b.id,'strokeColor',ev.target.value)};const lbl=document.createElement('span');lbl.style.cssText='font-size:10px;color:var(--text-tertiary)';lbl.textContent=b.strokeColor;w.appendChild(cpw);w.appendChild(lbl);return w});
    } else if(b.notes){
      const c=document.createElement('div');c.className='callout';c.innerHTML=`<div class="callout-lbl">About</div><div style="font-size:11px;color:var(--text-secondary);line-height:1.6">${b.notes}</div>`;sb.appendChild(c);
    }
    rs.appendChild(sb);return;
  }

  if(road||fp){
    const item=road||fp;const c=road?'roads':'footpaths';const isFP=!!fp;
    rs.appendChild(mkRsideHdr(item.label.slice(0,22),null,[{icon:'ti-trash',fn:()=>{snap();if(c==='roads'){M.delR(item.id);selRoad=null}else{M.delFP(item.id);selPath=null}scheduleSave();renderAll()},title:'Delete',red:true}]));
    const sb=document.createElement('div');sb.className='rside-body';
    const tip=document.createElement('div');tip.style.cssText=`background:rgba(200,134,10,.07);border:1px solid rgba(200,134,10,.2);border-left:3px solid #c8860a;border-radius:4px;padding:6px 9px;font-size:10px;color:#e8c96a;line-height:1.5`;tip.textContent='Drag \u25cb anchors to reshape \u00b7 \u25e6 to curve';sb.appendChild(tip);
    addField(sb,'Name',()=>{const inp=document.createElement('input');inp.type='text';inp.className='finp';inp.value=item.label;inp.oninput=()=>updR(item.id,'label',inp.value,c);return inp});

    addField(sb,'Color',()=>{const w=document.createElement('div');w.className='sw-grid';cols.forEach(({l,v})=>{const s=document.createElement('button');s.className='sw'+(item.color===v?' on':'');s.style.background=v;s.title=l;s.onclick=()=>updR(item.id,'color',v,c);w.appendChild(s)});return w});
    addField(sb,`Width \u00b7 ${item.width}px`,()=>{const rr=document.createElement('div');rr.className='range-row';const inp=document.createElement('input');inp.type='range';inp.min=isFP?4:12;inp.max=isFP?30:80;inp.step=1;inp.value=item.width;inp.oninput=()=>updR(item.id,'width',parseInt(inp.value),c);rr.appendChild(inp);return rr});
    if(!isFP)addField(sb,'Dashes',()=>{const t=document.createElement('button');t.className='tog'+(item.showDashes?' on':'');t.innerHTML='<span class="tog-k"></span>';t.onclick=()=>updR(item.id,'showDashes',!item.showDashes,c);return t});
    if(isFP)addField(sb,'Style',()=>{const sel=document.createElement('select');sel.className='fsel';['solid','dashed','dotted'].forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s[0].toUpperCase()+s.slice(1);if(s===item.style)o.selected=true;sel.appendChild(o)});sel.onchange=()=>updR(item.id,'style',sel.value,c);return sel});
    rs.appendChild(sb);
  }
}

  const td=document.createElement('div');td.className='rside-title';td.textContent=title;if(badge){const bd=document.createElement('div');bd.innerHTML=badge;td.appendChild(bd)}sh.appendChild(td);
  const ba=document.createElement('div');ba.style.cssText='display:flex;align-items:center;gap:4px';
  (actions||[]).forEach(({icon,fn,title:t,red})=>{const b=document.createElement('button');b.style.cssText=`width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:3px;border:1.5px solid ${red?'rgba(153,27,27,.4)':'var(--border-t)'};background:${red?'rgba(153,27,27,.1)':'var(--bg-input)'};color:${red?'#fca5a5':'var(--text-secondary)'};cursor:pointer;font-size:11px`;b.title=t;b.innerHTML=`<i class="ti ${icon}"></i>`;b.onclick=fn;ba.appendChild(b)});
  const xb=document.createElement('button');xb.style.cssText='background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:18px;padding:0';xb.textContent='\u00d7';xb.onclick=()=>{selIds.clear();selRoad=selPath=null;renderAll()};ba.appendChild(xb);
  sh.appendChild(ba);return sh;
}

function initSearch(){
  const searchInp=document.getElementById('search-inp');
  const searchRes=document.getElementById('search-results');
  if(!searchInp)return;
  searchInp.addEventListener('input',()=>{
    const q=searchInp.value.trim().toLowerCase();if(!q){searchRes.style.display='none';return}
    const hits=ST.buildings.filter(b=>(b.label||'').toLowerCase().includes(q)||(b.category||'').toLowerCase().includes(q)||(b.notes||'').toLowerCase().includes(q));
    if(!hits.length){searchRes.style.display='none';return}
    searchRes.style.display='block';searchRes.innerHTML='';
    hits.slice(0,8).forEach(b=>{const it=document.createElement('div');it.className='sr-item';const cc=CAT_FILL[b.category]||'#E5E7EB';it.innerHTML=`<div style="width:9px;height:9px;border-radius:2px;background:${cc};flex-shrink:0"></div><span>${(b.label||'').replace(/\n/g,' ')}</span><span style="margin-left:auto;font-size:9px;color:var(--text-tertiary)">${b.category}</span>`;it.onclick=()=>{selIds.clear();selIds.add(b.id);const cx=b.x+b.width/2,cy=b.y+b.height/2;const r=canvasEl.getBoundingClientRect();zoom=2;panX=r.width/2-cx*zoom;panY=r.height/2-cy*zoom;applyTr();searchInp.value='';searchRes.style.display='none';renderAll()};searchRes.appendChild(it)});
  });
  document.addEventListener('click',e=>{if(!searchRes.contains(e.target)&&e.target!==searchInp)searchRes.style.display='none'});
}

// ═══════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════
function toast(msg,type='amber'){
  const c={amber:'background:#fdf3dc;border:1px solid #e8c96a;color:#c8860a',green:'background:#ecfdf5;border:1px solid #6ee7b7;color:#059669',red:'background:#fef2f2;border:1px solid #fca5a5;color:#991b1b'};
  const t=document.createElement('div');t.className='toast';t.style.cssText=c[type]||c.amber;t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),350)},2000);
}

// ═══════════════════════════════════════════════════════════
//  FULL RENDER
// ═══════════════════════════════════════════════════════════
function renderAll(){renderNav();renderSVG();renderRside();renderLegend();renderLside();renderBottomBar()}

// ═══════════════════════════════════════════════════════════
//  FIX 5: INIT — all DOM work inside DOMContentLoaded
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  try{
    // Grab DOM refs
    canvasEl=document.getElementById('canvas-wrap');
    trRoot=document.getElementById('transform-root');
    svgEl=document.getElementById('map-svg');

    // Set SVG dimensions
    svgEl.setAttribute('width',MAP_W+40);
    svgEl.setAttribute('height',MAP_H+24);
    svgEl.style.display='block';
    svgEl.style.overflow='visible';

    // SVG click listener (needs svgEl)
    svgEl.addEventListener('mousemove',()=>{if(drawMode)renderSVG()});
    svgEl.addEventListener('click',e=>{
      if(drawMode){const p=toCanvas(e.clientX,e.clientY);drawPts=[...drawPts,{x:sv(p.x),y:sv(p.y)}];renderSVG();renderNav();return}
      if(e.target===svgEl){selIds.clear();selRoad=selPath=null;renderAll()}
    });

    // Left sidebar toggle
    document.getElementById('lside-tog').onclick=()=>{
      lsideCollapsed=!lsideCollapsed;
      const ls=document.getElementById('lside');ls.classList.toggle('collapsed',lsideCollapsed);
      document.getElementById('lside-title').style.display=lsideCollapsed?'none':'';
      document.getElementById('lside-tog').innerHTML=lsideCollapsed?'&#9654;':'&#9664;';
      renderLside();
    };

    // Init interactions and search
    initInteraction();
    initSearch();

    // Load saved state
    load();

    // First render
    renderAll();
    renderBottomBar();

    // FIX 6: use requestAnimationFrame + timeout for reliable fitView
    requestAnimationFrame(()=>{
      setTimeout(fitView,200);
    });

    // Hide loading overlay
    const overlay=document.getElementById('loading-overlay');
    if(overlay){
      overlay.classList.add('hidden');
      setTimeout(()=>overlay.remove(),400);
    }

  } catch(err){
    console.error('Campus Map init error:',err);
    const overlay=document.getElementById('loading-overlay');
    if(overlay){
      overlay.innerHTML=`<div class="loading-inner"><p style="color:#fca5a5">Failed to load</p><small style="color:#f87171">${err.message}</small><br><button onclick="location.reload()" style="margin-top:12px;padding:6px 16px;background:#c8860a;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600">Retry</button></div>`;
    }
  }
});
</script>
</body>
</html>
