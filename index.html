// ═══════════════════════════════════════════════════════
//  MAIN SVG RENDER
// ═══════════════════════════════════════════════════════
function renderSVG(){
  if(!svgEl)return;
  while(svgEl.firstChild)svgEl.removeChild(svgEl.firstChild);
  svgEl.appendChild(mkEl('rect',{x:0,y:0,width:MAP_W,height:MAP_H,fill:'#EEF0E8'}));

  if(ST.backgroundImage?.src){const bi=ST.backgroundImage;const imgEl=mkEl('image',{x:bi.x,y:bi.y,width:bi.w,height:bi.h,opacity:bi.opacity||0.5,preserveAspectRatio:'xMidYMid meet'});imgEl.setAttributeNS('http://www.w3.org/1999/xlink','href',bi.src);svgEl.appendChild(imgEl);
    if(!bi.locked&&editMode){const brd=mkEl('rect',{x:bi.x,y:bi.y,width:bi.w,height:bi.h,fill:'transparent',stroke:'#60a5fa','stroke-width':1.5,'stroke-dasharray':'8 5',cursor:'move'});brd.addEventListener('mousedown',e=>{e.stopPropagation();const start=toCanvas(e.clientX,e.clientY);const ox=bi.x,oy=bi.y;const mm=ev=>{const p=toCanvas(ev.clientX,ev.clientY);ST.backgroundImage={...ST.backgroundImage,x:Math.round(ox+p.x-start.x),y:Math.round(oy+p.y-start.y)};renderSVG()};const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave()};window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu)});svgEl.appendChild(brd)}}

  const gGrid=mkEl('g',{});renderGrid(gGrid);svgEl.appendChild(gGrid);

  for(const fp of(ST.footpaths||[])){const d=roadPath(fp);const isSel=selPath===fp.id&&editMode;if(isSel)svgEl.appendChild(mkEl('path',{d,stroke:'#f59e0b','stroke-width':fp.width+10,fill:'none','stroke-linecap':'round',opacity:.3}));svgEl.appendChild(mkEl('path',{d,stroke:'rgba(0,0,0,.12)','stroke-width':fp.width+2,fill:'none','stroke-linecap':'round'}));const da=fp.style==='dashed'?`${fp.width*1.5} ${fp.width}`:fp.style==='dotted'?`2 ${fp.width}`:'none';svgEl.appendChild(mkEl('path',{d,stroke:fp.color,'stroke-width':fp.width,fill:'none','stroke-linecap':'round','stroke-linejoin':'round','stroke-dasharray':da}));if(editMode&&editTarget==='roads')addPathHandles(fp,'footpaths')}

  for(const road of ST.roads){const d=roadPath(road);svgEl.appendChild(mkEl('path',{d,stroke:'#C8860A','stroke-width':road.width+8,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));svgEl.appendChild(mkEl('path',{d,stroke:road.color,'stroke-width':road.width,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));if(road.showDashes)svgEl.appendChild(mkEl('path',{d,stroke:'white','stroke-width':2,fill:'none','stroke-dasharray':'22 14','stroke-linecap':'round',opacity:.7}));if(selRoad===road.id&&editMode)svgEl.appendChild(mkEl('path',{d,stroke:'#f59e0b','stroke-width':road.width+14,fill:'none','stroke-linecap':'round',opacity:.2}));if(editMode&&editTarget==='roads')addPathHandles(road,'roads')}

  for(const j of(ST.junctions||[])){const isSel=selJunction===j.id;svgEl.appendChild(mkEl('circle',{cx:j.x,cy:j.y,r:28,fill:'#FDE68A',stroke:isSel?'#f59e0b':'#E6A800','stroke-width':3}));const h=mkEl('circle',{cx:j.x,cy:j.y,r:28,fill:'transparent',stroke:editMode?'#f59e0b':'transparent','stroke-width':editMode?1.5:0,cursor:editMode?'pointer':'default'});h.addEventListener('click',e=>{e.stopPropagation();if(!editMode)return;selJunction=selJunction===j.id?null:j.id;selIds.clear();selRoad=selPath=selPrim=null;renderAll()});h.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();showCtxMenu(e.clientX,e.clientY,[{icon:'ti-trash',label:'Delete Junction',danger:true,fn:()=>{snap();M.delJ(j.id);if(selJunction===j.id)selJunction=null;scheduleSave();renderAll()}}])});if(editMode&&editTarget==='roads')h.addEventListener('mousedown',e=>{if(e.button!==0)return;e.stopPropagation();const mm=ev=>{const p=toCanvas(ev.clientX,ev.clientY);ST.junctions=ST.junctions.map(jj=>jj.id===j.id?{...jj,x:sv(p.x),y:sv(p.y)}:jj);renderSVG()};const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave()};window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu)});svgEl.appendChild(h)}

  for(const b of ST.buildings){
    const cx=b.x+b.width/2,cy=b.y+b.height/2;const isSel=selIds.has(b.id);const isGate=b.isGate||b.category==='Gate';
    const gEl=mkEl('g',{});if(b.rotation)gEl.setAttribute('transform',`rotate(${b.rotation} ${cx} ${cy})`);
    if(isSel)gEl.appendChild(mkEl('rect',{x:b.x-5,y:b.y-5,width:b.width+10,height:b.height+10,rx:6,fill:'none',stroke:'#f59e0b','stroke-width':2,'stroke-dasharray':'6 3'}));
    const shapeEl=makeShapeEl(b,isSel);gEl.appendChild(shapeEl);
    if(b.isTree){const r2=Math.min(b.width,b.height)/2,nr=r2*.55;gEl.appendChild(mkEl('circle',{cx,cy,r:nr,fill:'#d9f99d',stroke:'none'}))}
    const fs=b.fontSize||9.5;
    if(b.label&&!b.isTree){
      const lines=b.label.split('\n').filter(Boolean);const lh=fs*1.3;const sy=cy-(lines.length*lh)/2+lh*.5;
      lines.forEach((line,i)=>{const t=mkEl('text',{x:cx,y:sy+i*lh,'text-anchor':'middle','dominant-baseline':'middle','font-size':fs,'font-family':"'Outfit',sans-serif",'font-weight':'700',fill:(isGate||b.fillColor==='#1F2937'||b.fillColor==='#374151')?'#F9FAFB':'#374151'});t.textContent=line;gEl.appendChild(t)});
    }
    if(isSel&&editMode&&editTarget==='buildings'&&selIds.size===1){const rh=mkEl('circle',{cx,cy:b.y-24,r:8,fill:'rgba(200,134,10,.2)',stroke:'#c8860a','stroke-width':1.5,cursor:'crosshair'});const rt=mkEl('text',{x:cx,y:b.y-23,'text-anchor':'middle','dominant-baseline':'middle','font-size':10,fill:'#e8c96a',style:'pointer-events:none'});rt.textContent='↻';rh.addEventListener('mousedown',ev=>{ev.stopPropagation();ev.preventDefault();const p=toCanvas(ev.clientX,ev.clientY);rotDrag={id:b.id,cx,cy,sa:Math.atan2(p.y-cy,p.x-cx)*180/Math.PI,or:b.rotation||0};snap()});gEl.appendChild(rh);gEl.appendChild(rt)}
    shapeEl.style.cursor=(editMode&&editTarget==='buildings')?'move':'pointer';
    if(editMode&&editTarget==='buildings'){
      shapeEl.addEventListener('mousedown',ev=>{ev.stopPropagation();const p=toCanvas(ev.clientX,ev.clientY);if(!ev.shiftKey&&!selIds.has(b.id))selIds.clear();selIds.add(b.id);selRoad=selPath=selPrim=selJunction=null;dragId=b.id;dragOff={x:p.x-b.x,y:p.y-b.y};if(selIds.size>1){multiDragOff={};selIds.forEach(id=>{const bb=ST.buildings.find(x=>x.id===id);if(bb)multiDragOff[id]={x:p.x-bb.x,y:p.y-bb.y}})}else multiDragOff=null;snapTargets=computeSnapTargets([...selIds]);snap();renderAll()});
      shapeEl.addEventListener('contextmenu',ev=>{ev.preventDefault();ev.stopPropagation();showCtxMenu(ev.clientX,ev.clientY,[{icon:'ti-copy',label:'Duplicate',fn:doDup},{icon:'ti-trash',label:'Delete',danger:true,fn:()=>{snap();M.del(new Set([b.id]));selIds.clear();scheduleSave();renderAll()}}])});
      shapeEl.addEventListener('dblclick',ev=>{ev.stopPropagation();startInlineEdit(b.id)});
    }else{
      shapeEl.addEventListener('click',ev=>{ev.stopPropagation();if(ev.shiftKey)selIds.has(b.id)?selIds.delete(b.id):selIds.add(b.id);else{selIds.clear();selIds.add(b.id)}selRoad=selPath=selPrim=selJunction=null;renderAll()});
    }
    svgEl.appendChild(gEl);
  }

  for(const p of(ST.primitives||[]))svgEl.appendChild(renderPrimitive(p,selPrim===p.id));

  const scaleG=mkEl('g',{});drawScaleBar(scaleG,ST.scaleBarPos.x,ST.scaleBarPos.y);svgEl.appendChild(scaleG);

  if(drawMode&&drawPts.length>0){let d=`M ${drawPts[0].x} ${drawPts[0].y}`;for(let i=1;i<drawPts.length;i++)d+=` L ${drawPts[i].x} ${drawPts[i].y}`;const col=drawType==='footpath'?'#10b981':'#f59e0b';svgEl.appendChild(mkEl('path',{d,stroke:col,'stroke-width':drawType==='footpath'?4:6,fill:'none','stroke-dasharray':'8 4','stroke-linecap':'round'}));drawPts.forEach(pt=>svgEl.appendChild(mkEl('circle',{cx:pt.x,cy:pt.y,r:5,fill:col,stroke:'white','stroke-width':1.5})));const last=drawPts[drawPts.length-1];svgEl.appendChild(mkEl('line',{x1:last.x,y1:last.y,x2:curPos.x,y2:curPos.y,stroke:col,'stroke-width':2,opacity:.4,'stroke-dasharray':'5 4'}))}
  if(snapOn&&editMode)svgEl.appendChild(mkEl('circle',{cx:sv(curPos.x),cy:sv(curPos.y),r:3,fill:'#f59e0b',opacity:.5}));

  updateStatus();if(svgStripOpen)document.getElementById('svg-strip-ta').value=buildSVG();if(showLayerPanel)renderLayerPanel();
}

function makeShapeEl(b,isSel){
  const cx=b.x+b.width/2,cy=b.y+b.height/2;const sw=isSel?2.5:1.5,sc=isSel?'#f59e0b':b.strokeColor;
  if(b.usePolygon&&b.polygon?.length>2){const pts=b.polygon.map(p=>`${p.x},${p.y}`).join(' ');return mkEl('polygon',{points:pts,fill:b.fillColor,stroke:sc,'stroke-width':sw})}
  if(b.shape==='circle')return mkEl('circle',{cx,cy,r:Math.min(b.width,b.height)/2,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='ellipse')return mkEl('ellipse',{cx,cy,rx:b.width/2,ry:b.height/2,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='hexagon'){const r2=Math.min(b.width,b.height)/2;const pts=Array.from({length:6},(_,i)=>{const a=Math.PI/180*(60*i-30);return`${cx+r2*Math.cos(a)},${cy+r2*Math.sin(a)}`}).join(' ');return mkEl('polygon',{points:pts,fill:b.fillColor,stroke:sc,'stroke-width':sw})}
  if(b.shape==='diamond')return mkEl('polygon',{points:`${cx},${b.y} ${b.x+b.width},${cy} ${cx},${b.y+b.height} ${b.x},${cy}`,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='octagon'){const d2=Math.min(b.width,b.height)*.25;const pts=`${b.x+d2},${b.y} ${b.x+b.width-d2},${b.y} ${b.x+b.width},${b.y+d2} ${b.x+b.width},${b.y+b.height-d2} ${b.x+b.width-d2},${b.y+b.height} ${b.x+d2},${b.y+b.height} ${b.x},${b.y+b.height-d2} ${b.x},${b.y+d2}`;return mkEl('polygon',{points:pts,fill:b.fillColor,stroke:sc,'stroke-width':sw})}
  return mkEl('rect',{x:b.x,y:b.y,width:b.width,height:b.height,rx:4,fill:b.fillColor,stroke:sc,'stroke-width':sw});
}

function addPathHandles(item,collection){
  const pts=[{key:'start',pos:item.start},...item.segments.flatMap((seg,i)=>{const r=[{key:`e${i}`,pos:seg.end}];if(seg.type==='C'){if(seg.cp1)r.push({key:`c${i}p1`,pos:seg.cp1,isH:true});if(seg.cp2)r.push({key:`c${i}p2`,pos:seg.cp2,isH:true})}return r})];
  pts.forEach(({key,pos,isH})=>{if(!pos)return;const isFP=collection==='footpaths';const c=mkEl('circle',{cx:pos.x,cy:pos.y,r:isH?4:6,fill:isFP?'#10b981':'#f59e0b',stroke:'white','stroke-width':1.5,cursor:'move'});c.addEventListener('mousedown',e=>{e.stopPropagation();if(collection==='roads')selRoad=item.id;else selPath=item.id;renderAll();const mm=ev=>{const p=toCanvas(ev.clientX,ev.clientY);const nx=sv(p.x),ny=sv(p.y);ST[collection]=ST[collection].map(r=>{if(r.id!==item.id)return r;if(key==='start')return{...r,start:{x:nx,y:ny}};if(key.startsWith('e')){const i2=parseInt(key.slice(1));return{...r,segments:r.segments.map((s,j)=>j===i2?{...s,end:{x:nx,y:ny}}:s)}}const m=key.match(/^c(\d+)(p[12])$/);if(m){const i2=parseInt(m[1]),h=m[2];return{...r,segments:r.segments.map((s,j)=>{if(j!==i2||s.type!=='C')return s;return h==='p1'?{...s,cp1:{x:nx,y:ny}}:{...s,cp2:{x:nx,y:ny}}})}}return r});renderSVG()};const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave()};window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu)});c.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();showCtxMenu(e.clientX,e.clientY,[{icon:'ti-trash',label:`Delete ${isFP?'Path':'Road'}`,danger:true,fn:()=>{snap();if(isFP){M.delFP(item.id);selPath=null}else{M.delR(item.id);selRoad=null}scheduleSave();renderAll()}}])});svgEl.appendChild(c)});
}

function computeSnapTargets(movingIds){const t=[];ST.buildings.forEach(b=>{if(movingIds.includes(b.id))return;t.push({type:'x',v:b.x},{type:'x',v:b.x+b.width},{type:'x',v:b.x+b.width/2},{type:'y',v:b.y},{type:'y',v:b.y+b.height},{type:'y',v:b.y+b.height/2})});return t}
function findSnap(val,type,w,h){const THRESH=16/zoom;let best=null,bestD=THRESH;snapTargets.forEach(t=>{if(t.type!==type)return;const edges=type==='x'?[val,val+w,val+w/2]:[val,val+h,val+h/2];edges.forEach(e=>{const d=Math.abs(e-t.v);if(d<bestD){bestD=d;best={snapV:t.v-(e-val),target:t}}})});return best}
function updateStatus(){const el=document.getElementById('bb-status');if(el)el.textContent=`${ST.buildings.length} shapes · ${ST.roads.length} roads · ${(ST.footpaths||[]).length} paths`}

// ─── INLINE RENAME ─────────────────────────────────────
function startInlineEdit(id){const b=ST.buildings.find(x=>x.id===id);if(!b)return;const existing=document.getElementById('inline-edit-input');if(existing)existing.remove();const cx=b.x+b.width/2,cy=b.y+b.height/2;const screenX=cx*zoom+panX,screenY=cy*zoom+panY;const inp=document.createElement('textarea');inp.id='inline-edit-input';inp.className='inline-edit';inp.value=(b.label||'').replace(/\\n/g,'\n');inp.rows=Math.max(1,(b.label||'').split('\n').length);inp.style.cssText=`left:${screenX}px;top:${screenY}px;transform:translate(-50%,-50%);width:${Math.max(100,b.width*zoom)}px;font-size:${Math.max(10,(b.fontSize||9.5)*zoom)}px`;canvasEl.appendChild(inp);inp.focus();inp.select();const finish=()=>{const val=inp.value.trim();inp.remove();if(val!==b.label){snap();M.upd(id,{label:val});scheduleSave();renderAll()}};inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();finish()}if(e.key==='Escape')inp.remove()});inp.addEventListener('blur',finish)}

function doCopy(){if(!selIds.size)return;const items=[...selIds].map(id=>ST.buildings.find(b=>b.id===id)).filter(Boolean);clipboard=JSON.parse(JSON.stringify(items));try{sessionStorage.setItem('cmap-clip',JSON.stringify(clipboard))}catch(e){}toast(`Copied ${items.length}`,'green')}
function doPaste(){if(!clipboard){try{const r=sessionStorage.getItem('cmap-clip');if(r)clipboard=JSON.parse(r)}catch(e){}}if(!clipboard?.length)return;snap();const newIds=new Set();clipboard.forEach(b=>{const nid=`${b.id}-p-${Date.now()%100000}`;M.add({...JSON.parse(JSON.stringify(b)),id:nid,x:b.x+SNAP,y:b.y+SNAP});newIds.add(nid)});selIds=newIds;scheduleSave();renderAll();toast(`Pasted ${newIds.size}`,'green')}

function finishDraw(){if(drawPts.length<2){drawMode=false;drawPts=[];renderAll();return}snap();const id=`${drawType}-${Date.now()%100000}`;if(drawType==='footpath'){ST.footpaths=[...ST.footpaths,{id,label:`Path ${(ST.footpaths||[]).length+1}`,start:drawPts[0],segments:drawPts.slice(1).map(p=>({type:'L',end:p})),color:'#D4B896',width:10,style:'solid'}];selPath=id;editTarget='roads'}else{ST.roads=[...ST.roads,{id,label:`Road ${ST.roads.length+1}`,start:drawPts[0],segments:drawPts.slice(1).map(p=>({type:'L',end:p})),color:'#FDE68A',width:44,showDashes:false}];selRoad=id;editTarget='roads'}drawMode=false;drawPts=[];scheduleSave();renderAll()}
function cancelDraw(){drawMode=false;drawPts=[];renderAll()}

function toggleLayerPanel(){showLayerPanel=!showLayerPanel;document.getElementById('layer-panel').classList.toggle('open',showLayerPanel);if(showLayerPanel)renderLayerPanel()}
function renderLayerPanel(){const list=document.getElementById('layer-list');if(!list)return;list.innerHTML='';[...ST.buildings].reverse().forEach(b=>{const item=document.createElement('div');item.className='layer-item'+(selIds.has(b.id)?' selected':'');const sw2=document.createElement('div');sw2.className='layer-swatch';sw2.style.background=b.fillColor;const nm=document.createElement('span');nm.style.cssText='flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';nm.textContent=(b.label||b.id).replace(/\n/g,' ');const acts=document.createElement('div');acts.className='layer-actions';const ub2=document.createElement('button');ub2.className='layer-action-btn';ub2.innerHTML='↑';ub2.onclick=e=>{e.stopPropagation();snap();M.fwd(b.id);scheduleSave();renderSVG();renderLayerPanel()};const db=document.createElement('button');db.className='layer-action-btn';db.innerHTML='↓';db.onclick=e=>{e.stopPropagation();snap();M.bwd(b.id);scheduleSave();renderSVG();renderLayerPanel()};acts.appendChild(ub2);acts.appendChild(db);item.appendChild(sw2);item.appendChild(nm);item.appendChild(acts);item.onclick=()=>{selIds=new Set([b.id]);renderAll()};list.appendChild(item)})}

// ═══════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════
function initInteraction(){
  document.getElementById('zoom-in').onclick=()=>{zoom=Math.min(zoom*1.2,8);applyTr()};
  document.getElementById('zoom-out').onclick=()=>{zoom=Math.max(zoom/1.2,.1);applyTr()};
  document.getElementById('zoom-fit').onclick=fitView;
  canvasEl.addEventListener('wheel',e=>{e.preventDefault();if(e.ctrlKey||e.metaKey){const r=canvasEl.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;const oz=zoom;zoom=e.deltaY<0?Math.min(zoom*1.1,8):Math.max(zoom/1.1,.1);panX=mx-(mx-panX)*zoom/oz;panY=my-(my-panY)*zoom/oz}else{panX-=e.deltaX||0;panY-=e.deltaY||0}applyTr()},{passive:false});
  window.addEventListener('keydown',e=>{if(e.code==='Space'&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)){if(!spaceDown){spaceDown=true;canvasEl.classList.add('pan-mode')}e.preventDefault()}});
  window.addEventListener('keyup',e=>{if(e.code==='Space'){spaceDown=false;if(!isPanning)canvasEl.classList.remove('pan-mode')}});
  canvasEl.addEventListener('mousedown',e=>{if(e.button===1||(e.button===0&&(e.altKey||spaceDown))){isPanning=true;panStart={x:e.clientX,y:e.clientY};panOrig={x:panX,y:panY};canvasEl.classList.add('pan-mode');e.preventDefault();return}if(e.button===0&&editMode&&editTarget==='buildings'&&!drawMode&&e.target===svgEl){const pt=toCanvas(e.clientX,e.clientY);selBox={active:true,start:{...pt},cur:{...pt}};if(!e.shiftKey)selIds.clear();e.preventDefault()}});
  const snapInd=document.getElementById('snap-indicator');
  window.addEventListener('mousemove',e=>{
    const pt=toCanvas(e.clientX,e.clientY);curPos={x:Math.round(pt.x),y:Math.round(pt.y)};
    const coords=document.getElementById('coords');if(coords)coords.textContent=`x:${curPos.x} y:${curPos.y}`;
    if(isPanning){panX=panOrig.x+(e.clientX-panStart.x);panY=panOrig.y+(e.clientY-panStart.y);applyTr();return}
    if(selBox.active){selBox.cur={...pt};const sb=document.getElementById('sel-box');const minX=Math.min(selBox.start.x,pt.x),minY=Math.min(selBox.start.y,pt.y),maxX=Math.max(selBox.start.x,pt.x),maxY=Math.max(selBox.start.y,pt.y);sb.style.display='block';sb.style.left=(minX*zoom+panX)+'px';sb.style.top=(minY*zoom+panY)+'px';sb.style.width=((maxX-minX)*zoom)+'px';sb.style.height=((maxY-minY)*zoom)+'px';return}
    if(rotDrag){const{cx,cy,sa,or}=rotDrag;const ang=Math.atan2(pt.y-cy,pt.x-cx)*180/Math.PI;let nr=or+(ang-sa);if(e.shiftKey)nr=Math.round(nr/15)*15;M.upd(rotDrag.id,{rotation:nr});renderSVG();return}
    if(compassDrag){ST.compassPos={x:Math.max(10,Math.min(MAP_W-80,Math.round(pt.x-compassDrag.ox))),y:Math.max(10,Math.min(MAP_H-80,Math.round(pt.y-compassDrag.oy)))};updateCompassOverlay();return}
    if(scaleBarDrag){ST.scaleBarPos={x:Math.max(10,Math.min(MAP_W-220,Math.round(pt.x-scaleBarDrag.ox))),y:Math.max(10,Math.min(MAP_H-50,Math.round(pt.y-scaleBarDrag.oy)))};renderSVG();return}
    if(dragId){const ids=[...selIds];let nx,ny;if(ids.length>1&&multiDragOff){const base=multiDragOff[dragId];const cur=ST.buildings.find(b=>b.id===dragId);nx=sv(pt.x-base.x);ny=sv(pt.y-base.y);const dx=nx-cur.x,dy=ny-cur.y;ST.buildings=ST.buildings.map(b=>{if(!ids.includes(b.id))return b;return{...b,x:Math.max(0,Math.min(b.x+dx,MAP_W-b.width)),y:Math.max(0,Math.min(b.y+dy,MAP_H-b.height))}})}else{const b=ST.buildings.find(b=>b.id===dragId);nx=sv(pt.x-dragOff.x);ny=sv(pt.y-dragOff.y);const sx2=findSnap(nx,'x',b.width,b.height),sy2=findSnap(ny,'y',b.width,b.height);if(sx2)nx=sx2.snapV;if(sy2)ny=sy2.snapV;if(sx2||sy2){const dispX=nx*zoom+panX,dispY=ny*zoom+panY;snapInd.style.display='block';snapInd.style.left=dispX+'px';snapInd.style.top=dispY+'px';snapInd.style.width=(b.width*zoom)+'px';snapInd.style.height=(b.height*zoom)+'px'}else snapInd.style.display='none';M.upd(dragId,{x:Math.max(0,Math.min(nx,MAP_W-b.width)),y:Math.max(0,Math.min(ny,MAP_H-b.height))})}renderSVG()}
    if(drawMode)renderSVG();
  });
  window.addEventListener('mouseup',e=>{
    if(isPanning){isPanning=false;if(!spaceDown)canvasEl.classList.remove('pan-mode')}

function doDup(){if(!selIds.size)return;snap();const newIds=new Set();[...selIds].forEach(id=>{const b=ST.buildings.find(x=>x.id===id);if(!b)return;const nid=`${id}-cp-${Date.now()%100000}`;M.add({...JSON.parse(JSON.stringify(b)),id:nid,x:b.x+SNAP,y:b.y+SNAP});newIds.add(nid)});selIds=newIds;scheduleSave();renderAll();toast(`Duplicated ${newIds.size}`)}

function addFromPreset(item){if(item.data.isPath){snap();const id=`fp-${Date.now()%100000}`;ST.footpaths=[...ST.footpaths,{id,label:item.data.label,start:{x:400,y:398},segments:[{type:'L',end:{x:600,y:398}}],color:item.data.color,width:item.data.width,style:item.data.style}];selPath=id;editTarget='roads';scheduleSave();renderAll();toast(`${item.label} added`);return}snap();const d=item.data;const id=`c-${Date.now()%100000}`;M.add({id,label:d.label,x:Math.round(MAP_W/2-d.w/2+Math.random()*80-40),y:Math.round(MAP_H/2-d.h/2+Math.random()*60-30),width:d.w,height:d.h,rotation:0,fillColor:d.fill,strokeColor:d.stroke||'#374151',notes:d.notes||'',shape:d.shape,category:d.cat,fontSize:9.5,isGate:d.isGate||false,isTree:d.isTree||false});selIds=new Set([id]);scheduleSave();renderAll();toast(`${item.label} added`)}
function doAlign(type){if(selIds.size<2)return;snap();const sel=ST.buildings.filter(b=>selIds.has(b.id));const minX=Math.min(...sel.map(b=>b.x)),maxX=Math.max(...sel.map(b=>b.x+b.width)),minY=Math.min(...sel.map(b=>b.y)),maxY=Math.max(...sel.map(b=>b.y+b.height));const cx=(minX+maxX)/2,cy=(minY+maxY)/2;ST.buildings=ST.buildings.map(b=>{if(!selIds.has(b.id))return b;if(type==='l')return{...b,x:minX};if(type==='r')return{...b,x:maxX-b.width};if(type==='cx')return{...b,x:cx-b.width/2};if(type==='t')return{...b,y:minY};if(type==='b')return{...b,y:maxY-b.height};if(type==='cy')return{...b,y:cy-b.height/2};return b});scheduleSave();renderSVG()}

  const rs=document.getElementById('rside');if(!rs)return;
  const arr=[...selIds];const b=arr.length===1?ST.buildings.find(x=>x.id===arr[0]):null;
  const road=ST.roads.find(x=>x.id===selRoad);const fp=(ST.footpaths||[]).find(x=>x.id===selPath);
  const prim=(ST.primitives||[]).find(x=>x.id===selPrim);const multi=arr.length>1;
  if(!b&&!road&&!fp&&!multi&&!prim){rs.style.display='none';return}
  rs.style.display='flex';rs.innerHTML='';
  if(prim){renderPrimPanel(rs,prim);return}
  if(multi&&!b){const sh=mkRsideHdr(`${arr.length} selected`,null,[{icon:'ti-copy',fn:doDup,title:'Duplicate'},{icon:'ti-trash',fn:()=>{snap();M.del(selIds);selIds.clear();scheduleSave();renderAll()},title:'Delete',red:true}]);rs.appendChild(sh);const ab=document.createElement('div');ab.style.cssText='padding:8px 12px;border-bottom:1px solid var(--border-t)';const al=document.createElement('div');al.style.cssText='font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:5px';al.textContent='Align';ab.appendChild(al);const ar=document.createElement('div');ar.className='align-row';[['ti-layout-align-left','Left','l'],['ti-layout-align-center','H Centre','cx'],['ti-layout-align-right','Right','r'],['ti-layout-align-top','Top','t'],['ti-layout-align-middle','V Centre','cy'],['ti-layout-align-bottom','Bottom','b']].forEach(([ic,ti,ty])=>{const btn=document.createElement('button');btn.className='abtn';btn.title=ti;btn.innerHTML=`<i class="ti ${ic}"></i>`;btn.onclick=()=>doAlign(ty);ar.appendChild(btn)});ab.appendChild(ar);rs.appendChild(ab);return}
  if(b){renderBuildingPanel(rs,b);return}
  if(road){renderRoadPanel(rs,road,'roads');return}
  if(fp)renderRoadPanel(rs,fp,'footpaths');
}

function renderBuildingPanel(rs,b){
  const isEdit=editMode&&editTarget==='buildings';const cat=b.category,cc=CAT_FILL[cat]||'#E5E7EB';
  rs.appendChild(mkRsideHdr((b.label||'Shape').replace(/\n/g,' ').slice(0,22),`<span class="badge" style="background:${cc};color:#374151">${cat}</span>`,[{icon:'ti-copy',fn:doDup,title:'Dup'},{icon:'ti-trash',fn:()=>{snap();M.del(new Set([b.id]));selIds.clear();scheduleSave();renderAll()},title:'Delete',red:true}]));
  const sb=document.createElement('div');sb.className='rside-body';
  addField(sb,'Label',()=>{const ta=document.createElement('textarea');ta.className='ftxt';ta.rows=2;ta.value=b.label||'';ta.disabled=!isEdit;ta.oninput=()=>updB(b.id,'label',ta.value);return ta});
  addField(sb,'Category',()=>{const sel=document.createElement('select');sel.className='fsel';sel.disabled=!isEdit;CATS.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;if(c===b.category)o.selected=true;sel.appendChild(o)});sel.onchange=()=>updB(b.id,'category',sel.value);return sel});
  // ── Always-visible transform inputs ──
  const txCard=document.createElement('div');
  txCard.style.cssText='background:var(--bg-secondary);border:1px solid var(--border-t);border-radius:5px;padding:8px 10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:2px';
  [['X','x'],['Y','y'],['°','rotation']].forEach(([lbl,key])=>{
    const wrap=document.createElement('div');
    const l=document.createElement('div');l.className='flabel';l.textContent=lbl;
    const inp=document.createElement('input');inp.type='number';inp.className='finp';
    inp.value=Math.round(key==='rotation'?(b.rotation||0):b[key]);
    inp.style.cssText='margin-top:2px;padding:4px 5px;font-size:11px';
    inp.title=key==='x'?'X position':key==='y'?'Y position':'Rotation (degrees)';
    inp.oninput=()=>{
      const v=parseFloat(inp.value)||0;
      if(key==='rotation'){M.upd(b.id,{rotation:v})}
      else if(key==='x'){M.upd(b.id,{x:Math.max(0,Math.min(v,MAP_W-b.width))})}
      else{M.upd(b.id,{y:Math.max(0,Math.min(v,MAP_H-b.height))})}
      scheduleSave();renderSVG();
    };
    wrap.appendChild(l);wrap.appendChild(inp);txCard.appendChild(wrap);
  });
  sb.appendChild(txCard);
  if(isEdit){
    addField(sb,'Shape',()=>{const w=document.createElement('div');w.className='shape-opts';ALL_SHAPES.forEach(sh=>{const opt=document.createElement('div');opt.className='shape-opt'+(b.shape===sh.id?' on':'');opt.innerHTML=`<svg viewBox="0 0 20 20" fill="currentColor">${sh.svg}</svg><span>${sh.label}</span>`;opt.onclick=()=>updB(b.id,'shape',sh.id);w.appendChild(opt)});return w});
    addField(sb,'Fill',()=>{const w=document.createElement('div');w.className='sw-grid';FILL_COLS.forEach(({l,v})=>{const s=document.createElement('button');s.className='sw'+(b.fillColor===v?' on':'');s.style.background=v;s.title=l;s.onclick=()=>updB(b.id,'fillColor',v);w.appendChild(s)});const cpw=document.createElement('label');cpw.className='sw-custom';cpw.title='Custom';cpw.innerHTML='+<input type="color" value="'+b.fillColor+'">';cpw.querySelector('input').oninput=ev=>updB(b.id,'fillColor',ev.target.value);w.appendChild(cpw);return w});
    addField(sb,'Position',()=>{const g=document.createElement('div');g.className='frow';['x','y'].forEach(ax=>{const d=document.createElement('div');d.innerHTML=`<div class="flabel">${ax.toUpperCase()}</div>`;const inp=document.createElement('input');inp.type='number';inp.className='finp';inp.value=Math.round(b[ax]);inp.style.marginTop='2px';inp.oninput=()=>updB(b.id,ax,parseFloat(inp.value)||0);d.appendChild(inp);g.appendChild(d)});return g});
    addField(sb,'Size',()=>{const g=document.createElement('div');g.className='frow';[['width','W'],['height','H']].forEach(([k,l])=>{const d=document.createElement('div');d.innerHTML=`<div class="flabel">${l}</div>`;const inp=document.createElement('input');inp.type='number';inp.className='finp';inp.value=Math.round(b[k]);inp.style.marginTop='2px';inp.oninput=()=>updB(b.id,k,Math.max(4,parseFloat(inp.value)||4));d.appendChild(inp);g.appendChild(d)});return g});
    addField(sb,'Rotation',()=>{const rr=document.createElement('div');rr.className='range-row';const inp=document.createElement('input');inp.type='range';inp.min=-180;inp.max=180;inp.step=1;inp.value=b.rotation||0;const val=document.createElement('span');val.className='range-val';val.textContent=(b.rotation||0)+'°';inp.oninput=()=>{val.textContent=inp.value+'°';updB(b.id,'rotation',parseFloat(inp.value))};rr.appendChild(inp);rr.appendChild(val);return rr});
    if(b.osmId){const osmInfo=document.createElement('div');osmInfo.className='callout';osmInfo.innerHTML=`<div class="callout-lbl">OSM Data</div><div style="font-size:10px;color:var(--text-secondary);line-height:1.5">${(b.notes||'').split('\n').slice(0,4).join('<br>')}</div><a href="https://www.openstreetmap.org/${b.osmId.includes('-')?'way':b.osmId.startsWith('r')?'relation':'way'}/${b.osmId.replace(/\D/g,'')}" target="_blank" style="font-size:9px;color:#60a5fa;display:block;margin-top:4px">View on OSM ↗</a>`;sb.appendChild(osmInfo)}
  }else if(b.notes){const c=document.createElement('div');c.className='callout';c.innerHTML=`<div class="callout-lbl">Info</div><div style="font-size:11px;color:var(--text-secondary);line-height:1.6">${b.notes}</div>`;sb.appendChild(c)}
  rs.appendChild(sb);
}

function renderRoadPanel(rs,item,c){
  const isFP=c==='footpaths';rs.appendChild(mkRsideHdr(item.label.slice(0,22),null,[{icon:'ti-trash',fn:()=>{snap();if(c==='roads'){M.delR(item.id);selRoad=null}else{M.delFP(item.id);selPath=null}scheduleSave();renderAll()},title:'Delete',red:true}]));
  const sb=document.createElement('div');sb.className='rside-body';
  addField(sb,'Name',()=>{const inp=document.createElement('input');inp.type='text';inp.className='finp';inp.value=item.label;inp.oninput=()=>updR(item.id,'label',inp.value,c);return inp});
  addField(sb,'Color',()=>{const w=document.createElement('div');w.className='sw-grid';const cols=isFP?[{l:'Tan',v:'#D4B896'},{l:'Stone',v:'#D1D5DB'},{l:'Brick',v:'#C2856A'},{l:'Green',v:'#86efac'}]:[{l:'Yellow',v:'#FDE68A'},{l:'Gray',v:'#E5E7EB'},{l:'White',v:'#F9FAFB'},{l:'Teal',v:'#99F6E4'}];cols.forEach(({l,v})=>{const s=document.createElement('button');s.className='sw'+(item.color===v?' on':'');s.style.background=v;s.title=l;s.onclick=()=>updR(item.id,'color',v,c);w.appendChild(s)});return w});
  addField(sb,`Width · ${item.width}px`,()=>{const rr=document.createElement('div');rr.className='range-row';const inp=document.createElement('input');inp.type='range';inp.min=isFP?2:6;inp.max=isFP?30:80;inp.step=1;inp.value=item.width;inp.oninput=()=>updR(item.id,'width',parseInt(inp.value),c);rr.appendChild(inp);return rr});
  if(isFP)addField(sb,'Style',()=>{const sel=document.createElement('select');sel.className='fsel';['solid','dashed','dotted'].forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s[0].toUpperCase()+s.slice(1);if(s===item.style)o.selected=true;sel.appendChild(o)});sel.onchange=()=>updR(item.id,'style',sel.value,c);return sel});
  if(!isFP)addField(sb,'Dashes',()=>{const t=document.createElement('button');t.className='tog'+(item.showDashes?' on':'');t.innerHTML='<span class="tog-k"></span>';t.onclick=()=>updR(item.id,'showDashes',!item.showDashes,c);return t});
  rs.appendChild(sb);
}

function renderPrimPanel(rs,prim){
  rs.appendChild(mkRsideHdr(prim.type,'',[{icon:'ti-trash',fn:()=>{snap();M.delPrim(prim.id);selPrim=null;scheduleSave();renderAll()},title:'Delete',red:true}]));
  const sb=document.createElement('div');sb.className='rside-body';
  addField(sb,'Color',()=>{const w=document.createElement('div');w.className='sw-grid';PRIM_COLS.forEach(v=>{const s=document.createElement('button');s.className='sw'+(prim.color===v?' on':'');s.style.background=v;s.onclick=()=>{M.updPrim(prim.id,{color:v});scheduleSave();renderSVG();renderRside()};w.appendChild(s)});return w});
  if(prim.type==='text-label'){addField(sb,'Text',()=>{const inp=document.createElement('input');inp.type='text';inp.className='finp';inp.value=prim.text||'';inp.oninput=()=>{M.updPrim(prim.id,{text:inp.value});renderSVG()};inp.onblur=()=>scheduleSave();return inp})}
  addField(sb,`Opacity`,()=>{const rr=document.createElement('div');rr.className='range-row';const inp=document.createElement('input');inp.type='range';inp.min=0.05;inp.max=1;inp.step=0.05;inp.value=prim.opacity||1;inp.oninput=()=>{M.updPrim(prim.id,{opacity:parseFloat(inp.value)});renderSVG()};inp.onmouseup=()=>scheduleSave();rr.appendChild(inp);return rr});
  rs.appendChild(sb);
}

function mkRsideHdr(title,badge,actions){const sh=document.createElement('div');sh.className='rside-hdr';const td=document.createElement('div');td.className='rside-title';td.textContent=title;if(badge){const bd=document.createElement('div');bd.innerHTML=badge;td.appendChild(bd)}sh.appendChild(td);const ba=document.createElement('div');ba.style.cssText='display:flex;align-items:center;gap:4px';(actions||[]).forEach(({icon,fn,title:t,red})=>{const b=document.createElement('button');b.style.cssText=`width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:3px;border:1.5px solid ${red?'rgba(153,27,27,.4)':'var(--border-t)'};background:${red?'rgba(153,27,27,.1)':'var(--bg-input)'};color:${red?'#fca5a5':'var(--text-secondary)'};cursor:pointer;font-size:11px`;b.title=t;b.innerHTML=`<i class="ti ${icon}"></i>`;b.onclick=fn;ba.appendChild(b)});const xb=document.createElement('button');xb.style.cssText='background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:18px;padding:0';xb.textContent='×';xb.onclick=()=>{selIds.clear();selRoad=selPath=selPrim=selJunction=null;renderAll()};ba.appendChild(xb);sh.appendChild(ba);return sh}

function renderBottomBar(){const bbr=document.getElementById('bb-right');if(!bbr)return;bbr.innerHTML='';const sl=document.createElement('div');sl.style.cssText='display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-tertiary)';sl.innerHTML=`<i class="ti ti-ruler" style="font-size:12px"></i>`;const si=document.createElement('input');si.type='number';si.min=0.1;si.max=100;si.step=0.1;si.value=ST.metersPerPixel||2.5;si.style.cssText='width:44px;background:var(--bg-input);border:1px solid var(--border-t);border-radius:3px;color:var(--text-primary);font-size:10px;padding:1px 4px;font-family:inherit';si.title='Metres per pixel';si.onchange=()=>{ST.metersPerPixel=parseFloat(si.value)||2.5;scheduleSave();renderSVG()};sl.appendChild(si);sl.appendChild(Object.assign(document.createElement('span'),{textContent:'m/px'}));bbr.appendChild(sl);bbr.appendChild(mkTBtn('tbtn-ghost'+(svgStripOpen?' tbtn-active':''),'<i class="ti ti-code"></i>SVG',()=>svgStripOpen?closeSVGStrip():openSVGStrip()))}

// ─── SEARCH ────────────────────────────────────────────
function initSearch(){const searchInp=document.getElementById('search-inp');const searchRes=document.getElementById('search-results');if(!searchInp)return;searchInp.addEventListener('input',()=>{const q=searchInp.value.trim().toLowerCase();if(!q){searchRes.style.display='none';return}const hits=ST.buildings.filter(b=>(b.label||'').toLowerCase().includes(q)||(b.category||'').toLowerCase().includes(q));if(!hits.length){searchRes.style.display='none';return}searchRes.style.display='block';searchRes.innerHTML='';hits.slice(0,8).forEach(b=>{const it=document.createElement('div');it.className='sr-item';const cc=CAT_FILL[b.category]||'#E5E7EB';it.innerHTML=`<div style="width:9px;height:9px;border-radius:2px;background:${cc};flex-shrink:0"></div><span>${(b.label||'').replace(/\n/g,' ')}</span><span style="margin-left:auto;font-size:9px;color:var(--text-tertiary)">${b.category}</span>`;it.onclick=()=>{selIds.clear();selIds.add(b.id);const cx=b.x+b.width/2,cy=b.y+b.height/2;const r=canvasEl.getBoundingClientRect();zoom=2;panX=r.width/2-cx*zoom;panY=r.height/2-cy*zoom;applyTr();searchInp.value='';searchRes.style.display='none';renderAll()};searchRes.appendChild(it)})});document.addEventListener('click',e=>{if(!searchRes.contains(e.target)&&e.target!==searchInp)searchRes.style.display='none'})}

function doReset(){if(!confirm('Reset map?'))return;snap();ST=JSON.parse(JSON.stringify(INITIAL_STATE));selIds.clear();selRoad=selPath=selPrim=selJunction=null;editMode=true;drawMode=false;drawPts=[];scheduleSave();renderCompassOverlay();renderAll();fitView()}
function toast(msg,type='amber'){const c={amber:'background:#fdf3dc;border:1px solid #e8c96a;color:#c8860a',green:'background:#ecfdf5;border:1px solid #6ee7b7;color:#059669',red:'background:#fef2f2;border:1px solid #fca5a5;color:#991b1b'};const t=document.createElement('div');t.className='toast';t.style.cssText=c[type]||c.amber;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),350)},2800)}
function renderAll(){try{renderNav();renderSVG();renderRside();renderLegend();renderLside();renderBottomBar();if(showLayerPanel)renderLayerPanel()}catch(err){console.error('renderAll error:',err)}}

// ─── INIT ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  try{
    canvasEl=document.getElementById('canvas-wrap');trRoot=document.getElementById('transform-root');svgEl=document.getElementById('map-svg');
    svgEl.setAttribute('width',MAP_W+60);svgEl.setAttribute('height',MAP_H+30);svgEl.style.cssText='display:block;overflow:visible';
    svgEl.addEventListener('mousemove',()=>{if(drawMode)renderSVG()});
    svgEl.addEventListener('click',e=>{
      if(drawMode){const p=toCanvas(e.clientX,e.clientY);drawPts=[...drawPts,{x:sv(p.x),y:sv(p.y)}];renderSVG();renderNav();return}
      if(e.target===svgEl){selIds.clear();selRoad=selPath=selPrim=selJunction=null;renderAll()}
    });
    svgEl.addEventListener('contextmenu',e=>{if(e.target===svgEl)e.preventDefault()});
    document.getElementById('lside-tog').onclick=()=>{lsideCollapsed=!lsideCollapsed;const ls=document.getElementById('lside');ls.classList.toggle('collapsed',lsideCollapsed);document.getElementById('lside-title').style.display=lsideCollapsed?'none':'';document.getElementById('lside-tog').innerHTML=lsideCollapsed?'&#9654;':'&#9664;';renderLside()};
    initInteraction();initSearch();initSidebarDrag();load();renderCompassOverlay();renderAll();renderBottomBar();
    requestAnimationFrame(()=>setTimeout(fitView,200));
    const overlay=document.getElementById('loading-overlay');if(overlay){overlay.classList.add('hidden');setTimeout(()=>overlay.remove(),400)}
  }catch(err){
    console.error('Init error:',err);
    const overlay=document.getElementById('loading-overlay');if(overlay)overlay.innerHTML=`<div class="loading-inner"><p style="color:#fca5a5">Error: ${err.message}</p><button onclick="location.reload()" style="margin-top:12px;padding:6px 16px;background:#c8860a;color:#fff;border:none;border-radius:4px;cursor:pointer">Retry</button></div>`;
  }
});
</script>
