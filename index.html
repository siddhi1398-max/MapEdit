<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campus Map Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#c8860a;--amber-bg:#fdf3dc;--amber-bd:#e8c96a;
  --green:#2d6a3f;--red:#9b2c2c;--blue:#1e40af;
  --bg-primary:#1a1814;--bg-secondary:#232118;--bg-tertiary:#2c2920;
  --bg-panel:#1e1c17;--bg-input:#272420;
  --text-primary:#f0ead8;--text-secondary:#c0b898;--text-tertiary:#6a6050;
  --border-t:rgba(100,88,60,.5);--border-s:rgba(140,120,80,.5);
  --canvas-bg:#e8e3d4;
}
html,body{height:100%;font-family:'Outfit',system-ui,-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg-tertiary);color:var(--text-primary);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.nav{display:flex;align-items:center;gap:6px;padding:0 10px;height:48px;background:#111009;border-bottom:1.5px solid #2e2a1e;flex-shrink:0;overflow:hidden;position:relative;z-index:50}
.nav-brand{display:flex;align-items:center;gap:7px;flex-shrink:0;margin-right:4px}
.nav-logo{width:28px;height:28px;background:linear-gradient(135deg,#c8860a,#e8a820);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-title{font-size:14px;font-weight:700;color:#f0ead8;letter-spacing:-.2px}
.nav-tag{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#5a5040;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);padding:1px 6px;border-radius:3px}
.nav-div{width:1px;height:24px;background:rgba(255,255,255,.08);flex-shrink:0;margin:0 2px}
.save-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px;border:1.5px solid;flex-shrink:0;transition:all .2s}
.ibtn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#7a7060;cursor:pointer;transition:all .12s;flex-shrink:0;font-size:14px}
.ibtn:hover{background:rgba(255,255,255,.1);color:#c8c0a8;border-color:rgba(255,255,255,.2)}
.ibtn.active{background:rgba(200,134,10,.18);border-color:#c8860a;color:#e8c96a}
.ibtn:disabled{opacity:.3;cursor:default;pointer-events:none}
.tbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;height:32px;border-radius:5px;font-family:'Outfit',system-ui,sans-serif;font-size:11px;font-weight:600;letter-spacing:.3px;cursor:pointer;border:1.5px solid;transition:all .12s;white-space:nowrap;flex-shrink:0}
.tbtn-ghost{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#7a7060}
.tbtn-ghost:hover{background:rgba(255,255,255,.1);color:#c8c0a8;border-color:rgba(255,255,255,.2)}
.tbtn-active{background:rgba(200,134,10,.15);border-color:#c8860a;color:#e8c96a}
.tbtn-amber{background:#c8860a;border-color:#a06c00;color:#fff}
.tbtn-amber:hover{background:#b07508}
.tbtn-green{background:#1e4a2c;border-color:#166534;color:#86efac}
.tbtn-green:hover{background:#166534}
.tbtn-blue{background:#1e3a8a;border-color:#1e40af;color:#93c5fd}
.tbtn-blue:hover{background:#1e40af}
.tbtn-red{background:rgba(153,27,27,.15);border-color:rgba(153,27,27,.4);color:#fca5a5}
.tbtn-red:hover{background:rgba(153,27,27,.25)}
.tbtn:disabled{opacity:.35;cursor:default;pointer-events:none}
.mode-tabs{display:inline-flex;border:1.5px solid rgba(255,255,255,.1);border-radius:5px;overflow:hidden;flex-shrink:0}
.mtab{padding:4px 10px;height:32px;display:inline-flex;align-items:center;gap:4px;cursor:pointer;border:none;background:transparent;font-family:'Outfit',system-ui,sans-serif;font-size:11px;font-weight:600;color:#6a6050;transition:all .12s;border-right:1px solid rgba(255,255,255,.08)}
.mtab:last-child{border-right:none}
.mtab:hover:not(.on){background:rgba(255,255,255,.06);color:#c8c0a8}
.mtab.on{background:rgba(200,134,10,.15);color:#e8c96a}
.draw-banner{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:5px;border:1.5px solid #c8860a;background:rgba(200,134,10,.1);font-size:11px;font-weight:600;color:#e8c96a;flex-shrink:0}
.fp-draw-banner{border-color:#10b981;background:rgba(16,185,129,.1);color:#6ee7b7}
.nav-sp{flex:1;min-width:0}
.body{display:flex;flex:1;overflow:hidden;position:relative}
.canvas-wrap{flex:1;overflow:hidden;position:relative;background:var(--canvas-bg)}
.canvas-wrap.pan-mode{cursor:grab}
.canvas-wrap.pan-mode:active{cursor:grabbing}
.canvas-wrap.draw-mode{cursor:crosshair}
#transform-root{position:absolute;transform-origin:0 0;will-change:transform}
.lside{width:224px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--border-t);display:flex;flex-direction:column;overflow:hidden;transition:width .18s}
.lside.collapsed{width:36px}
.lside-hdr{height:36px;display:flex;align-items:center;padding:0 8px;border-bottom:1px solid var(--border-t);flex-shrink:0;gap:6px}
.lside-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);flex:1;overflow:hidden;white-space:nowrap}
.lside-body{flex:1;overflow-y:auto;padding:6px 8px}
.lside-body::-webkit-scrollbar{width:3px}
.lside-body::-webkit-scrollbar-thumb{background:var(--border-t);border-radius:2px}
.pg-hdr{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);padding:7px 4px 4px;border-bottom:1px solid var(--border-t);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.pg-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.pg-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 7px;border:1.5px solid var(--border-t);border-radius:7px;background:var(--bg-secondary);cursor:grab;font-size:9.5px;font-weight:600;color:var(--text-secondary);transition:all .12s;text-align:center;line-height:1.2;user-select:none;position:relative}
.pg-btn:hover{border-color:#c8860a;color:var(--text-primary);background:rgba(200,134,10,.08);transform:translateY(-1px)}
.pg-btn:active{transform:translateY(0);cursor:grabbing}
.pg-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-secondary);background:rgba(255,255,255,.04);border-radius:6px;border:1px solid rgba(255,255,255,.07)}
.pg-btn:hover .pg-icon{color:#e8c96a;background:rgba(200,134,10,.1);border-color:rgba(200,134,10,.3)}
.drag-hint{position:absolute;top:3px;right:4px;font-size:7px;color:var(--text-tertiary);opacity:0;transition:opacity .15s}
.pg-btn:hover .drag-hint{opacity:.7}
.pg-btn-full{display:flex;flex-direction:row;align-items:center;gap:8px;padding:7px 10px;border:1.5px solid var(--border-t);border-radius:6px;background:var(--bg-secondary);cursor:pointer;font-size:10px;font-weight:600;color:var(--text-secondary);transition:all .12s;text-align:left;width:100%;margin-bottom:4px}
.pg-btn-full:hover{border-color:#c8860a;color:var(--text-primary);background:rgba(200,134,10,.08)}
.pg-btn-full .pg-icon-sm{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-secondary);flex-shrink:0}
.pg-btn-full:hover .pg-icon-sm{color:#e8c96a}
.rside{width:270px;flex-shrink:0;background:var(--bg-panel);border-left:1px solid var(--border-t);display:flex;flex-direction:column;overflow:hidden}
.rside-hdr{padding:10px 12px;border-bottom:1px solid var(--border-t);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg-secondary)}
.rside-title{font-size:12px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:6px}
.rside-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.rside-body::-webkit-scrollbar{width:3px}
.rside-body::-webkit-scrollbar-thumb{background:var(--border-t);border-radius:2px}
.layer-panel{background:var(--bg-panel);border-top:1px solid var(--border-t);flex-shrink:0;overflow:hidden;transition:height .2s;height:0}
.layer-panel.open{height:180px;display:flex;flex-direction:column}
.layer-hdr{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--border-t);flex-shrink:0;background:var(--bg-secondary)}
.layer-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary)}
.layer-list{flex:1;overflow-y:auto;padding:2px 0}
.layer-list::-webkit-scrollbar{width:3px}
.layer-list::-webkit-scrollbar-thumb{background:var(--border-t);border-radius:2px}
.layer-item{display:flex;align-items:center;gap:6px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--text-secondary);border-bottom:1px solid rgba(100,88,60,.15);cursor:pointer;transition:background .1s;user-select:none}
.layer-item:hover{background:var(--bg-secondary)}
.layer-item.selected{background:rgba(200,134,10,.08);color:var(--text-primary)}
.layer-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.layer-actions{display:flex;gap:2px;margin-left:auto;opacity:0;transition:opacity .1s}
.layer-item:hover .layer-actions{opacity:1}
.layer-action-btn{width:18px;height:18px;display:flex;align-items:center;justify-content:center;border:none;background:rgba(255,255,255,.06);border-radius:3px;cursor:pointer;color:var(--text-tertiary);font-size:10px}
.layer-action-btn:hover{background:rgba(255,255,255,.15);color:var(--text-primary)}
.bottom-bar{display:flex;align-items:center;gap:0;height:40px;flex-shrink:0;background:#111009;border-top:1.5px solid #2e2a1e;position:relative;z-index:30}
.bb-left{display:flex;align-items:center;gap:4px;padding:0 8px;flex:1}
.bb-center{display:flex;align-items:center;gap:0;position:absolute;left:50%;transform:translateX(-50%)}
.bb-right{display:flex;align-items:center;gap:4px;padding:0 8px;justify-content:flex-end;flex:1}
.svg-strip{background:var(--bg-panel);border-top:1px solid var(--border-t);flex-shrink:0;overflow:hidden;transition:height .2s;height:0}
.svg-strip.open{height:200px}
.svg-strip-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--border-t);flex-shrink:0}
.svg-strip-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary)}
.svg-strip-ta{flex:1;width:100%;padding:8px 12px;font-family:monospace;font-size:10px;background:var(--bg-input);border:none;outline:none;resize:none;line-height:1.6;color:var(--text-secondary);height:calc(200px - 38px)}
.zoom-ctrl{display:flex;align-items:center;gap:0;border:1.5px solid rgba(255,255,255,.1);border-radius:5px;overflow:hidden}
.zbtn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:none;color:#7a7060;cursor:pointer;font-size:14px;font-weight:600;transition:all .1s;border-right:1px solid rgba(255,255,255,.08)}
.zbtn:hover{background:rgba(255,255,255,.1);color:#c8c0a8}
.zbtn:last-child{border-right:none}
.zlbl{padding:0 8px;font-size:10px;font-weight:600;color:var(--text-secondary);white-space:nowrap;background:rgba(255,255,255,.04)}
.coords{font-size:10px;font-weight:500;color:var(--text-tertiary);letter-spacing:.5px;padding:0 8px}
.flabel{display:block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:3px}
.finp,.fsel,.ftxt{width:100%;border:1.5px solid var(--border-t);border-radius:4px;background:var(--bg-input);color:var(--text-primary);font-family:'Outfit',system-ui,sans-serif;font-size:12px;padding:5px 8px;outline:none;transition:border-color .12s;-webkit-appearance:none;appearance:none}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:#c8860a;box-shadow:0 0 0 2px rgba(200,134,10,.1)}
.finp:disabled,.fsel:disabled,.ftxt:disabled{opacity:.5;cursor:default}
.ftxt{resize:none;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sw-grid{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.sw{width:22px;height:22px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:all .1s}
.sw:hover{transform:scale(1.15)}
.sw.on{border-color:#c8860a;box-shadow:0 0 0 2px rgba(200,134,10,.3)}
.sw-custom{width:22px;height:22px;border-radius:3px;cursor:pointer;border:1.5px dashed var(--border-s);background:var(--bg-input);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-tertiary);position:relative;overflow:hidden}
.sw-custom input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.tog{position:relative;display:inline-flex;align-items:center;width:34px;height:18px;border:1.5px solid var(--border-t);border-radius:3px;background:var(--bg-input);cursor:pointer;transition:all .15s;flex-shrink:0}
.tog.on{border-color:#c8860a;background:rgba(200,134,10,.15)}
.tog-k{position:absolute;left:2px;width:11px;height:11px;background:var(--border-s);border-radius:2px;transition:left .15s}
.tog.on .tog-k{left:19px;background:#c8860a}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--border-t);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:3px;background:#c8860a;cursor:pointer}
.range-row{display:flex;align-items:center;gap:6px}
.range-val{font-size:10px;color:var(--text-tertiary);width:30px;text-align:right;flex-shrink:0}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.align-row{display:flex;gap:3px;flex-wrap:wrap}
.abtn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:3px;border:1.5px solid var(--border-t);background:var(--bg-input);cursor:pointer;font-size:12px;color:var(--text-secondary);transition:all .1s}
.abtn:hover{border-color:#c8860a;color:#e8c96a;background:rgba(200,134,10,.08)}
.sel-box{position:absolute;border:1.5px dashed #f59e0b;background:rgba(245,158,11,.06);pointer-events:none;z-index:35}
.legend{position:absolute;top:10px;left:10px;z-index:20;background:var(--bg-panel);border:1px solid var(--border-t);border-radius:5px;padding:8px 10px;min-width:140px;box-shadow:0 1px 8px rgba(0,0,0,.3)}
.leg-title{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-t);padding-bottom:4px}
.leg-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:9px;font-weight:500;color:var(--text-secondary)}
.leg-sw{width:10px;height:10px;border-radius:2px;border:1px solid rgba(0,0,0,.15);flex-shrink:0}
.leg-n{margin-left:auto;font-size:8px;color:var(--text-tertiary)}
.search-wrap{position:absolute;top:10px;right:10px;z-index:25}
.search-inp{background:var(--bg-panel);border:1px solid var(--border-t);border-radius:5px;padding:5px 10px 5px 30px;font-family:'Outfit',system-ui,sans-serif;font-size:11px;color:var(--text-primary);outline:none;width:180px;transition:border-color .12s}
.search-inp:focus{border-color:#c8860a}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);font-size:13px;pointer-events:none}
.search-results{position:absolute;top:100%;right:0;background:var(--bg-panel);border:1px solid var(--border-t);border-radius:5px;box-shadow:0 4px 16px rgba(0,0,0,.4);min-width:200px;max-height:200px;overflow-y:auto;margin-top:3px}
.sr-item{padding:6px 10px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border-t)}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--bg-secondary)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg-panel);border:1px solid var(--border-t);border-radius:6px;width:min(820px,96vw);max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 40px rgba(0,0,0,.5)}
.modal-hdr{padding:12px 16px;border-bottom:1px solid var(--border-t);display:flex;justify-content:space-between;align-items:center;background:var(--bg-secondary);flex-shrink:0}
.modal-title{font-size:14px;font-weight:700;color:var(--text-primary)}
.modal-body{padding:16px;overflow-y:auto;flex:1}
.modal-foot{padding:8px 16px;border-top:1px solid var(--border-t);display:flex;gap:6px;justify-content:flex-end;background:var(--bg-secondary);flex-shrink:0}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc-group{border:1px solid var(--border-t);border-radius:4px;overflow:hidden}
.sc-hdr{padding:6px 10px;background:var(--bg-secondary);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);border-bottom:1px solid var(--border-t)}
.sc-row{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;border-bottom:1px solid rgba(100,88,60,.2);font-size:11px;color:var(--text-secondary)}
.sc-row:last-child{border-bottom:none}
.sc-keys{display:flex;gap:2px}
.sc-k{background:var(--bg-secondary);border:1px solid var(--border-s);border-bottom:2px solid var(--border-s);border-radius:3px;padding:0 5px;font-size:9px;font-family:monospace;color:var(--text-secondary)}
.toast{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);padding:7px 16px;border-radius:5px;font-family:'Outfit',system-ui,sans-serif;font-size:11px;font-weight:600;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.4);pointer-events:none;transition:opacity .3s;white-space:nowrap}
.shape-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:3px}
.shape-opt{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;border:1.5px solid var(--border-t);border-radius:4px;background:var(--bg-input);cursor:pointer;font-size:8px;color:var(--text-tertiary);transition:all .1s}
.shape-opt:hover,.shape-opt.on{border-color:#c8860a;color:#e8c96a;background:rgba(200,134,10,.08)}
.shape-opt svg{width:20px;height:20px}
.callout{background:rgba(30,64,175,.08);border:1px solid rgba(30,64,175,.2);border-left:3px solid #60a5fa;border-radius:4px;padding:8px 10px}
.callout-lbl{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#60a5fa;margin-bottom:3px}
.inline-edit{position:absolute;background:rgba(17,16,9,.92);border:1.5px solid #c8860a;border-radius:4px;padding:4px 8px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;color:#f0ead8;outline:none;text-align:center;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.5);min-width:80px}
.snap-indicator{position:absolute;background:rgba(245,158,11,.15);border:1.5px solid #f59e0b;border-radius:3px;pointer-events:none;z-index:40;transition:opacity .1s}
#loading-overlay{position:fixed;inset:0;background:#1a1814;display:flex;align-items:center;justify-content:center;z-index:9000;transition:opacity .3s}
#loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-inner{text-align:center;color:#c0b898}
.loading-inner .spinner{width:32px;height:32px;border:3px solid rgba(200,134,10,.2);border-top-color:#c8860a;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-inner p{font-size:13px;font-weight:600;color:#c0b898;letter-spacing:.5px}
.loading-inner small{font-size:10px;color:#6a6050;display:block;margin-top:4px}
.show-icons-row{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 6px;font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--text-tertiary);text-transform:uppercase}
.ctx-menu{position:fixed;background:var(--bg-panel);border:1px solid var(--border-t);border-radius:5px;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:800;min-width:140px;overflow:hidden}

.osm-tab.on{border-bottom-color:#c8860a;color:#e8c96a;background:rgba(200,134,10,.06)}
.osm-tab:hover:not(.on){color:var(--text-secondary)}
.osm-panel{display:none;padding:16px;flex:1;overflow-y:auto}
.osm-panel.on{display:flex;flex-direction:column;gap:12px}
.map-search-row{display:flex;gap:8px}
.map-search-inp{flex:1;border:1.5px solid var(--border-t);border-radius:5px;background:var(--bg-input);color:var(--text-primary);font-family:'Outfit',system-ui,sans-serif;font-size:12px;padding:8px 12px;outline:none;transition:border-color .12s}

.map-preview{width:100%;height:280px;background:var(--bg-input);border:1.5px solid var(--border-t);border-radius:5px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.map-preview-inner{width:100%;height:100%;position:relative}
#osm-tile-canvas{width:100%;height:100%;display:block}
.map-preview-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.osm-status{font-size:11px;color:var(--text-secondary);background:rgba(0,0,0,.5);padding:6px 12px;border-radius:4px;text-align:center}
.osm-options-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.osm-opt{border:1.5px solid var(--border-t);border-radius:5px;padding:8px 10px;cursor:pointer;transition:all .12s}
.osm-opt:hover{border-color:var(--amber-bd);background:rgba(200,134,10,.05)}
.osm-opt.on{border-color:#c8860a;background:rgba(200,134,10,.1)}
.osm-opt-label{font-size:10px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:5px;margin-bottom:2px}
.osm-opt-sub{font-size:9px;color:var(--text-tertiary)}
.import-progress{background:var(--bg-input);border:1px solid var(--border-t);border-radius:5px;padding:10px 14px}
.progress-bar-outer{width:100%;height:6px;background:var(--border-t);border-radius:3px;overflow:hidden;margin:6px 0}
.progress-bar-inner{height:100%;background:linear-gradient(90deg,#c8860a,#e8a820);border-radius:3px;transition:width .3s}
.import-log{font-family:monospace;font-size:10px;color:var(--text-secondary);max-height:80px;overflow-y:auto;line-height:1.7}
.svg-paste-area{width:100%;min-height:200px;background:var(--bg-input);border:1.5px solid var(--border-t);border-radius:5px;color:var(--text-secondary);font-family:monospace;font-size:10px;padding:10px;outline:none;resize:vertical;line-height:1.6}
.svg-paste-area:focus{border-color:#c8860a}
.geojson-drop{width:100%;height:140px;border:2px dashed var(--border-t);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .15s;color:var(--text-tertiary)}

.osm-result-stats{display:flex;gap:8px;flex-wrap:wrap}

.layer-toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}

<div id="loading-overlay">
  <div class="loading-inner">
    <div class="spinner"></div>
    <p>Map Editor</p>
    <small>Loading…</small>
  </div>
</div>

<div class="app" id="app">
  <nav class="nav" id="nav"></nav>
  <div class="body">
    <div class="lside" id="lside">
      <div class="lside-hdr">
        <span class="lside-title" id="lside-title">Components</span>
        <button class="ibtn" id="lside-tog" title="Collapse" style="width:22px;height:22px;font-size:11px">&#9664;</button>
      </div>
      <div class="lside-body" id="lside-body"></div>
    </div>
    <div class="canvas-wrap" id="canvas-wrap">
      <div id="transform-root">
        <svg id="map-svg" xmlns="http://www.w3.org/2000/svg"><title>Map</title></svg>
      </div>
      <div id="compass-overlay" style="position:absolute;pointer-events:none;z-index:18;transition:transform .05s"></div>
      <div class="legend" id="legend" style="display:none"></div>
      <div class="search-wrap" id="search-wrap">
        <i class="ti ti-search search-icon"></i>
        <input class="search-inp" id="search-inp" placeholder="Search elements…" autocomplete="off"/>
        <div class="search-results" id="search-results" style="display:none"></div>
      </div>
      <div id="sel-box" class="sel-box" style="display:none"></div>
      <div id="snap-indicator" class="snap-indicator" style="display:none"></div>
    </div>
    <div class="rside" id="rside" style="display:none"></div>
  </div>
  <div class="layer-panel" id="layer-panel">
    <div class="layer-hdr">
      <span class="layer-title">Layer Order</span>
      <button class="ibtn" style="width:20px;height:20px;font-size:11px" onclick="toggleLayerPanel()">×</button>
    </div>
    <div class="layer-list" id="layer-list"></div>
  </div>
  <div class="bottom-bar" id="bottom-bar">
    <div class="bb-left">
      <div class="zoom-ctrl">
        <button class="zbtn" id="zoom-in">+</button>
        <div class="zbtn zlbl" id="zoom-lbl">100%</div>
        <button class="zbtn" id="zoom-out">&minus;</button>
        <button class="zbtn" id="zoom-fit" style="font-size:9px;font-weight:700;padding:0 8px">FIT</button>
      </div>
      <div class="coords" id="coords">x:0 y:0</div>
    </div>
    <div class="bb-center"><div id="bb-status" style="font-size:10px;color:var(--text-tertiary);white-space:nowrap"></div></div>
    <div class="bb-right" id="bb-right"></div>
  </div>
  <div class="svg-strip" id="svg-strip">
    <div class="svg-strip-hdr">
      <span class="svg-strip-title">SVG Output</span>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="tbtn tbtn-amber" style="height:24px;font-size:10px" onclick="copySVGStrip()"><i class="ti ti-copy"></i>Copy</button>
        <button class="tbtn tbtn-ghost" style="height:24px;font-size:10px" onclick="downloadSVG()"><i class="ti ti-download"></i>SVG</button>
        <button class="tbtn tbtn-ghost" style="height:24px;font-size:10px" onclick="downloadPNG()"><i class="ti ti-photo"></i>PNG</button>
        <button class="ibtn" style="width:24px;height:24px;font-size:12px" onclick="closeSVGStrip()">&times;</button>
      </div>
    </div>
    <textarea class="svg-strip-ta" id="svg-strip-ta" readonly onclick="this.select()"></textarea>
  </div>
</div>
<div id="modal-root" style="display:none"></div>
<div id="ctx-menu-root"></div>

  delR(id){ST.roads=ST.roads.filter(r=>r.id!==id)},
  delFP(id){ST.footpaths=ST.footpaths.filter(p=>p.id!==id)},
  delJ(id){ST.junctions=ST.junctions.filter(j=>j.id!==id)},
  delPrim(id){ST.primitives=(ST.primitives||[]).filter(p=>p.id!==id)},
  updPrim(id,p){ST.primitives=(ST.primitives||[]).map(pr=>pr.id===id?{...pr,...p}:pr)},
  add(b){ST.buildings=[...ST.buildings,b]},
  addPrim(p){ST.primitives=[...(ST.primitives||[]),p]},
  toFront(id){const b=ST.buildings.find(x=>x.id===id);if(b)ST.buildings=[...ST.buildings.filter(x=>x.id!==id),b]},
  toBack(id){const b=ST.buildings.find(x=>x.id===id);if(b)ST.buildings=[b,...ST.buildings.filter(x=>x.id!==id)]},
  fwd(id){const i=ST.buildings.findIndex(b=>b.id===id);if(i<ST.buildings.length-1){const a=[...ST.buildings];[a[i],a[i+1]]=[a[i+1],a[i]];ST.buildings=a}},
  bwd(id){const i=ST.buildings.findIndex(b=>b.id===id);if(i>0){const a=[...ST.buildings];[a[i],a[i-1]]=[a[i-1],a[i]];ST.buildings=a}},
};
function snap(){undoStack.push(JSON.stringify(ST));if(undoStack.length>100)undoStack.shift();redoStack=[];renderNav()}
function undo(){if(!undoStack.length)return;redoStack.push(JSON.stringify(ST));ST=JSON.parse(undoStack.pop());selIds.clear();selRoad=selPath=selPrim=selJunction=null;renderAll()}
function redo(){if(!redoStack.length)return;undoStack.push(JSON.stringify(ST));ST=JSON.parse(redoStack.pop());renderAll()}

const SK='mapeditor-v1';
function save(){try{const s={...ST,backgroundImage:ST.backgroundImage?{...ST.backgroundImage,src:null}:null};localStorage.setItem(SK,JSON.stringify({v:1,ST:s}))}catch(e){}}
function load(){try{const raw=localStorage.getItem(SK);if(raw){const d=JSON.parse(raw);const s=d.ST||d;if(s?.buildings){ST=s;if(!ST.footpaths)ST.footpaths=[];if(!ST.junctions)ST.junctions=[];if(!ST.primitives)ST.primitives=[];if(!ST.compassPos)ST.compassPos={x:MAP_W-90,y:70};if(!ST.scaleBarPos)ST.scaleBarPos={x:40,y:MAP_H-36};if(!ST.metersPerPixel)ST.metersPerPixel=2.5;return}}}catch(e){}ST=JSON.parse(JSON.stringify(INITIAL_STATE))}
function scheduleSave(){saveStatus='unsaved';renderNav();clearTimeout(saveTimer);saveTimer=setTimeout(()=>{save();saveStatus='saved';renderNav()},700)}

// ─── COORDINATE HELPERS ─────────────────────────────────
function sv(v){return snapOn?Math.round(v/SNAP)*SNAP:Math.round(v)}
function applyTr(){if(!trRoot)return;trRoot.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;const lbl=document.getElementById('zoom-lbl');if(lbl)lbl.textContent=Math.round(zoom*100)+'%';updateCompassOverlay()}
function fitView(){if(!canvasEl||!svgEl)return;const r=canvasEl.getBoundingClientRect();const sx=(r.width-40)/MAP_W,sy=(r.height-40)/MAP_H;zoom=Math.min(sx,sy,.97);panX=(r.width-MAP_W*zoom)/2;panY=(r.height-MAP_H*zoom)/2;applyTr()}
function toCanvas(cx,cy){const r=canvasEl.getBoundingClientRect();return{x:(cx-r.left-panX)/zoom,y:(cy-r.top-panY)/zoom}}
function mkEl(tag,a){const el=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const[k,v]of Object.entries(a))el.setAttribute(k,v);return el}

// ═══════════════════════════════════════════════════════
//  MERCATOR PROJECTION
// ═══════════════════════════════════════════════════════
function mercY(lat){return Math.log(Math.tan(Math.PI/4+lat*Math.PI/360))}
function latLonToCanvas(lat,lon,bbox,W,H){
  const x=(lon-bbox.minLon)/(bbox.maxLon-bbox.minLon)*W;
  const my=mercY(lat),mMin=mercY(bbox.minLat),mMax=mercY(bbox.maxLat);
  const y=(1-(my-mMin)/(mMax-mMin))*H;
  return{x,y};
}

async function osmSearch(q){
  const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`;
  const r=await fetch(url,{headers:{'Accept-Language':'en','User-Agent':'MapEditor/1.0'}});
  if(!r.ok)throw new Error('Nominatim error '+r.status);
  return r.json();
}

async function fetchOSMData(bbox,logFn){
  const{minLat,minLon,maxLat,maxLon}=bbox;
  const bboxStr=`${minLat},${minLon},${maxLat},${maxLon}`;
  const query=`[out:json][timeout:30][bbox:${bboxStr}];(
    ${osmImportOpts.buildings?'way["building"];':''}
    ${osmImportOpts.amenities?'way["amenity"];node["amenity"];':''}
    ${osmImportOpts.roads?'way["highway"]["highway"!~"footway|path|cycleway|steps"];':''}
    ${osmImportOpts.footpaths?'way["highway"~"footway|path|cycleway|steps"];':''}
    ${osmImportOpts.greenspace?'way["leisure"~"park|garden|pitch|track|playground"];way["landuse"~"grass|park|forest|recreation_ground"];':''}
    ${osmImportOpts.waterways?'way["natural"~"water|coastline"];relation["natural"="water"];way["waterway"];':''}
  );out geom;`;

  logFn('Fetching from Overpass API…');
  const url='https://overpass-api.de/api/interpreter';
  const r=await fetch(url,{method:'POST',body:'data='+encodeURIComponent(query)});
  if(!r.ok)throw new Error('Overpass error '+r.status);
  logFn('Parsing OSM data…');
  return r.json();
}

function osmDataToState(osmData,bbox,logFn){
  const W=MAP_W,H=MAP_H;
  const proj=({lat,lon})=>latLonToCanvas(lat,lon,bbox,W,H);

  const buildings=[],roads=[],footpaths=[],junctions=[];
  let bCount=0,rCount=0,fpCount=0;

  for(const el of osmData.elements){
    if(!el.geometry||el.geometry.length<2)continue;
    const tags=el.tags||{};

    // ── BUILDINGS / AREAS ──────────────────────────────
    const isBuilding=tags.building||tags.amenity||tags.leisure||tags.landuse||tags.natural;
    const isRoad=tags.highway&&!['footway','path','cycleway','steps'].includes(tags.highway);
    const isFP=tags.highway&&['footway','path','cycleway','steps'].includes(tags.highway);
    const isWaterway=tags.waterway||tags.natural==='water';
    const isGreenspace=tags.leisure||tags.landuse==='grass'||tags.landuse==='park'||tags.landuse==='forest'||tags.landuse==='recreation_ground';

    if(isBuilding&&!isRoad&&!isFP){
      // Convert polygon nodes to bounding box
      const pts=el.geometry.map(proj);
      if(pts.length<2)continue;
      const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
      const minX=Math.min(...xs),minY=Math.min(...ys);
      const maxX=Math.max(...xs),maxY=Math.max(...ys);
      const w=Math.max(10,maxX-minX),h=Math.max(10,maxY-minY);

      // Skip if out of canvas or unreasonably large
      if(minX>W||minY>H||maxX<0||maxY<0)continue;
      if(w>W*0.8||h>H*0.8)continue;

      const tag=tags.amenity||tags.building||tags.leisure||tags.landuse||tags.natural||'building';
      const name=tags.name||tags['name:en']||formatTag(tag);
      const cat=OSM_CAT_MAP[tag]||OSM_CAT_MAP[tags.amenity]||OSM_CAT_MAP[tags.building]||'Facility';
      const fill=OSM_COLOR_MAP[tag]||OSM_COLOR_MAP[tags.amenity]||CAT_FILL[cat]||'#D1D5DB';
      const stroke=tags.natural==='water'?'#1d4ed8':tags.landuse==='forest'?'#166534':'#374151';

      // Store actual polygon points for detailed shapes
      const clampedPts=pts.map(p=>({x:Math.round(p.x),y:Math.round(p.y)}));

      buildings.push({
        id:`osm-b-${el.id||bCount}`,
        label:name.toUpperCase(),
        x:Math.round(minX),y:Math.round(minY),
        width:Math.round(w),height:Math.round(h),
        rotation:0,fillColor:fill,strokeColor:stroke,
        notes:formatOSMTags(tags),shape:'rect',
        category:cat,fontSize:Math.max(6,Math.min(11,w/12)),
        isGate:false,isTree:false,osmId:el.id,
        // Store polygon for display
        polygon:clampedPts.slice(0,-1), // remove duplicate last point
        usePolygon:clampedPts.length>4,
      });
      bCount++;
    }

    // ── ROADS ─────────────────────────────────────────
    if(isRoad&&osmImportOpts.roads){
      const pts=el.geometry.map(proj);
      if(pts.length<2)continue;
      const rt=tags.highway;
      const style=ROAD_TYPE_MAP[rt]||ROAD_TYPE_MAP.residential;
      roads.push({
        id:`osm-r-${el.id||rCount}`,
        label:tags.name||formatTag(rt),
        start:{x:Math.round(pts[0].x),y:Math.round(pts[0].y)},
        segments:pts.slice(1).map(p=>({type:'L',end:{x:Math.round(p.x),y:Math.round(p.y)}})),
        color:style.color,width:style.width,showDashes:style.dashes||false,
        osmId:el.id,
      });
      rCount++;
    }

    // ── FOOTPATHS ─────────────────────────────────────
    if(isFP&&osmImportOpts.footpaths){
      const pts=el.geometry.map(proj);
      if(pts.length<2)continue;
      const rt=tags.highway;
      const style=ROAD_TYPE_MAP[rt]||{color:'#D4B896',width:5,style:'dashed'};
      footpaths.push({
        id:`osm-fp-${el.id||fpCount}`,
        label:tags.name||formatTag(rt),
        start:{x:Math.round(pts[0].x),y:Math.round(pts[0].y)},
        segments:pts.slice(1).map(p=>({type:'L',end:{x:Math.round(p.x),y:Math.round(p.y)}})),
        color:style.color,width:style.width||5,
        style:style.style||'solid',
        osmId:el.id,
      });
      fpCount++;
    }
  }
  logFn(`Parsed: ${bCount} buildings · ${rCount} roads · ${fpCount} paths`);
  return{buildings,roads,footpaths,junctions};
}

function formatTag(t){if(!t)return 'Building';return t.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}
function formatOSMTags(tags){const keep=['name','amenity','building','leisure','landuse','addr:street','opening_hours','website'];return keep.filter(k=>tags[k]).map(k=>`${k}: ${tags[k]}`).join('\n')}

// ═══════════════════════════════════════════════════════
//  SVG PASTE PARSER
// ═══════════════════════════════════════════════════════
function parseSVGCode(svgString,logFn){
  logFn('Parsing SVG…');
  let parser,doc;
  try{parser=new DOMParser();doc=parser.parseFromString(svgString,'image/svg+xml')}catch(e){throw new Error('Invalid SVG: '+e.message)}
  const err=doc.querySelector('parsererror');if(err)throw new Error('SVG parse error: '+err.textContent.slice(0,80));
  const svgEl2=doc.querySelector('svg');if(!svgEl2)throw new Error('No <svg> element found');

  const vb=svgEl2.getAttribute('viewBox');
  const svgW=parseFloat(svgEl2.getAttribute('width'))||800;
  const svgH=parseFloat(svgEl2.getAttribute('height'))||600;
  let vbX=0,vbY=0,vbW=svgW,vbH=svgH;
  if(vb){const p=vb.trim().split(/[\s,]+/);vbX=parseFloat(p[0])||0;vbY=parseFloat(p[1])||0;vbW=parseFloat(p[2])||svgW;vbH=parseFloat(p[3])||svgH}

  const scaleX=MAP_W/vbW,scaleY=MAP_H/vbH,scale=Math.min(scaleX,scaleY);
  const offX=(MAP_W-vbW*scale)/2,offY=(MAP_H-vbH*scale)/2;
  const tx=v=>(parseFloat(v)||0-vbX)*scale+offX;
  const ty=v=>(parseFloat(v)||0-vbY)*scale+offY;

  const buildings=[],primitives=[],roads=[];
  let id=Date.now()%100000;

  function processEl(el,parentTransform){
    const tag=el.tagName.toLowerCase();
    const fill=el.getAttribute('fill')||el.style?.fill||'#D1D5DB';
    const stroke=el.getAttribute('stroke')||el.style?.stroke||'#374151';
    const sw=parseFloat(el.getAttribute('stroke-width')||1);
    const label=el.querySelector?.('title')?.textContent||el.getAttribute('data-label')||el.getAttribute('id')||'';

    if(tag==='g'){
      [...el.children].forEach(c=>processEl(c,parentTransform));
      return;
    }
    if(tag==='rect'){
      const x=tx(el.getAttribute('x')||0),y=ty(el.getAttribute('y')||0);
      const w=(parseFloat(el.getAttribute('width'))||50)*scale;
      const h=(parseFloat(el.getAttribute('height'))||50)*scale;
      if(w<3||h<3)return;
      buildings.push({id:`svg-${id++}`,label:label.toUpperCase(),x:Math.round(x),y:Math.round(y),width:Math.round(w),height:Math.round(h),rotation:0,fillColor:fill==='none'?'#D1D5DB':fill,strokeColor:stroke==='none'?'#374151':stroke,notes:'',shape:'rect',category:'Other',fontSize:9.5});
    }else if(tag==='circle'){
      const cx=tx(el.getAttribute('cx')||0),cy=ty(el.getAttribute('cy')||0);
      const r=(parseFloat(el.getAttribute('r'))||20)*scale;
      buildings.push({id:`svg-${id++}`,label:label.toUpperCase(),x:Math.round(cx-r),y:Math.round(cy-r),width:Math.round(r*2),height:Math.round(r*2),rotation:0,fillColor:fill==='none'?'#D1D5DB':fill,strokeColor:stroke==='none'?'#374151':stroke,notes:'',shape:'circle',category:'Other',fontSize:9.5});
    }else if(tag==='ellipse'){
      const cx=tx(el.getAttribute('cx')||0),cy=ty(el.getAttribute('cy')||0);
      const rx=(parseFloat(el.getAttribute('rx'))||30)*scale,ry=(parseFloat(el.getAttribute('ry'))||20)*scale;
      buildings.push({id:`svg-${id++}`,label:label.toUpperCase(),x:Math.round(cx-rx),y:Math.round(cy-ry),width:Math.round(rx*2),height:Math.round(ry*2),rotation:0,fillColor:fill==='none'?'#D1D5DB':fill,strokeColor:stroke==='none'?'#374151':stroke,notes:'',shape:'ellipse',category:'Other',fontSize:9.5});
    }else if(tag==='polygon'||tag==='polyline'){
      const rawPts=(el.getAttribute('points')||'').trim().split(/[\s,]+/).filter(Boolean);
      const pts=[];for(let i=0;i<rawPts.length-1;i+=2)pts.push({x:tx(rawPts[i]),y:ty(rawPts[i+1])});
      if(pts.length<2)return;
      const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
      const minX=Math.min(...xs),minY=Math.min(...ys),maxX=Math.max(...xs),maxY=Math.max(...ys);
      buildings.push({id:`svg-${id++}`,label:label.toUpperCase(),x:Math.round(minX),y:Math.round(minY),width:Math.round(maxX-minX)||10,height:Math.round(maxY-minY)||10,rotation:0,fillColor:fill==='none'?'#D1D5DB':fill,strokeColor:stroke==='none'?'#374151':stroke,notes:'',shape:'rect',category:'Other',fontSize:9.5,polygon:pts.map(p=>({x:Math.round(p.x),y:Math.round(p.y)})),usePolygon:true});
    }else if(tag==='line'){
      roads.push({id:`svg-r-${id++}`,label:'Line',start:{x:Math.round(tx(el.getAttribute('x1')||0)),y:Math.round(ty(el.getAttribute('y1')||0))},segments:[{type:'L',end:{x:Math.round(tx(el.getAttribute('x2')||0)),y:Math.round(ty(el.getAttribute('y2')||0))}}],color:stroke==='none'?'#374151':stroke,width:Math.max(1,Math.round(sw*scale)),showDashes:false});
    }else if(tag==='path'){
      // Convert path to a series of road segments (simplified)
      const d=el.getAttribute('d')||'';
      const pts=parseSVGPath(d,tx,ty,scale);
      if(pts.length>=2){
        const isArea=fill&&fill!=='none'&&fill!=='transparent';
        if(isArea){
          const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
          const minX=Math.min(...xs),minY=Math.min(...ys),maxX=Math.max(...xs),maxY=Math.max(...ys);
          if(maxX-minX>2&&maxY-minY>2)buildings.push({id:`svg-${id++}`,label:label.toUpperCase(),x:Math.round(minX),y:Math.round(minY),width:Math.round(maxX-minX),height:Math.round(maxY-minY),rotation:0,fillColor:fill,strokeColor:stroke==='none'?'#374151':stroke,notes:'',shape:'rect',category:'Other',fontSize:9.5,polygon:pts.map(p=>({x:Math.round(p.x),y:Math.round(p.y)})),usePolygon:pts.length>4});
        }else{
          roads.push({id:`svg-r-${id++}`,label:'Path',start:pts[0],segments:pts.slice(1).map(p=>({type:'L',end:p})),color:stroke==='none'?'#374151':stroke,width:Math.max(1,Math.round(sw*scale)),showDashes:false});
        }
      }
    }else if(tag==='text'){
      const x=tx(el.getAttribute('x')||0),y=ty(el.getAttribute('y')||0);
      const fs=Math.max(8,Math.min(48,(parseFloat(el.getAttribute('font-size'))||12)*scale));
      primitives.push({id:`svg-t-${id++}`,type:'text-label',x:Math.round(x),y:Math.round(y),text:el.textContent.trim()||'Text',fontSize:Math.round(fs),color:fill==='none'?'#374151':fill,fontWeight:'700',opacity:1,strokeW:1});
    }
  }

  [...svgEl2.children].forEach(c=>processEl(c,null));
  logFn(`SVG parsed: ${buildings.length} shapes · ${roads.length} lines · ${primitives.length} text labels`);
  return{buildings,roads,footpaths:[],junctions:[],primitives};
}

function parseSVGPath(d,tx,ty,scale){
  // Simplified path parser for M,L,H,V,C,Z commands
  const pts=[];const cmds=d.match(/[MLHVCSQTAZmlhvcsqtaz][^MLHVCSQTAZmlhvcsqtaz]*/g)||[];
  let cx=0,cy=0;
  for(const cmd of cmds){
    const type=cmd[0];const args=cmd.slice(1).trim().split(/[\s,]+/).map(Number).filter(n=>!isNaN(n));
    if(type==='M'||type==='m'){for(let i=0;i<args.length;i+=2){cx=type==='M'?args[i]:cx+args[i];cy=type==='M'?args[i+1]:cy+args[i+1];pts.push({x:tx(cx),y:ty(cy)})}}
    else if(type==='L'||type==='l'){for(let i=0;i<args.length;i+=2){cx=type==='L'?args[i]:cx+args[i];cy=type==='L'?args[i+1]:cy+args[i+1];pts.push({x:tx(cx),y:ty(cy)})}}
    else if(type==='H'||type==='h'){for(const v of args){cx=type==='H'?v:cx+v;pts.push({x:tx(cx),y:ty(cy)})}}
    else if(type==='V'||type==='v'){for(const v of args){cy=type==='V'?v:cy+v;pts.push({x:tx(cx),y:ty(cy)})}}
    else if(type==='C'||type==='c'){for(let i=0;i<args.length;i+=6){cx=type==='C'?args[i+4]:cx+args[i+4];cy=type==='C'?args[i+5]:cy+args[i+5];pts.push({x:tx(cx),y:ty(cy)})}}
    else if(type==='Z'||type==='z'){if(pts.length>0)pts.push({...pts[0]})}
  }
  return pts;
}

// GeoJSON import
function parseGeoJSON(data,logFn){
  logFn('Parsing GeoJSON…');
  const features=data.features||data.geometries?[data]:[data];
  // Find bounds
  let minLat=90,maxLat=-90,minLon=180,maxLon=-180;
  const allCoords=[];
  function extractCoords(geom){
    if(!geom)return;
    if(geom.type==='Point')allCoords.push(geom.coordinates);
    else if(geom.type==='LineString')geom.coordinates.forEach(c=>allCoords.push(c));
    else if(geom.type==='Polygon')geom.coordinates.forEach(ring=>ring.forEach(c=>allCoords.push(c)));
    else if(geom.type==='MultiPolygon')geom.coordinates.forEach(poly=>poly.forEach(ring=>ring.forEach(c=>allCoords.push(c))));
    else if(geom.type==='GeometryCollection')geom.geometries.forEach(extractCoords);
  }
  const feat=data.features||[data];
  feat.forEach(f=>extractCoords(f.geometry||f));
  if(!allCoords.length)throw new Error('No coordinates found in GeoJSON');
  allCoords.forEach(([lon,lat])=>{minLat=Math.min(minLat,lat);maxLat=Math.max(maxLat,lat);minLon=Math.min(minLon,lon);maxLon=Math.max(maxLon,lon)});
  const bbox={minLat,maxLat,minLon,maxLon};
  const pad=0.001;bbox.minLat-=pad;bbox.maxLat+=pad;bbox.minLon-=pad;bbox.maxLon+=pad;

  const buildings=[],roads=[],footpaths=[];let id=Date.now()%100000;
  function proj([lon,lat]){return latLonToCanvas(lat,lon,bbox,MAP_W,MAP_H)}

  feat.forEach(f=>{
    const geom=f.geometry||f;const props=f.properties||{};
    const name=props.name||props.NAME||props.label||'';
    if(!geom)return;
    if(geom.type==='Polygon'||geom.type==='MultiPolygon'){
      const rings=geom.type==='Polygon'?[geom.coordinates[0]]:geom.coordinates.map(p=>p[0]);
      rings.forEach(ring=>{
        const pts=ring.map(proj);const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
        const minX=Math.min(...xs),minY=Math.min(...ys),maxX=Math.max(...xs),maxY=Math.max(...ys);
        if(maxX-minX<2||maxY-minY<2)return;
        buildings.push({id:`gj-${id++}`,label:name.toUpperCase(),x:Math.round(minX),y:Math.round(minY),width:Math.round(maxX-minX),height:Math.round(maxY-minY),rotation:0,fillColor:props.fill||'#D1D5DB',strokeColor:props.stroke||'#374151',notes:JSON.stringify(props).slice(0,120),shape:'rect',category:props.category||'Other',fontSize:9.5,polygon:pts.map(p=>({x:Math.round(p.x),y:Math.round(p.y)})),usePolygon:pts.length>4});
      });
    }else if(geom.type==='LineString'||geom.type==='MultiLineString'){
      const linesets=geom.type==='LineString'?[geom.coordinates]:geom.coordinates;
      linesets.forEach(coords=>{const pts=coords.map(proj);if(pts.length<2)return;const isRoad=props.highway||props.type==='road';const col=isRoad?'#FDE68A':'#D4B896';const w=isRoad?14:6;roads.push({id:`gj-r-${id++}`,label:name||props.highway||'Line',start:{x:Math.round(pts[0].x),y:Math.round(pts[0].y)},segments:pts.slice(1).map(p=>({type:'L',end:{x:Math.round(p.x),y:Math.round(p.y)}})),color:col,width:w,showDashes:false})});
    }
  });
  logFn(`GeoJSON: ${buildings.length} areas · ${roads.length} lines`);
  return{buildings,roads,footpaths,junctions:[],primitives:[]};
}

function setupDropZone(dropId,type,mr){
  const drop=document.getElementById(dropId);if(!drop)return;
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag-over')});
  drop.addEventListener('dragleave',()=>drop.classList.remove('drag-over'));
  drop.addEventListener('drop',e=>{
    e.preventDefault();drop.classList.remove('drag-over');
    const file=e.dataTransfer.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      if(type==='svg')doSVGImport(ev.target.result,mr);
      else if(type==='geojson'){try{doGeoJSONImport(JSON.parse(ev.target.result),mr)}catch(e2){toast('Invalid GeoJSON','red')}}
    };
    reader.readAsText(file);
  });
  drop.addEventListener('click',()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept=type==='svg'?'.svg':'application/json,.geojson,.json';
    inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{if(type==='svg')doSVGImport(ev.target.result,mr);else{try{doGeoJSONImport(JSON.parse(ev.target.result),mr)}catch(e2){toast('Invalid GeoJSON','red')}}};r.readAsText(f)};
    inp.click();
  });
}

function loadOSMTilePreview(bbox){
  const canvas=document.getElementById('osm-tile-canvas');if(!canvas)return;
  canvas.style.display='block';
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle='#e8e3d4';ctx.fillRect(0,0,W,H);
  // Calculate tile coordinates
  const centerLat=(bbox.minLat+bbox.maxLat)/2,centerLon=(bbox.minLon+bbox.maxLon)/2;
  const zoom=Math.max(12,Math.min(16,Math.floor(14-Math.log2(Math.max(bbox.maxLat-bbox.minLat,bbox.maxLon-bbox.minLon)*100))));
  const toTileN=(lat,lon,z)=>({x:Math.floor((lon+180)/360*Math.pow(2,z)),y:Math.floor((1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*Math.pow(2,z))});
  const centerTile=toTileN(centerLat,centerLon,zoom);
  // Load a 3x2 grid of tiles
  const TILE_S=256;const cols=Math.ceil(W/TILE_S)+1,rows=Math.ceil(H/TILE_S)+1;
  const startX=centerTile.x-Math.floor(cols/2),startY=centerTile.y-Math.floor(rows/2);
  for(let ty=0;ty<rows;ty++)for(let tx2=0;tx2<cols;tx2++){
    const img=new Image();img.crossOrigin='anonymous';
    img.src=`https://tile.openstreetmap.org/${zoom}/${startX+tx2}/${startY+ty}.png`;
    const dx=tx2*TILE_S-(centerTile.x-startX)*TILE_S+W/2-(TILE_S/2),dy=ty*TILE_S-(centerTile.y-startY)*TILE_S+H/2-(TILE_S/2);
    img.onload=()=>{ctx.drawImage(img,dx,dy,TILE_S,TILE_S)};
  }
  const statusEl=document.getElementById('osm-status');if(statusEl)statusEl.style.display='none';
}

async function doOSMBboxFetch(bbox,mr,progressId){
  const progEl=document.getElementById(progressId);
  const logLines=[];
  const logFn=(msg)=>{logLines.push(msg);if(progEl){progEl.style.display='block';progEl.innerHTML=`<div class="import-progress"><div class="progress-bar-outer"><div class="progress-bar-inner" id="prog-bar" style="width:50%"></div></div><div class="import-log">${logLines.map(l=>`> ${l}`).join('<br>')}</div></div>`}};

  try{
    logFn('Fetching OSM data (this may take 5-30s)…');
    const osmData=await fetchOSMData(bbox,logFn);
    logFn(`Got ${osmData.elements?.length||0} elements`);
    const parsed=osmDataToState(osmData,bbox,logFn);
    snap();
    // Ask replace or merge
    const doReplace=ST.buildings.length===0||confirm(`Add to existing map? (OK = add, Cancel = replace)`);
    if(!doReplace){ST=JSON.parse(JSON.stringify(INITIAL_STATE))}
    ST.buildings=[...ST.buildings,...parsed.buildings];
    ST.roads=[...ST.roads,...parsed.roads];
    ST.footpaths=[...ST.footpaths,...parsed.footpaths];
    ST.osmMeta={bbox,importedAt:new Date().toISOString()};
    // Auto-set scale based on bbox size
    const latM=(bbox.maxLat-bbox.minLat)*111000;const pixH=MAP_H;
    ST.metersPerPixel=Math.round(latM/pixH*10)/10;
    logFn(`Done! Scale set to ~${ST.metersPerPixel}m/px`);
    scheduleSave();renderAll();fitView();
    if(mr)mr.style.display='none';
    toast(`Imported ${parsed.buildings.length} buildings, ${parsed.roads.length} roads, ${parsed.footpaths.length} paths`,'green');
  }catch(e){
    logFn('Error: '+e.message);toast('Import failed: '+e.message,'red');
  }
}

function addPrimitive(type){
  snap();const cx=MAP_W/2,cy=MAP_H/2;let p={id:`prim-${Date.now()%100000}`,type,color:'#374151',strokeW:2,opacity:1};
  if(type==='line'){p={...p,x1:cx-80,y1:cy,x2:cx+80,y2:cy,arrowStart:false,arrowEnd:false,style:'solid'}}
  else if(type==='arrow'){p={...p,x1:cx-80,y1:cy,x2:cx+80,y2:cy,arrowStart:false,arrowEnd:true,style:'solid'}}
  else if(type==='circle-shape'){p={...p,cx,cy,rx:60,ry:60,fill:'none'}}
  else if(type==='ellipse-shape'){p={...p,cx,cy,rx:80,ry:40,fill:'none'}}
  else if(type==='rect-shape'){p={...p,x:cx-70,y:cy-40,w:140,h:80,fill:'none',rx:0}}
  else if(type==='dot'){p={...p,cx,cy,r:8,fill:'#374151',color:'#374151'}}
  else if(type==='text-label'){p={...p,x:cx,y:cy,text:'Label',fontSize:14,color:'#374151',fontWeight:'700'}}
  else if(type==='dimension'){p={...p,x1:cx-100,y1:cy+40,x2:cx+100,y2:cy+40,text:'',color:'#374151'}}
  M.addPrim(p);selPrim=p.id;scheduleSave();renderAll();toast(`${type} added`);
}

function renderPrimitive(p,isSel){
  const g=mkEl('g',{opacity:p.opacity||1});const AS=10;
  function arrowH(x1,y1,x2,y2){const a=Math.atan2(y2-y1,x2-x1);return mkEl('polygon',{points:`${x2},${y2} ${x2-AS*Math.cos(a-.4)},${y2-AS*Math.sin(a-.4)} ${x2-AS*Math.cos(a+.4)},${y2-AS*Math.sin(a+.4)}`,fill:p.color})}
  if(p.type==='line'||p.type==='arrow'){const da=p.style==='dashed'?'10 6':p.style==='dotted'?'2 6':'none';g.appendChild(mkEl('line',{x1:p.x1,y1:p.y1,x2:p.x2,y2:p.y2,stroke:p.color,'stroke-width':p.strokeW,'stroke-linecap':'round','stroke-dasharray':da}));if(p.arrowEnd)g.appendChild(arrowH(p.x1,p.y1,p.x2,p.y2));if(p.arrowStart)g.appendChild(arrowH(p.x2,p.y2,p.x1,p.y1));if(isSel){g.appendChild(mkEl('circle',{cx:p.x1,cy:p.y1,r:6,fill:'#f59e0b',stroke:'white','stroke-width':1.5,cursor:'move'}));g.appendChild(mkEl('circle',{cx:p.x2,cy:p.y2,r:6,fill:'#f59e0b',stroke:'white','stroke-width':1.5,cursor:'move'}))}}
  else if(p.type==='circle-shape'){g.appendChild(mkEl('circle',{cx:p.cx,cy:p.cy,r:p.rx,fill:p.fill||'none',stroke:p.color,'stroke-width':p.strokeW}));if(isSel)g.appendChild(mkEl('circle',{cx:p.cx,cy:p.cy,r:p.rx+4,fill:'none',stroke:'#f59e0b','stroke-width':1.5,'stroke-dasharray':'5 3'}))}
  else if(p.type==='ellipse-shape'){g.appendChild(mkEl('ellipse',{cx:p.cx,cy:p.cy,rx:p.rx,ry:p.ry,fill:p.fill||'none',stroke:p.color,'stroke-width':p.strokeW}));if(isSel)g.appendChild(mkEl('ellipse',{cx:p.cx,cy:p.cy,rx:p.rx+4,ry:p.ry+4,fill:'none',stroke:'#f59e0b','stroke-width':1.5,'stroke-dasharray':'5 3'}))}
  else if(p.type==='rect-shape'){g.appendChild(mkEl('rect',{x:p.x,y:p.y,width:p.w,height:p.h,fill:p.fill||'none',stroke:p.color,'stroke-width':p.strokeW,rx:p.rx||0}));if(isSel)g.appendChild(mkEl('rect',{x:p.x-4,y:p.y-4,width:p.w+8,height:p.h+8,fill:'none',stroke:'#f59e0b','stroke-width':1.5,'stroke-dasharray':'5 3',rx:(p.rx||0)+2}))}
  else if(p.type==='dot'){g.appendChild(mkEl('circle',{cx:p.cx,cy:p.cy,r:p.r||6,fill:p.fill||p.color,stroke:'white','stroke-width':1.2}));if(isSel)g.appendChild(mkEl('circle',{cx:p.cx,cy:p.cy,r:(p.r||6)+5,fill:'none',stroke:'#f59e0b','stroke-width':1.5,'stroke-dasharray':'4 3'}))}
  else if(p.type==='text-label'){const t=mkEl('text',{x:p.x,y:p.y,'text-anchor':'middle','dominant-baseline':'middle','font-size':p.fontSize||14,'font-family':"'Outfit',sans-serif",'font-weight':p.fontWeight||'700',fill:p.color});t.textContent=p.text||'Label';g.appendChild(t);if(isSel){const bw=(p.text||'Label').length*(p.fontSize||14)*.32;g.appendChild(mkEl('rect',{x:p.x-bw,y:p.y-(p.fontSize||14)*.7,width:bw*2,height:(p.fontSize||14)*1.4,fill:'none',stroke:'#f59e0b','stroke-width':1.2,'stroke-dasharray':'4 3',rx:2}))}}
  else if(p.type==='dimension'){const mx=(p.x1+p.x2)/2,my=(p.y1+p.y2)/2;g.appendChild(mkEl('line',{x1:p.x1,y1:p.y1,x2:p.x2,y2:p.y2,stroke:p.color,'stroke-width':p.strokeW||1.5,'stroke-linecap':'round'}));g.appendChild(arrowH(p.x2,p.y2,p.x1,p.y1));g.appendChild(arrowH(p.x1,p.y1,p.x2,p.y2));const dist=Math.round(Math.hypot(p.x2-p.x1,p.y2-p.y1)*(ST.metersPerPixel||2.5));const label=p.text||`${dist}m`;g.appendChild(mkEl('rect',{x:mx-label.length*3.5-4,y:my-8,width:label.length*7+8,height:16,rx:3,fill:'white',opacity:.85}));const t=mkEl('text',{x:mx,y:my,'text-anchor':'middle','dominant-baseline':'middle','font-size':11,'font-family':"'Outfit',sans-serif",'font-weight':'700',fill:p.color});t.textContent=label;g.appendChild(t);if(isSel){g.appendChild(mkEl('circle',{cx:p.x1,cy:p.y1,r:5,fill:'#f59e0b',stroke:'white','stroke-width':1.5}));g.appendChild(mkEl('circle',{cx:p.x2,cy:p.y2,r:5,fill:'#f59e0b',stroke:'white','stroke-width':1.5}))}}
  addPrimHitArea(g,p);return g;
}

function addPrimHitArea(g,p){
  let hit;
  if(p.type==='line'||p.type==='arrow'||p.type==='dimension')hit=mkEl('line',{x1:p.x1||0,y1:p.y1||0,x2:p.x2||0,y2:p.y2||0,stroke:'transparent','stroke-width':16,cursor:'move'});
  else if(p.type==='circle-shape')hit=mkEl('circle',{cx:p.cx,cy:p.cy,r:p.rx,fill:'transparent',stroke:'transparent','stroke-width':10,cursor:'move'});
  else if(p.type==='ellipse-shape')hit=mkEl('ellipse',{cx:p.cx,cy:p.cy,rx:p.rx,ry:p.ry,fill:'transparent',stroke:'transparent','stroke-width':10,cursor:'move'});
  else if(p.type==='rect-shape')hit=mkEl('rect',{x:p.x,y:p.y,width:p.w,height:p.h,fill:'transparent',stroke:'transparent','stroke-width':10,cursor:'move'});
  else if(p.type==='dot')hit=mkEl('circle',{cx:p.cx,cy:p.cy,r:Math.max(p.r||6,12),fill:'transparent',cursor:'move'});
  else if(p.type==='text-label'){hit=mkEl('text',{x:p.x,y:p.y,'font-size':p.fontSize||14,'text-anchor':'middle','dominant-baseline':'middle',fill:'transparent',stroke:'transparent','stroke-width':6,cursor:'move'});hit.textContent=p.text||'Label'}
  if(hit){
    hit.addEventListener('mousedown',e=>{
      e.stopPropagation();selPrim=p.id;selIds.clear();selRoad=selPath=selJunction=null;renderAll();
      const startPt=toCanvas(e.clientX,e.clientY);const orig=JSON.parse(JSON.stringify(p));
      const mm=ev=>{const pt=toCanvas(ev.clientX,ev.clientY);const dx=pt.x-startPt.x,dy=pt.y-startPt.y;const np={};if('x1' in orig){np.x1=sv(orig.x1+dx);np.y1=sv(orig.y1+dy);np.x2=sv(orig.x2+dx);np.y2=sv(orig.y2+dy)}if('cx' in orig){np.cx=sv(orig.cx+dx);np.cy=sv(orig.cy+dy)}if('x' in orig&&'w' in orig){np.x=sv(orig.x+dx);np.y=sv(orig.y+dy)}M.updPrim(p.id,np);renderSVG()};
      const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave()};
      window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
    });
    hit.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();showCtxMenu(e.clientX,e.clientY,[{icon:'ti-trash',label:'Delete',danger:true,fn:()=>{snap();M.delPrim(p.id);selPrim=null;scheduleSave();renderAll()}}])});
    g.appendChild(hit);
  }
}

function roadPath(r){let d=`M ${r.start.x} ${r.start.y}`;for(const s of r.segments){if(s.type==='L')d+=` L ${s.end.x} ${s.end.y}`;if(s.type==='C')d+=` C ${s.cp1.x} ${s.cp1.y} ${s.cp2.x} ${s.cp2.y} ${s.end.x} ${s.end.y}`}return d}

function shapeStr(b){
  const cx=b.x+b.width/2,cy=b.y+b.height/2;
  const tf=b.rotation?` transform="rotate(${b.rotation} ${cx} ${cy})"`:''
  const sc=b.strokeColor,fc=b.fillColor,sw=1.5;
  // Use stored polygon if available
  if(b.usePolygon&&b.polygon?.length>2){const pts=b.polygon.map(p=>`${p.x},${p.y}`).join(' ');return`<polygon points="${pts}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`}
  if(b.shape==='circle')return`<circle cx="${cx}" cy="${cy}" r="${Math.min(b.width,b.height)/2}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;
  if(b.shape==='ellipse')return`<ellipse cx="${cx}" cy="${cy}" rx="${b.width/2}" ry="${b.height/2}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;
  if(b.shape==='hexagon'){const r2=Math.min(b.width,b.height)/2;const pts=Array.from({length:6},(_,i)=>{const a=Math.PI/180*(60*i-30);return`${cx+r2*Math.cos(a)},${cy+r2*Math.sin(a)}`}).join(' ');return`<polygon points="${pts}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`}
  if(b.shape==='diamond')return`<polygon points="${cx},${b.y} ${b.x+b.width},${cy} ${cx},${b.y+b.height} ${b.x},${cy}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;
  if(b.shape==='octagon'){const d2=Math.min(b.width,b.height)*.25;const pts=`${b.x+d2},${b.y} ${b.x+b.width-d2},${b.y} ${b.x+b.width},${b.y+d2} ${b.x+b.width},${b.y+b.height-d2} ${b.x+b.width-d2},${b.y+b.height} ${b.x+d2},${b.y+b.height} ${b.x},${b.y+b.height-d2} ${b.x},${b.y+d2}`;return`<polygon points="${pts}" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`}
  return`<rect x="${b.x}" y="${b.y}" width="${b.width}" height="${b.height}" rx="4" fill="${fc}" stroke="${sc}" stroke-width="${sw}"${tf}/>`;
}

function buildSVG(){
  const ff="'Outfit',sans-serif";const L=[];
  L.push(`<svg width="${MAP_W}" height="${MAP_H}" viewBox="0 0 ${MAP_W} ${MAP_H}" xmlns="http://www.w3.org/2000/svg"><title>Map</title>`);
  L.push(`<defs><style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap');</style></defs>`);
  L.push(`<rect width="${MAP_W}" height="${MAP_H}" fill="#EEF0E8"/>`);
  if(ST.backgroundImage?.src)L.push(`<image x="${ST.backgroundImage.x}" y="${ST.backgroundImage.y}" width="${ST.backgroundImage.w}" height="${ST.backgroundImage.h}" opacity="${ST.backgroundImage.opacity||0.5}" preserveAspectRatio="xMidYMid meet" href="${ST.backgroundImage.src}"/>`);
  for(const fp of(ST.footpaths||[])){const d=roadPath(fp);const da=fp.style==='dashed'?`stroke-dasharray="${fp.width*1.5} ${fp.width}"`:fp.style==='dotted'?`stroke-dasharray="2 ${fp.width}"`:'';L.push(`<path d="${d}" stroke="rgba(0,0,0,.12)" stroke-width="${fp.width+2}" fill="none" stroke-linecap="round"/>`);L.push(`<path d="${d}" stroke="${fp.color}" stroke-width="${fp.width}" fill="none" stroke-linecap="round" stroke-linejoin="round" ${da}/>`)}
  for(const road of ST.roads){const d=roadPath(road);L.push(`<path d="${d}" stroke="#C8860A" stroke-width="${road.width+8}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);L.push(`<path d="${d}" stroke="${road.color}" stroke-width="${road.width}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);if(road.showDashes)L.push(`<path d="${d}" stroke="white" stroke-width="2" fill="none" stroke-dasharray="22 14" stroke-linecap="round" opacity="0.7"/>`)}
  for(const j of(ST.junctions||[]))L.push(`<circle cx="${j.x}" cy="${j.y}" r="28" fill="#FDE68A" stroke="#E6A800" stroke-width="3"/>`);
  for(const b of ST.buildings)L.push(shapeStr(b)+(b.label&&!b.isTree?`<text x="${b.x+b.width/2}" y="${b.y+b.height/2}" text-anchor="middle" dominant-baseline="middle" font-size="${b.fontSize||9.5}" font-family="${ff}" font-weight="700" fill="${b.fillColor==='#1F2937'||b.fillColor==='#374151'?'#F9FAFB':'#374151'}">${b.label.replace(/\n/g,'&#xa;')}</text>`:''));
  for(const p of(ST.primitives||[])){if(p.type==='text-label')L.push(`<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle" font-size="${p.fontSize||14}" font-family="${ff}" font-weight="${p.fontWeight||700}" fill="${p.color}">${p.text||''}</text>`);else if(p.type==='line'||p.type==='arrow')L.push(`<line x1="${p.x1}" y1="${p.y1}" x2="${p.x2}" y2="${p.y2}" stroke="${p.color}" stroke-width="${p.strokeW}"/>`)}
  // Compass
  const cpCx=ST.compassPos.x+26,cpCy=ST.compassPos.y+26,cpR=22;
  L.push(`<circle cx="${cpCx}" cy="${cpCy}" r="${cpR}" fill="rgba(255,255,255,0.88)" stroke="#c8860a" stroke-width="2"/>`);
  for(const{a,c}of[{a:0,c:'#c8860a'},{a:90,c:'#6B7280'},{a:180,c:'#6B7280'},{a:270,c:'#6B7280'}]){const rad=a*Math.PI/180,r2=20,px=cpCx+Math.sin(rad)*r2,py=cpCy-Math.cos(rad)*r2,lx=cpCx-Math.sin(rad)*6,ly=cpCy+Math.cos(rad)*6,wx=cpCx-Math.cos(rad)*5,wy=cpCy-Math.sin(rad)*5,wx2=cpCx+Math.cos(rad)*5,wy2=cpCy+Math.sin(rad)*5;L.push(`<polygon points="${px},${py} ${wx},${wy} ${lx},${ly} ${wx2},${wy2}" fill="${c}" stroke="white" stroke-width="0.8"/>`)}
  L.push(`<circle cx="${cpCx}" cy="${cpCy}" r="4" fill="#c8860a" stroke="white" stroke-width="1.5"/>`);
  L.push(`<text x="${cpCx}" y="${cpCy-cpR-4}" text-anchor="middle" font-size="15" font-family="${ff}" font-weight="800" fill="#c8860a">N</text>`);
  // Scale bar
  const{x:sx,y:sy2}=ST.scaleBarPos;const mpp=ST.metersPerPixel||2.5,barPx=100/mpp;
  L.push(`<rect x="${sx-4}" y="${sy2-18}" width="${barPx+8}" height="24" rx="4" fill="rgba(255,255,255,0.88)"/>`);
  L.push(`<line x1="${sx}" y1="${sy2}" x2="${sx+barPx}" y2="${sy2}" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>`);
  L.push(`<text x="${sx}" y="${sy2-6}" text-anchor="middle" font-size="11" font-family="${ff}" font-weight="700" fill="#374151">0</text>`);
  L.push(`<text x="${sx+barPx}" y="${sy2-6}" text-anchor="middle" font-size="11" font-family="${ff}" font-weight="700" fill="#374151">100m</text>`);
  L.push('</svg>');return L.join('\n');
}
