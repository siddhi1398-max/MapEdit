<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campus Map Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1c1a14;--ink2:#4a4535;--ink3:#7a7060;
  --parch:#f5f0e4;--paper:#faf7ef;--cream:#ede8d8;--border:#d4c9a8;--border2:#c4b88a;
  --amber:#c8860a;--amber-bg:#fdf3dc;--amber-bd:#e8c96a;
  --green:#2d6a3f;--red:#9b2c2c;--blue:#1e40af;
  --bg-primary:#ffffff;--bg-secondary:#f5f0e4;--bg-tertiary:#ede8d8;
  --text-primary:#1c1a14;--text-secondary:#4a4535;--text-tertiary:#7a7060;
  --border-t:rgba(212,201,168,.5);--border-s:rgba(196,184,138,.7);
  --snap-color:#f59e0b;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1e1c16;--bg-secondary:#252318;--bg-tertiary:#2c2920;
    --text-primary:#f5f0e4;--text-secondary:#c8c0a8;--text-tertiary:#7a7060;
    --border-t:rgba(90,80,60,.5);--border-s:rgba(120,105,75,.6);
    --amber-bg:#2a2008;--amber-bd:#6b5400;
    --parch:#252318;--paper:#1e1c16;
  }
}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg-tertiary);color:var(--text-primary)}
.hdr{display:flex;align-items:center;gap:6px;padding:0 12px;height:52px;background:#1c1a14;border-bottom:2px solid #3a3020;flex-shrink:0;flex-wrap:wrap;position:relative;z-index:40;gap:5px}
.hdr-title{font-size:16px;font-weight:700;color:#f5f0e4;letter-spacing:-.3px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.hdr-sub{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:#5a5040;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:1px 7px;border-radius:3px}
.sp{flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:5px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;letter-spacing:.3px;cursor:pointer;border:1.5px solid;transition:all .12s;white-space:nowrap;flex-shrink:0}
.btn-ghost{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.18);color:#c8c0a8}
.btn-ghost:hover{background:rgba(255,255,255,.14);color:#f5f0e4}
.btn-active{background:#fdf3dc;border-color:#e8c96a;color:#c8860a}
.btn-amber{background:#c8860a;border-color:#a06c00;color:#fff}
.btn-amber:hover{background:#a06c00}
.btn-green{background:#2d6a3f;border-color:#1e4a2c;color:#fff}
.btn-green:hover{background:#1e4a2c}
.btn-red{background:transparent;border-color:rgba(155,44,44,.4);color:#9b2c2c;padding:5px 10px;font-size:11px}
.btn-red:hover{background:rgba(155,44,44,.08)}
.btn-dark{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#7a7060}
.btn-dark:hover{color:#c8c0a8;border-color:rgba(255,255,255,.22)}
.btn-blue{background:#1e40af;border-color:#1e3a8a;color:#fff}
.btn-blue:hover{background:#1e3a8a}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.tabs{display:inline-flex;border:1.5px solid rgba(255,255,255,.15);border-radius:5px;overflow:hidden;flex-shrink:0}
.tab{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;cursor:pointer;border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;color:#7a7060;transition:all .12s;border-right:1.5px solid rgba(255,255,255,.1)}
.tab:last-child{border-right:none}
.tab:hover:not(.tab-on){background:rgba(255,255,255,.07);color:#c8c0a8}
.tab-on{background:rgba(200,134,10,.18);color:#e8c96a}
.draw-bann{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:5px;border:1.5px solid #e8c96a;background:#fdf3dc;font-size:11px;font-weight:600;color:#c8860a}
.wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.body{display:flex;flex:1;overflow:hidden;position:relative}
.map-area{flex:1;overflow:hidden;position:relative;background:#e8e4d8;cursor:default}
.map-area.cursor-cross{cursor:crosshair}
.map-area.cursor-grab{cursor:grab}
.map-area.cursor-grab:active{cursor:grabbing}
#canvas-wrap{position:absolute;transform-origin:0 0}
.side{width:280px;flex-shrink:0;background:var(--bg-primary);border-left:1px solid var(--border-t);display:flex;flex-direction:column;overflow:hidden}
.side-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border-t);background:var(--bg-secondary);flex-shrink:0}
.side-title{font-size:13px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:6px}
.side-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.side-body::-webkit-scrollbar{width:4px}
.side-body::-webkit-scrollbar-thumb{background:var(--border-t);border-radius:2px}
.flabel{display:block;font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:4px}
.finp,.fsel,.ftxt{width:100%;border:1.5px solid var(--border-t);border-radius:5px;background:var(--bg-secondary);color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:13px;padding:6px 9px;outline:none;transition:border-color .12s;-webkit-appearance:none;appearance:none}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:#e8c96a;box-shadow:0 0 0 2px rgba(200,134,10,.12)}
.finp:disabled,.fsel:disabled,.ftxt:disabled{opacity:.6;cursor:default}
.ftxt{resize:none;line-height:1.5}
.sw{width:24px;height:24px;border-radius:4px;cursor:pointer;transition:transform .1s;border:2px solid transparent}
.sw:hover{transform:scale(1.15)}
.sw-on{border-color:#c8860a !important;box-shadow:0 0 0 2px rgba(200,134,10,.25)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.callout{background:rgba(30,64,175,.08);border:1px solid rgba(30,64,175,.2);border-left:3px solid #60a5fa;border-radius:4px;padding:9px 11px;border-radius:4px}
.callout-lbl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#3b82f6;margin-bottom:4px}
.zoom-bar{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:4px;z-index:30}
.zoom-btn{width:34px;height:34px;border-radius:5px;border:1.5px solid var(--border-t);background:var(--bg-primary);color:var(--text-primary);font-size:16px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.zoom-btn:hover{background:var(--bg-secondary)}
.zoom-lbl{font-size:10px;font-weight:600;text-align:center;color:var(--text-secondary);padding:2px 0}
.legend{position:absolute;top:12px;left:12px;z-index:20;background:var(--bg-primary);border:1px solid var(--border-t);border-radius:5px;padding:10px 12px;min-width:152px;box-shadow:0 1px 4px rgba(28,26,20,.13)}
.leg-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-t);padding-bottom:5px}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:10px;font-weight:500;color:var(--text-secondary)}
.leg-sw{width:12px;height:12px;border-radius:2px;border:1px solid rgba(0,0,0,.12);flex-shrink:0}
.leg-n{margin-left:auto;color:var(--text-tertiary);font-size:9px}
.save-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;border:1.5px solid;font-size:10px;font-weight:600;letter-spacing:.5px;transition:all .15s;cursor:default;flex-shrink:0}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--border-t);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:3px;background:#c8860a;cursor:pointer}
.tog{position:relative;display:inline-flex;align-items:center;width:36px;height:19px;border:1.5px solid var(--border-t);border-radius:3px;background:var(--bg-secondary);cursor:pointer;transition:all .15s}
.tog-on{border-color:#e8c96a;background:#fdf3dc}
.tog-k{position:absolute;left:2px;width:12px;height:12px;background:var(--border-s);border-radius:2px;transition:all .15s}
.tog-on .tog-k{left:20px;background:#c8860a}
.cp-wrap{position:relative;overflow:hidden}
.cp-wrap input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.coords{position:absolute;bottom:16px;left:16px;font-size:10px;font-weight:500;color:var(--text-tertiary);z-index:20;pointer-events:none;letter-spacing:.5px}
.modal-overlay{position:fixed;inset:0;background:rgba(28,26,20,.72);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg-primary);border:1px solid var(--border-t);border-radius:6px;width:min(860px,94vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 2px 40px rgba(28,26,20,.3)}
.modal-hdr{padding:14px 18px;border-bottom:1px solid var(--border-t);display:flex;justify-content:space-between;align-items:center;background:var(--bg-secondary)}
.modal-title{font-size:15px;font-weight:700;color:var(--text-primary)}
.modal-sub{font-size:10px;color:var(--text-tertiary);margin-top:3px;letter-spacing:.5px}
.modal-foot{padding:10px 18px;border-top:1px solid var(--border-t);display:flex;gap:8px;justify-content:flex-end;align-items:center;background:var(--bg-secondary)}
.kbd{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-bottom:2px solid rgba(255,255,255,.25);border-radius:3px;padding:1px 6px;font-size:10px;font-family:monospace;color:#c8c0a8;line-height:1.6}
.undo-bar{display:flex;align-items:center;gap:3px}
.search-bar{position:absolute;top:12px;right:12px;z-index:25;display:flex;gap:4px;align-items:center}
.search-inp{background:var(--bg-primary);border:1px solid var(--border-t);border-radius:5px;padding:5px 10px;font-family:'Outfit',sans-serif;font-size:12px;color:var(--text-primary);outline:none;width:160px;transition:border-color .12s}
.search-inp:focus{border-color:#e8c96a}
.search-results{position:absolute;top:100%;right:0;background:var(--bg-primary);border:1px solid var(--border-t);border-radius:5px;box-shadow:0 4px 16px rgba(28,26,20,.18);min-width:200px;max-height:200px;overflow-y:auto;margin-top:4px}
.sr-item{padding:7px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border-t)}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--bg-secondary)}
.snap-indicator{position:absolute;pointer-events:none;z-index:50}
.status-bar{display:flex;align-items:center;gap:12px;padding:3px 14px;background:#111009;border-top:1px solid #2a2418;font-size:10px;color:#5a5040;flex-shrink:0}
.status-item{display:flex;align-items:center;gap:4px}
/* component palette */
.comp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:4px}
.comp-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border:1.5px solid var(--border-t);border-radius:5px;background:var(--bg-secondary);cursor:pointer;font-size:9px;font-weight:600;color:var(--text-secondary);transition:all .12s;text-align:center;line-height:1.3}
.comp-btn:hover{border-color:#e8c96a;color:var(--text-primary);background:var(--amber-bg)}
.comp-icon{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px}
/* multi-select */
.sel-box{position:absolute;border:1.5px dashed #f59e0b;background:rgba(245,158,11,.08);pointer-events:none;z-index:35}
</style>
</head>
<body>
<div class="wrap" id="root">
  <header class="hdr" id="hdr"></header>
  <div class="body">
    <div class="map-area" id="map-area">
      <div id="canvas-wrap">
        <svg id="map-svg" xmlns="http://www.w3.org/2000/svg" role="img">
          <title>Campus Map</title>
          <desc>Interactive campus map showing buildings, roads, and facilities</desc>
        </svg>
      </div>
      <div class="legend" id="legend"></div>
      <div class="search-bar" id="search-bar">
        <input class="search-inp" id="search-inp" placeholder="🔍 Search buildings…" autocomplete="off"/>
        <div class="search-results" id="search-results" style="display:none"></div>
      </div>
      <div class="zoom-bar">
        <button class="zoom-btn" id="zoom-in" title="Zoom in (Ctrl+Plus)" aria-label="Zoom in">+</button>
        <div class="zoom-lbl" id="zoom-lbl">100%</div>
        <button class="zoom-btn" id="zoom-out" title="Zoom out (Ctrl+Minus)" aria-label="Zoom out">–</button>
        <button class="zoom-btn" id="zoom-fit" title="Fit to view (F)" style="font-size:10px;font-weight:700" aria-label="Fit to view">FIT</button>
      </div>
      <div class="coords" id="coords">x:0  y:0</div>
      <div id="sel-box" class="sel-box" style="display:none"></div>
    </div>
    <aside class="side" id="side" style="display:none"></aside>
  </div>
  <div class="status-bar" id="status-bar">
    <div class="status-item"><i class="ti ti-building" aria-hidden="true"></i><span id="st-buildings">0</span> buildings</div>
    <div class="status-item"><i class="ti ti-route" aria-hidden="true"></i><span id="st-roads">0</span> roads</div>
    <div class="status-item"><i class="ti ti-walk" aria-hidden="true"></i><span id="st-paths">0</span> paths</div>
    <div style="flex:1"></div>
    <div class="status-item" style="color:#3a3020"><i class="ti ti-keyboard" aria-hidden="true"></i>Del — delete · Esc — deselect · F — fit · G — grid · S — snap · Ctrl+Z/Y — undo/redo · Alt+drag — pan</div>
  </div>
</div>
<div id="export-modal" style="display:none"></div>

<script>
const MAP_W=1400,MAP_H=780,MINOR=40,MAJOR=200,SNAP=40;
const CATS=['Academic','Medical','Sports','Facility','Dining','Gate','Nature','Footpath','Shop','Other'];
const CAT_COLORS={Academic:'#BFDBFE',Medical:'#FCA5A5',Sports:'#BBF7D0',Facility:'#D1D5DB',Dining:'#FED7AA',Gate:'#374151',Nature:'#86EFAC',Footpath:'#E5E7EB',Shop:'#FBCFE8',Other:'#DDD6FE'};
const FILL_COLS=[
  {l:'Gray',v:'#D1D5DB'},{l:'Blue',v:'#BFDBFE'},{l:'Green',v:'#BBF7D0'},{l:'Yellow',v:'#FEF08A'},
  {l:'Pink',v:'#FBCFE8'},{l:'Purple',v:'#DDD6FE'},{l:'Orange',v:'#FED7AA'},{l:'Red',v:'#FECACA'},
  {l:'White',v:'#F9FAFB'},{l:'Teal',v:'#CCFBF1'},{l:'Dark',v:'#374151'},{l:'Forest',v:'#166534'},{l:'Pool',v:'#67E8F9'},
  {l:'Sand',v:'#FDE68A'},{l:'Brick',v:'#C2856A'},{l:'Stone',v:'#9CA3AF'},{l:'Cream',v:'#FFF7ED'}
];
const ROAD_COLS=[{l:'Yellow',v:'#FDE68A'},{l:'Amber',v:'#FCD34D'},{l:'Gray',v:'#D1D5DB'},{l:'White',v:'#F9FAFB'},{l:'Blue',v:'#BFDBFE'},{l:'Teal',v:'#99F6E4'},{l:'Concrete',v:'#E5E7EB'}];
const PATH_COLS=[{l:'Stone',v:'#D1D5DB'},{l:'Tan',v:'#D4B896'},{l:'Brick',v:'#C2856A'},{l:'White',v:'#F3F4F6'},{l:'Dark',v:'#6B7280'}];
const SHAPES=['rect','circle','hexagon','diamond','octagon','ellipse'];

// Component presets: quick-add palette
const COMPONENT_PRESETS=[
  {group:'Nature',items:[
    {icon:'🌳',label:'Tree',data:{label:'🌳',w:38,h:38,shape:'circle',fill:'#166534',stroke:'#14532d',cat:'Nature',notes:'Tree',emoji:true}},
    {icon:'🌿',label:'Bush',data:{label:'🌿',w:28,h:28,shape:'circle',fill:'#22c55e',stroke:'#15803d',cat:'Nature',notes:'Bush/shrub',emoji:true}},
    {icon:'🌺',label:'Flower',data:{label:'🌺',w:22,h:22,shape:'circle',fill:'#f472b6',stroke:'#be185d',cat:'Nature',notes:'Flower bed',emoji:true}},
    {icon:'💧',label:'Pond',data:{label:'POND',w:80,h:60,shape:'octagon',fill:'#93c5fd',stroke:'#1d4ed8',cat:'Nature',notes:'Ornamental pond'}},
    {icon:'🏊',label:'Pool',data:{label:'POOL',w:100,h:70,shape:'rect',fill:'#67E8F9',stroke:'#0891B2',cat:'Nature',notes:'Swimming pool'}},
    {icon:'🌱',label:'Garden',data:{label:'GARDEN',w:120,h:80,shape:'rect',fill:'#86EFAC',stroke:'#166534',cat:'Nature',notes:'Garden area'}},
    {icon:'🌾',label:'Lawn',data:{label:'LAWN',w:150,h:100,shape:'rect',fill:'#bbf7d0',stroke:'#15803d',cat:'Nature',notes:'Lawn area'}},
    {icon:'⛲',label:'Fountain',data:{label:'FOUNTAIN',w:50,h:50,shape:'circle',fill:'#bfdbfe',stroke:'#1d4ed8',cat:'Nature',notes:'Fountain'}},
  ]},
  {group:'Paths',items:[
    {icon:'🚶',label:'Footpath',data:{label:'Footpath',isPath:true,color:'#D4B896',width:10,style:'solid'}},
    {icon:'🏃',label:'Walkway',data:{label:'Walkway',isPath:true,color:'#D1D5DB',width:16,style:'dashed'}},
    {icon:'🚲',label:'Cycle path',data:{label:'Cycle Path',isPath:true,color:'#6ee7b7',width:8,style:'dotted'}},
  ]},
  {group:'Facilities',items:[
    {icon:'☕',label:'Café',data:{label:'CAFÉ',w:70,h:60,shape:'rect',fill:'#FED7AA',stroke:'#c2410c',cat:'Dining',notes:'Café'}},
    {icon:'🍽️',label:'Canteen',data:{label:'CANTEEN',w:100,h:70,shape:'rect',fill:'#BFDBFE',stroke:'#374151',cat:'Dining',notes:'Canteen'}},
    {icon:'🛒',label:'Shop',data:{label:'SHOP',w:80,h:60,shape:'rect',fill:'#FBCFE8',stroke:'#be185d',cat:'Shop',notes:'Campus shop'}},
    {icon:'📚',label:'Library',data:{label:'LIBRARY',w:140,h:100,shape:'rect',fill:'#DDD6FE',stroke:'#5b21b6',cat:'Academic',notes:'Library'}},
    {icon:'🏋️',label:'Gym',data:{label:'GYM',w:110,h:80,shape:'rect',fill:'#BBF7D0',stroke:'#059669',cat:'Sports',notes:'Gymnasium'}},
    {icon:'🏥',label:'Clinic',data:{label:'CLINIC',w:90,h:70,shape:'rect',fill:'#FCA5A5',stroke:'#991b1b',cat:'Medical',notes:'Medical clinic'}},
    {icon:'🎭',label:'Theatre',data:{label:'THEATRE',w:130,h:100,shape:'hexagon',fill:'#DDD6FE',stroke:'#374151',cat:'Facility',notes:'Auditorium/theatre'}},
    {icon:'🅿️',label:'Parking',data:{label:'PARKING',w:140,h:80,shape:'rect',fill:'#FECACA',stroke:'#374151',cat:'Facility',notes:'Parking area'}},
    {icon:'🏦',label:'ATM/Bank',data:{label:'ATM',w:50,h:40,shape:'rect',fill:'#FEF08A',stroke:'#374151',cat:'Shop',notes:'ATM / Bank'}},
    {icon:'🚻',label:'Restroom',data:{label:'WC',w:46,h:40,shape:'rect',fill:'#F3F4F6',stroke:'#374151',cat:'Facility',notes:'Restrooms'}},
    {icon:'🏠',label:'Admin',data:{label:'ADMIN',w:130,h:90,shape:'rect',fill:'#D1D5DB',stroke:'#374151',cat:'Facility',notes:'Administration office'}},
    {icon:'🔬',label:'Lab',data:{label:'LAB',w:120,h:80,shape:'rect',fill:'#E0F2FE',stroke:'#0284c7',cat:'Academic',notes:'Laboratory'}},
  ]},
  {group:'Infrastructure',items:[
    {icon:'🚪',label:'Main Gate',data:{label:'MAIN\nGATE',w:32,h:44,shape:'rect',fill:'#1F2937',stroke:'#374151',cat:'Gate',notes:'Main gate',isGate:true}},
    {icon:'🔒',label:'Side Gate',data:{label:'GATE',w:28,h:40,shape:'rect',fill:'#374151',stroke:'#374151',cat:'Gate',notes:'Side gate',isGate:true}},
    {icon:'🏗️',label:'Building',data:{label:'BUILDING',w:120,h:100,shape:'rect',fill:'#D1D5DB',stroke:'#374151',cat:'Facility',notes:''}},
    {icon:'🗼',label:'Tower',data:{label:'TOWER',w:50,h:50,shape:'octagon',fill:'#6B7280',stroke:'#374151',cat:'Facility',notes:'Tower'}},
    {icon:'⚡',label:'Power',data:{label:'POWER',w:44,h:44,shape:'diamond',fill:'#FEF08A',stroke:'#ca8a04',cat:'Facility',notes:'Power substation'}},
    {icon:'🚌',label:'Bus Stop',data:{label:'BUS\nSTOP',w:46,h:36,shape:'rect',fill:'#BFDBFE',stroke:'#1d4ed8',cat:'Facility',notes:'Bus stop'}},
  ]},
];

const INITIAL_STATE={

// ─── State ───────────────────────────────────────────────────────────────────
let state=JSON.parse(JSON.stringify(INITIAL_STATE));
let selectedIds=new Set(),selectedRoadId=null,selectedPathId=null;
let editMode=false,editTarget='buildings';
let drawMode=false,drawType='road',drawingPts=[];
let showLegend=true,showGrid=true,snapToGrid=true;
let zoom=1,panX=0,panY=0;
let isPanning=false,panStart={x:0,y:0},panOrig={x:0,y:0};
let dragBldg=null,dragOff={x:0,y:0},dragStartPos=null;
let multiDragOffsets=null;
let saveStatus='saved',saveTimer=null;
let undoStack=[],redoStack=[];
let selBoxStart=null,selBoxCurrent=null,isSelBoxing=false;

// ─── Undo/Redo ────────────────────────────────────────────────────────────────
function snapshot(){undoStack.push(JSON.stringify(state));if(undoStack.length>80)undoStack.shift();redoStack=[];renderHdr();}
function undo(){if(!undoStack.length)return;redoStack.push(JSON.stringify(state));state=JSON.parse(undoStack.pop());selectedIds.clear();selectedRoadId=null;selectedPathId=null;renderAll();}
function redo(){if(!redoStack.length)return;undoStack.push(JSON.stringify(state));state=JSON.parse(redoStack.pop());renderAll();}

// ─── SVG helpers ─────────────────────────────────────────────────────────────
const svg=document.getElementById('map-svg');
const mapArea=document.getElementById('map-area');
const canvasWrap=document.getElementById('canvas-wrap');
svg.setAttribute('width',MAP_W+40);svg.setAttribute('height',MAP_H+24);
svg.style.display='block';svg.style.overflow='visible';

function mkEl(tag,attrs){const el=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);return el;}

// ─── Storage ─────────────────────────────────────────────────────────────────
const SK='campus-map-v3';
async function persistSave(){try{if(localStorage){const d={version:3,state};localStorage.setItem(SK,JSON.stringify(d));}}catch(e){}}
async function persistLoad(){try{const raw=localStorage.getItem(SK);if(raw){const d=JSON.parse(raw);if(d.version===3&&d.state?.buildings){state=d.state;if(!state.footpaths)state.footpaths=[];return;}}}catch(e){}state=JSON.parse(JSON.stringify(INITIAL_STATE));}
function scheduleSave(){saveStatus='unsaved';renderHdr();clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{saveStatus='saving';renderHdr();await persistSave();saveStatus='saved';renderHdr();},700);}

// ─── Snap ─────────────────────────────────────────────────────────────────────
function snapV(v){return snapToGrid?Math.round(v/SNAP)*SNAP:Math.round(v);}

// ─── Zoom/Pan ─────────────────────────────────────────────────────────────────
function applyTransform(){canvasWrap.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;document.getElementById('zoom-lbl').textContent=Math.round(zoom*100)+'%';}
function fitCanvas(){const rect=mapArea.getBoundingClientRect();const sx=(rect.width-40)/MAP_W,sy=(rect.height-40)/MAP_H;zoom=Math.min(sx,sy,.98);panX=(rect.width-MAP_W*zoom)/2;panY=(rect.height-MAP_H*zoom)/2;applyTransform();}
function toCanvas(cx,cy){const rect=mapArea.getBoundingClientRect();return{x:(cx-rect.left-panX)/zoom,y:(cy-rect.top-panY)/zoom};}

document.getElementById('zoom-in').onclick=()=>{zoom=Math.min(zoom*1.2,6);applyTransform()};
document.getElementById('zoom-out').onclick=()=>{zoom=Math.max(zoom/1.2,.12);applyTransform()};
document.getElementById('zoom-fit').onclick=fitCanvas;
mapArea.addEventListener('wheel',e=>{e.preventDefault();const rect=mapArea.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;const oz=zoom;zoom=e.deltaY<0?Math.min(zoom*1.1,6):Math.max(zoom/1.1,.12);panX=mx-(mx-panX)*zoom/oz;panY=my-(my-panY)*zoom/oz;applyTransform();},{passive:false});

// ─── Path helpers ─────────────────────────────────────────────────────────────
function roadPath(road){let d=`M ${road.start.x} ${road.start.y}`;for(const s of road.segments){if(s.type==='L')d+=` L ${s.end.x} ${s.end.y}`;if(s.type==='C')d+=` C ${s.cp1.x} ${s.cp1.y} ${s.cp2.x} ${s.cp2.y} ${s.end.x} ${s.end.y}`;}return d;}

// ─── Mouse state ─────────────────────────────────────────────────────────────
let cursorPos={x:0,y:0};

mapArea.addEventListener('mousedown',e=>{
  if(e.button===1||(e.button===0&&e.altKey)){
    isPanning=true;panStart={x:e.clientX,y:e.clientY};panOrig={x:panX,y:panY};
    mapArea.classList.add('cursor-grab');e.preventDefault();return;
  }
  if(e.button===0&&editMode&&editTarget==='buildings'&&!drawMode&&e.target===svg){
    // Start selection box
    const pt=toCanvas(e.clientX,e.clientY);
    selBoxStart={x:pt.x,y:pt.y};selBoxCurrent={x:pt.x,y:pt.y};isSelBoxing=true;
    if(!e.shiftKey)selectedIds.clear();
    return;
  }
});

window.addEventListener('mousemove',e=>{
  const pt=toCanvas(e.clientX,e.clientY);
  cursorPos={x:Math.round(pt.x),y:Math.round(pt.y)};
  document.getElementById('coords').textContent=`x:${cursorPos.x}  y:${cursorPos.y}`;
  if(isPanning){panX=panOrig.x+(e.clientX-panStart.x);panY=panOrig.y+(e.clientY-panStart.y);applyTransform();return;}
  if(isSelBoxing&&selBoxStart){
    selBoxCurrent={x:pt.x,y:pt.y};
    const minX=Math.min(selBoxStart.x,selBoxCurrent.x),minY=Math.min(selBoxStart.y,selBoxCurrent.y);
    const maxX=Math.max(selBoxStart.x,selBoxCurrent.x),maxY=Math.max(selBoxStart.y,selBoxCurrent.y);
    const rect=mapArea.getBoundingClientRect();
    const sb=document.getElementById('sel-box');
    sb.style.display='block';
    sb.style.left=(minX*zoom+panX)+'px';sb.style.top=(minY*zoom+panY)+'px';
    sb.style.width=((maxX-minX)*zoom)+'px';sb.style.height=((maxY-minY)*zoom)+'px';
    return;
  }
  if(dragBldg){
    const ids=[...selectedIds];
    if(ids.length>1&&multiDragOffsets){
      const baseOff=multiDragOffsets[dragBldg];
      const nx=snapV(pt.x-baseOff.x),ny=snapV(pt.y-baseOff.y);
      const dx=nx-state.buildings.find(b=>b.id===dragBldg).x;
      const dy=ny-state.buildings.find(b=>b.id===dragBldg).y;
      state.buildings=state.buildings.map(b=>{
        if(!ids.includes(b.id))return b;
        return{...b,x:snapV(b.x+dx),y:snapV(b.y+dy)};
      });
    } else {
      const nx=snapV(pt.x-dragOff.x),ny=snapV(pt.y-dragOff.y);
      // clamp to canvas
      const b=state.buildings.find(b=>b.id===dragBldg);
      const cx2=Math.max(0,Math.min(nx,MAP_W-b.width));
      const cy2=Math.max(0,Math.min(ny,MAP_H-b.height));
      state.buildings=state.buildings.map(b=>b.id===dragBldg?{...b,x:cx2,y:cy2}:b);
    }
    renderSVG();
  }
});

window.addEventListener('mouseup',e=>{
  if(isPanning){isPanning=false;mapArea.classList.remove('cursor-grab');}
  if(isSelBoxing&&selBoxStart&&selBoxCurrent){
    isSelBoxing=false;
    document.getElementById('sel-box').style.display='none';
    const minX=Math.min(selBoxStart.x,selBoxCurrent.x),minY=Math.min(selBoxStart.y,selBoxCurrent.y);
    const maxX=Math.max(selBoxStart.x,selBoxCurrent.x),maxY=Math.max(selBoxStart.y,selBoxCurrent.y);
    if(maxX-minX>5||maxY-minY>5){
      state.buildings.forEach(b=>{if(b.x+b.width>minX&&b.x<maxX&&b.y+b.height>minY&&b.y<maxY)selectedIds.add(b.id);});
      renderAll();
    }
    selBoxStart=null;selBoxCurrent=null;
  }
  if(dragBldg){dragBldg=null;multiDragOffsets=null;scheduleSave();}
});

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)&&!e.shiftKey){e.preventDefault();undo();return;}
  if((e.key==='y'&&(e.ctrlKey||e.metaKey))||(e.key==='z'&&(e.ctrlKey||e.metaKey)&&e.shiftKey)){e.preventDefault();redo();return;}
  if(e.key==='Escape'){selectedIds.clear();selectedRoadId=null;selectedPathId=null;drawMode&&cancelDraw();renderAll();return;}
  if(e.key==='Delete'||e.key==='Backspace'){
    if(selectedIds.size){snapshot();state.buildings=state.buildings.filter(b=>!selectedIds.has(b.id));selectedIds.clear();scheduleSave();renderAll();}
    if(selectedRoadId){snapshot();state.roads=state.roads.filter(r=>r.id!==selectedRoadId);selectedRoadId=null;scheduleSave();renderAll();}
    if(selectedPathId){snapshot();state.footpaths=state.footpaths.filter(p=>p.id!==selectedPathId);selectedPathId=null;scheduleSave();renderAll();}
    return;
  }
  if(e.key==='f'||e.key==='F'){fitCanvas();return;}
  if(e.key==='g'||e.key==='G'){showGrid=!showGrid;renderSVG();return;}
  if(e.key==='s'&&!e.ctrlKey){snapToGrid=!snapToGrid;renderHdr();return;}
  if(e.key==='a'&&(e.ctrlKey||e.metaKey)&&editMode){e.preventDefault();state.buildings.forEach(b=>selectedIds.add(b.id));renderAll();return;}
  // Arrow nudge
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)&&selectedIds.size){
    e.preventDefault();
    const d=e.shiftKey?SNAP:4;
    const dx=e.key==='ArrowLeft'?-d:e.key==='ArrowRight'?d:0;
    const dy=e.key==='ArrowUp'?-d:e.key==='ArrowDown'?d:0;
    state.buildings=state.buildings.map(b=>selectedIds.has(b.id)?{...b,x:Math.max(0,Math.min(b.x+dx,MAP_W-b.width)),y:Math.max(0,Math.min(b.y+dy,MAP_H-b.height))}:b);
    renderSVG();scheduleSave();
  }
});

// ─── Search ───────────────────────────────────────────────────────────────────
const searchInp=document.getElementById('search-inp');
const searchRes=document.getElementById('search-results');
searchInp.addEventListener('input',()=>{
  const q=searchInp.value.trim().toLowerCase();
  if(!q){searchRes.style.display='none';return;}
  const hits=state.buildings.filter(b=>b.label.toLowerCase().includes(q)||b.category.toLowerCase().includes(q)||b.notes.toLowerCase().includes(q));
  if(!hits.length){searchRes.style.display='none';return;}
  searchRes.style.display='block';searchRes.innerHTML='';
  hits.slice(0,8).forEach(b=>{
    const item=document.createElement('div');item.className='sr-item';
    const cc=CAT_COLORS[b.category]||'#E5E7EB';
    item.innerHTML=`<div style="width:10px;height:10px;border-radius:2px;background:${cc};flex-shrink:0"></div><span>${b.label.replace(/\n/g,' ')}</span><span style="margin-left:auto;font-size:10px;color:var(--text-tertiary)">${b.category}</span>`;
    item.onclick=()=>{
      selectedIds.clear();selectedIds.add(b.id);
      // zoom to building
      const cx=b.x+b.width/2,cy=b.y+b.height/2;
      const rect=mapArea.getBoundingClientRect();
      zoom=2;panX=rect.width/2-cx*zoom;panY=rect.height/2-cy*zoom;
      applyTransform();searchInp.value='';searchRes.style.display='none';renderAll();
    };
    searchRes.appendChild(item);
  });
});
document.addEventListener('click',e=>{if(!searchRes.contains(e.target)&&e.target!==searchInp)searchRes.style.display='none';});

// ─── Render: Grid ─────────────────────────────────────────────────────────────
function renderGrid(g){
  if(!showGrid)return;
  for(let x=0;x<=MAP_W;x+=MINOR)g.appendChild(mkEl('line',{x1:x,y1:0,x2:x,y2:MAP_H,stroke:x%MAJOR===0?'rgba(160,134,80,.22)':'rgba(160,134,80,.09)','stroke-width':x%MAJOR===0?.8:.4}));
  for(let y=0;y<=MAP_H;y+=MINOR)g.appendChild(mkEl('line',{x1:0,y1:y,x2:MAP_W,y2:y,stroke:y%MAJOR===0?'rgba(160,134,80,.22)':'rgba(160,134,80,.09)','stroke-width':y%MAJOR===0?.8:.4}));
  for(let x=0;x<=MAP_W;x+=MAJOR)for(let y=0;y<=MAP_H;y+=MAJOR)g.appendChild(mkEl('circle',{cx:x,cy:y,r:1.8,fill:'rgba(160,134,80,.45)'}));
  for(let x=0;x<=MAP_W;x+=MAJOR){const t=mkEl('text',{x,y:MAP_H+14,'text-anchor':'middle','font-size':9,'font-family':'Outfit,sans-serif',fill:'rgba(122,112,96,.55)'});t.textContent=x;g.appendChild(t);}
  for(let y=0;y<=MAP_H;y+=MAJOR){const t=mkEl('text',{x:-5,y:y+3,'text-anchor':'end','font-size':9,'font-family':'Outfit,sans-serif',fill:'rgba(122,112,96,.55)'});t.textContent=y;g.appendChild(t);}
}

// ─── Render: Footpath ─────────────────────────────────────────────────────────
function renderFootpath(fp,g){
  const d=roadPath(fp);
  const isSel=selectedPathId===fp.id&&editMode;
  if(isSel)g.appendChild(mkEl('path',{d,stroke:'#f59e0b','stroke-width':fp.width+10,fill:'none','stroke-linecap':'round',opacity:.3}));
  // Shadow
  g.appendChild(mkEl('path',{d,stroke:'rgba(0,0,0,.12)','stroke-width':fp.width+2,fill:'none','stroke-linecap':'round'}));
  const dash=fp.style==='dashed'?`${fp.width*1.5} ${fp.width}`:(fp.style==='dotted'?`2 ${fp.width}`:'none');
  g.appendChild(mkEl('path',{d,stroke:fp.color,'stroke-width':fp.width,fill:'none','stroke-linecap':'round','stroke-linejoin':'round','stroke-dasharray':dash}));
  // Walk marks
  if(fp.style==='solid'&&fp.width>8){
    g.appendChild(mkEl('path',{d,stroke:'rgba(255,255,255,.35)','stroke-width':2,fill:'none','stroke-dasharray':'12 10','stroke-linecap':'round'}));
  }
}

// ─── Render: Shape ───────────────────────────────────────────────────────────
function makeShape(b,isSel){
  const cx=b.x+b.width/2,cy=b.y+b.height/2;
  const sw=isSel?2.5:1.5,sc=isSel?'#f59e0b':b.strokeColor;
  if(b.shape==='circle')return mkEl('circle',{cx,cy,r:Math.min(b.width,b.height)/2,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='ellipse')return mkEl('ellipse',{cx,cy,rx:b.width/2,ry:b.height/2,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='hexagon'){const r2=Math.min(b.width,b.height)/2;const pts=Array.from({length:6},(_,i)=>{const a=Math.PI/180*(60*i-30);return`${cx+r2*Math.cos(a)},${cy+r2*Math.sin(a)}`;}).join(' ');return mkEl('polygon',{points:pts,fill:b.fillColor,stroke:sc,'stroke-width':sw});}
  if(b.shape==='diamond')return mkEl('polygon',{points:`${cx},${b.y} ${b.x+b.width},${cy} ${cx},${b.y+b.height} ${b.x},${cy}`,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='octagon'){const d2=Math.min(b.width,b.height)*.25;const pts=`${b.x+d2},${b.y} ${b.x+b.width-d2},${b.y} ${b.x+b.width},${b.y+d2} ${b.x+b.width},${b.y+b.height-d2} ${b.x+b.width-d2},${b.y+b.height} ${b.x+d2},${b.y+b.height} ${b.x},${b.y+b.height-d2} ${b.x},${b.y+d2}`;return mkEl('polygon',{points:pts,fill:b.fillColor,stroke:sc,'stroke-width':sw});}
  return mkEl('rect',{x:b.x,y:b.y,width:b.width,height:b.height,rx:4,fill:b.fillColor,stroke:sc,'stroke-width':sw});
}

// ─── Render: Main SVG ────────────────────────────────────────────────────────
function renderSVG(){
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const title=mkEl('title',{});title.textContent='Campus Map';svg.appendChild(title);
  svg.appendChild(mkEl('rect',{x:0,y:0,width:MAP_W,height:MAP_H,fill:'#EEF0E8'}));
  const gridG=mkEl('g',{});renderGrid(gridG);svg.appendChild(gridG);

  // Footpaths (below roads)
  const fpG=mkEl('g',{});
  for(const fp of (state.footpaths||[]))renderFootpath(fp,fpG);
  svg.appendChild(fpG);

  // Roads
  for(const road of state.roads){
    const d=roadPath(road);
    svg.appendChild(mkEl('path',{d,stroke:'#C8860A','stroke-width':road.width+8,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));
    svg.appendChild(mkEl('path',{d,stroke:'#E6A800','stroke-width':road.width+4,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));
    svg.appendChild(mkEl('path',{d,stroke:road.color,'stroke-width':road.width,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));
    if(road.showDashes)svg.appendChild(mkEl('path',{d,stroke:'white','stroke-width':2,fill:'none','stroke-dasharray':'22 14','stroke-linecap':'round',opacity:.7}));
    if(selectedRoadId===road.id&&editMode&&editTarget==='roads')svg.appendChild(mkEl('path',{d,stroke:'#f59e0b','stroke-width':road.width+14,fill:'none','stroke-linecap':'round',opacity:.22}));
  }

  // Junctions
  for(const j of state.junctions){
    svg.appendChild(mkEl('circle',{cx:j.x,cy:j.y,r:28,fill:'#FDE68A',stroke:'#E6A800','stroke-width':3}));
    if(editMode&&editTarget==='roads'){
      const h=mkEl('circle',{cx:j.x,cy:j.y,r:28,fill:'transparent',stroke:'#f59e0b','stroke-width':2.5,cursor:'move',opacity:.7});
      h.addEventListener('mousedown',e=>{
        e.stopPropagation();
        const mm=ev=>{const p=toCanvas(ev.clientX,ev.clientY);state.junctions=state.junctions.map(jj=>jj.id===j.id?{...jj,x:snapV(p.x),y:snapV(p.y)}:jj);renderSVG();};
        const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave();};
        window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
      });
      svg.appendChild(h);
    }
  }

  // Buildings
  for(const b of state.buildings){
    const cx=b.x+b.width/2,cy=b.y+b.height/2;
    const isSel=selectedIds.has(b.id);
    const isGate=b.isGate||b.category==='Gate';
    const g=mkEl('g',{});
    if(b.rotation!==0)g.setAttribute('transform',`rotate(${b.rotation} ${cx} ${cy})`);

    // Selection highlight
    if(isSel){
      const hl=mkEl('rect',{x:b.x-5,y:b.y-5,width:b.width+10,height:b.height+10,rx:7,fill:'none',stroke:'#f59e0b','stroke-width':2,'stroke-dasharray':'6 3',opacity:.9});
      g.appendChild(hl);
    }

    const shape=makeShape(b,isSel);
    g.appendChild(shape);

    // Gate decorations
    if(isGate){
      const bH=b.height*.55,bW=3.5;
      g.appendChild(mkEl('rect',{x:cx-b.width*.22-bW/2,y:cy-bH/2,width:bW,height:bH,fill:'#9CA3AF',rx:1}));
      g.appendChild(mkEl('rect',{x:cx+b.width*.22-bW/2,y:cy-bH/2,width:bW,height:bH,fill:'#9CA3AF',rx:1}));
      g.appendChild(mkEl('path',{d:`M ${b.x+4} ${cy} Q ${cx} ${b.y+2} ${b.x+b.width-4} ${cy}`,stroke:'#9CA3AF','stroke-width':2,fill:'none'}));
    }

    // Fountain decoration
    if(b.id.startsWith('fountain')||b.notes?.includes('Fountain')){
      g.appendChild(mkEl('circle',{cx,cy,r:Math.min(b.width,b.height)/4,fill:'#7dd3fc',stroke:'#0ea5e9','stroke-width':1}));
      g.appendChild(mkEl('line',{x1:cx,y1:cy-Math.min(b.width,b.height)/4,x2:cx,y2:cy-Math.min(b.width,b.height)/2.2,stroke:'#7dd3fc','stroke-width':2}));
    }

    // Label
    const isEmoji=b.emoji||['🌳','🌿','🌺','⛲'].includes(b.label);
    if(b.label&&!isEmoji){
      const lines=b.label.split('\n').filter(Boolean);
      const baseY=isGate?cy+b.height*.3:cy;
      const startY=baseY-(lines.length*12)/2+6;
      lines.forEach((line,i)=>{
        const t=mkEl('text',{x:cx,y:startY+i*12,'text-anchor':'middle','dominant-baseline':'middle','font-size':isGate?7.5:9.5,'font-family':'Outfit,sans-serif','font-weight':'700',fill:isGate||b.fillColor==='#1F2937'||b.fillColor==='#374151'?'#F9FAFB':'#374151'});
        t.textContent=line;g.appendChild(t);
      });
    } else if(isEmoji&&b.label){
      const t=mkEl('text',{x:cx,y:cy+1,'text-anchor':'middle','dominant-baseline':'middle','font-size':Math.min(b.width,b.height)*.72});
      t.textContent=b.label;g.appendChild(t);
    }

    // Interaction
    shape.style.cursor=(editMode&&editTarget==='buildings')?'move':'pointer';
    if(editMode&&editTarget==='buildings'){
      shape.addEventListener('mousedown',e=>{
        e.stopPropagation();
        const p=toCanvas(e.clientX,e.clientY);
        if(!e.shiftKey&&!selectedIds.has(b.id))selectedIds.clear();
        selectedIds.add(b.id);
        selectedRoadId=null;selectedPathId=null;
        dragBldg=b.id;
        dragOff.x=p.x-b.x;dragOff.y=p.y-b.y;
        // multi drag offsets
        if(selectedIds.size>1){
          multiDragOffsets={};
          selectedIds.forEach(id=>{const bb=state.buildings.find(x=>x.id===id);if(bb)multiDragOffsets[id]={x:p.x-bb.x,y:p.y-bb.y};});
        } else {multiDragOffsets=null;}
        snapshot();
        renderAll();
      });
    } else {
      shape.addEventListener('click',e=>{
        e.stopPropagation();
        if(e.shiftKey)selectedIds.has(b.id)?selectedIds.delete(b.id):selectedIds.add(b.id);
        else{selectedIds.clear();selectedIds.add(b.id);}
        selectedRoadId=null;selectedPathId=null;renderAll();
      });
    }
    // Double click zoom to
    shape.addEventListener('dblclick',e=>{
      e.stopPropagation();
      const rect=mapArea.getBoundingClientRect();
      zoom=Math.min(3,zoom+.5);panX=rect.width/2-(cx*zoom);panY=rect.height/2-(cy*zoom);
      applyTransform();
    });
    svg.appendChild(g);
  }

  // Road/path edit handles
  if(editMode&&editTarget==='roads'){
    for(const road of state.roads){
      const allPts=getPathHandles(road);
      allPts.forEach(({key,pos,isH})=>{
        if(!pos)return;
        const c=mkEl('circle',{cx:pos.x,cy:pos.y,r:isH?5:7,fill:isH?'#7dd3fc':'#f59e0b',stroke:'white','stroke-width':1.5,cursor:'move'});
        c.addEventListener('mousedown',e=>{e.stopPropagation();selectedRoadId=road.id;renderAll();makeDragHandle(c,pos,road.id,'roads',key);});
        svg.appendChild(c);
      });
    }
    for(const fp of (state.footpaths||[])){
      const allPts=getPathHandles(fp);
      allPts.forEach(({key,pos,isH})=>{
        if(!pos)return;
        const c=mkEl('circle',{cx:pos.x,cy:pos.y,r:isH?4:6,fill:isH?'#86efac':'#10b981',stroke:'white','stroke-width':1.5,cursor:'move'});
        c.addEventListener('mousedown',e=>{e.stopPropagation();selectedPathId=fp.id;renderAll();makeDragHandle(c,pos,fp.id,'footpaths',key);});
        svg.appendChild(c);
      });
    }
  }

  // Draw preview
  if(drawMode&&drawingPts.length>0){
    let d=`M ${drawingPts[0].x} ${drawingPts[0].y}`;
    for(let i=1;i<drawingPts.length;i++)d+=` L ${drawingPts[i].x} ${drawingPts[i].y}`;
    const col=drawType==='footpath'?'#10b981':'#f59e0b';
    svg.appendChild(mkEl('path',{d,stroke:col,'stroke-width':drawType==='footpath'?4:6,fill:'none','stroke-dasharray':'8 4','stroke-linecap':'round'}));
    drawingPts.forEach(pt=>svg.appendChild(mkEl('circle',{cx:pt.x,cy:pt.y,r:5,fill:col,stroke:'white','stroke-width':1.5})));
    // Live preview to cursor
    if(drawingPts.length>0){
      const last=drawingPts[drawingPts.length-1];
      svg.appendChild(mkEl('line',{x1:last.x,y1:last.y,x2:cursorPos.x,y2:cursorPos.y,stroke:col,'stroke-width':2,opacity:.45,'stroke-dasharray':'5 4'}));
    }
  }

  // Snap indicator
  if(snapToGrid&&editMode){
    const gx=snapV(cursorPos.x),gy=snapV(cursorPos.y);
    const si=mkEl('circle',{cx:gx,cy:gy,r:3,fill:'#f59e0b',opacity:.5});
    svg.appendChild(si);
  }

  updateStatusBar();
}

function getPathHandles(road){
  return[{key:'start',pos:road.start},...road.segments.flatMap((seg,i)=>{
    const r=[{key:`e${i}`,pos:seg.end}];
    if(seg.type==='C'){if(seg.cp1)r.push({key:`c${i}p1`,pos:seg.cp1,isH:true});if(seg.cp2)r.push({key:`c${i}p2`,pos:seg.cp2,isH:true});}
    return r;
  })];
}

function makeDragHandle(c,pos,id,collection,key){
  const mm=ev=>{
    const p=toCanvas(ev.clientX,ev.clientY);
    const nx=snapV(p.x),ny=snapV(p.y);
    state[collection]=state[collection].map(r=>{
      if(r.id!==id)return r;
      if(key==='start')return{...r,start:{x:nx,y:ny}};
      if(key.startsWith('e')){const i=parseInt(key.slice(1));return{...r,segments:r.segments.map((s,j)=>j===i?{...s,end:{x:nx,y:ny}}:s)};}
      const m=key.match(/^c(\d+)(p[12])$/);
      if(m){const i=parseInt(m[1]),h=m[2];return{...r,segments:r.segments.map((s,j)=>{if(j!==i||s.type!=='C')return s;return h==='p1'?{...s,cp1:{x:nx,y:ny}}:{...s,cp2:{x:nx,y:ny}};})}}
      return r;
    });
    renderSVG();
  };
  const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave();};
  window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
}

svg.addEventListener('mousemove',e=>{if(drawMode)renderSVG();});

svg.addEventListener('click',e=>{
  if(drawMode){
    const p=toCanvas(e.clientX,e.clientY);
    drawingPts=[...drawingPts,{x:snapV(p.x),y:snapV(p.y)}];
    renderSVG();renderHdr();return;
  }
  if(e.target===svg){selectedIds.clear();selectedRoadId=null;selectedPathId=null;renderAll();}
});

  document.getElementById('st-buildings').textContent=state.buildings.length;
  document.getElementById('st-roads').textContent=state.roads.length;

// ─── Buttons ─────────────────────────────────────────────────────────────────
function mkBtn(cls,html,onclick){const b=document.createElement('button');b.className='btn '+cls;b.innerHTML=html;if(onclick)b.onclick=onclick;return b;}
function mkTog(on){const t=document.createElement('button');t.className='tog'+(on?' tog-on':'');t.innerHTML='<span class="tog-k"></span>';return t;}

// ─── Header ──────────────────────────────────────────────────────────────────
function renderHdr(){
  const hdr=document.getElementById('hdr');hdr.innerHTML='';
  const t=document.createElement('div');t.className='hdr-title';
  t.innerHTML=`<i class="ti ti-map-pin" aria-hidden="true" style="color:#c8a84a;font-size:17px"></i>Campus Map<span class="hdr-sub">Editor</span>`;
  hdr.appendChild(t);
  // Save
  const cfgs={saved:{i:'ti-cloud-check',tx:'Saved',s:'border-color:#6ee7b7;color:#065f46;background:#ecfdf5'},saving:{i:'ti-loader',tx:'Saving…',s:'border-color:#93c5fd;color:#1e40af;background:#eff6ff'},unsaved:{i:'ti-device-floppy',tx:'Unsaved',s:'border-color:#fcd34d;color:#92400e;background:#fffbeb'}};
  const cf=cfgs[saveStatus]||cfgs.saved;
  const pill=document.createElement('div');pill.className='save-pill';pill.style.cssText=cf.s;
  pill.innerHTML=`<i class="ti ${cf.i}" style="font-size:12px"></i>${cf.tx}`;hdr.appendChild(pill);

  const ubtn=mkBtn('btn-dark','<i class="ti ti-arrow-back-up"></i>',()=>undo());ubtn.title='Undo (Ctrl+Z)';ubtn.disabled=undoStack.length===0;
  const rbtn=mkBtn('btn-dark','<i class="ti ti-arrow-forward-up"></i>',()=>redo());rbtn.title='Redo (Ctrl+Y)';rbtn.disabled=redoStack.length===0;
  undoBar.appendChild(ubtn);undoBar.appendChild(rbtn);hdr.appendChild(undoBar);

  hdr.appendChild(Object.assign(document.createElement('div'),{className:'sp'}));

  if(drawMode){
    const bann=document.createElement('div');bann.className='draw-bann';
    const col=drawType==='footpath'?'#10b981':'#c8860a';
    bann.style.borderColor=drawType==='footpath'?'#6ee7b7':'#e8c96a';
    bann.style.background=drawType==='footpath'?'#ecfdf5':'#fdf3dc';

    bann.innerHTML=`<i class="ti ti-pencil"></i>${drawType==='footpath'?'Drawing Path':'Drawing Road'} · ${drawingPts.length} pts · <span style="font-size:10px;opacity:.7">Click to add · Esc to cancel</span>`;
    if(drawingPts.length>0)bann.appendChild(mkBtn('btn-ghost','<i class="ti ti-arrow-back-up"></i>Undo pt',()=>{drawingPts=drawingPts.slice(0,-1);renderSVG();renderHdr();}));
    const fb=mkBtn('btn-green','<i class="ti ti-check"></i>Finish',finishDraw);fb.disabled=drawingPts.length<2;bann.appendChild(fb);
    const xb=document.createElement('button');xb.style.cssText='background:none;border:none;color:#7a7060;cursor:pointer;font-size:18px;padding:0 4px';xb.textContent='×';xb.onclick=cancelDraw;bann.appendChild(xb);
    hdr.appendChild(bann);
  }

  // Snap toggle
  const snapBtn=mkBtn(snapToGrid?'btn-active':'btn-ghost',`<i class="ti ti-magnet"></i>Snap`,()=>{snapToGrid=!snapToGrid;renderHdr();renderSVG();});
  snapBtn.title='Toggle snap to grid (S)';hdr.appendChild(snapBtn);

  // Grid toggle
  const gridBtn=mkBtn(showGrid?'btn-active':'btn-ghost',`<i class="ti ti-grid-dots"></i>Grid`,()=>{showGrid=!showGrid;renderSVG();renderHdr();});
  gridBtn.title='Toggle grid (G)';hdr.appendChild(gridBtn);

  hdr.appendChild(mkBtn(showLegend?'btn-active':'btn-ghost','<i class="ti ti-layers"></i>Legend',()=>{showLegend=!showLegend;renderLegend();renderHdr();}));
  hdr.appendChild(mkBtn(editMode?'btn-active':'btn-ghost',editMode?'<i class="ti ti-pencil"></i>Editing':'<i class="ti ti-eye"></i>View',toggleEdit));

  if(editMode&&!drawMode){
    const tabs=document.createElement('div');tabs.className='tabs';
    [['buildings','<i class="ti ti-building"></i>Buildings'],['roads','<i class="ti ti-route"></i>Roads']].forEach(([tgt,lbl])=>{

      tabs.appendChild(tb);
    });
    hdr.appendChild(tabs);
    if(editTarget==='roads'){
      hdr.appendChild(mkBtn('btn-green','<i class="ti ti-route"></i>Road',()=>{drawMode=true;drawType='road';drawingPts=[];renderHdr();}));
      hdr.appendChild(mkBtn('btn-blue','<i class="ti ti-walk"></i>Footpath',()=>{drawMode=true;drawType='footpath';drawingPts=[];renderHdr();}));
      hdr.appendChild(mkBtn('btn-amber','<i class="ti ti-circle-plus"></i>Junction',()=>{snapshot();state.junctions=[...state.junctions,{id:`j-${Date.now()}`,x:700,y:398}];scheduleSave();renderSVG();}));
    }
  }

  hdr.appendChild(mkBtn('btn-dark','<i class="ti ti-refresh"></i>',doReset));
  hdr.appendChild(mkBtn('btn-amber','<i class="ti ti-download"></i>Export SVG',doExport));
}

// ─── Legend ──────────────────────────────────────────────────────────────────

// ─── Side panel ──────────────────────────────────────────────────────────────
function addField(parent,label,inputFn){
  const wrap=document.createElement('div');
  const lbl=document.createElement('label');lbl.className='flabel';lbl.textContent=label;
  wrap.appendChild(lbl);wrap.appendChild(inputFn());parent.appendChild(wrap);
}
function updateB(id,key,val){state.buildings=state.buildings.map(b=>b.id===id?{...b,[key]:val}:b);scheduleSave();renderSVG();renderSide();}
function updateR(id,key,val,col='roads'){state[col]=state[col].map(r=>r.id===id?{...r,[key]:val}:r);scheduleSave();renderSVG();renderSide();}

function renderSide(){
  const side=document.getElementById('side');
  const selArr=[...selectedIds];
  const b=selArr.length===1?state.buildings.find(x=>x.id===selArr[0]):null;
  const r=state.roads.find(x=>x.id===selectedRoadId);
  const fp=(state.footpaths||[]).find(x=>x.id===selectedPathId);
  const multiSel=selArr.length>1;

  if(!b&&!r&&!fp&&!multiSel){side.style.display='none';return;}
  side.style.display='flex';side.innerHTML='';

  // Multi-select panel
  if(multiSel&&!b){
    const sh=document.createElement('div');sh.className='side-hdr';
    sh.innerHTML=`<div class="side-title"><i class="ti ti-layers-intersect" style="font-size:14px"></i>${selArr.length} selected</div>`;
    const btns=document.createElement('div');btns.style.cssText='display:flex;gap:6px;align-items:center';
    btns.appendChild(mkBtn('btn-red','<i class="ti ti-trash"></i>Del all',()=>{snapshot();state.buildings=state.buildings.filter(b=>!selectedIds.has(b.id));selectedIds.clear();scheduleSave();renderAll();}));
    const xb=document.createElement('button');xb.style.cssText='background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:18px;padding:0';xb.textContent='×';xb.setAttribute('aria-label','Close');xb.onclick=()=>{selectedIds.clear();renderAll();};btns.appendChild(xb);
    sh.appendChild(btns);side.appendChild(sh);
    const sb=document.createElement('div');sb.className='side-body';
    const info=document.createElement('div');info.style.cssText='font-size:12px;color:var(--text-secondary);line-height:1.7';
    info.innerHTML=`<b style="font-weight:600">${selArr.length}</b> buildings selected.<br>Drag any one to move all together.<br>Press <kbd style="background:rgba(0,0,0,.08);padding:1px 5px;border-radius:3px;font-family:monospace">Delete</kbd> or use button above to remove.`;
    sb.appendChild(info);
    addField(sb,'Fill color (all)',()=>{
      const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-wrap:wrap;gap:4px;margin-top:3px';
      FILL_COLS.forEach(({l,v})=>{const sw=document.createElement('button');sw.className='sw';sw.style.cssText=`background:${v};border-color:var(--border-t)`;sw.title=l;sw.onclick=()=>{snapshot();state.buildings=state.buildings.map(b=>selectedIds.has(b.id)?{...b,fillColor:v}:b);scheduleSave();renderSVG();};wrap.appendChild(sw);});
      return wrap;
    });
    side.appendChild(sb);
    return;
  }

  if(b){
    const isEdit=editMode&&editTarget==='buildings';
    const catColor=CAT_COLORS[b.category]||'#E5E7EB';
    const sh=document.createElement('div');sh.className='side-hdr';
    const titleDiv=document.createElement('div');titleDiv.className='side-title';
    titleDiv.innerHTML=`<div style="width:10px;height:10px;border-radius:2px;background:${b.fillColor};border:1px solid var(--border-t);flex-shrink:0"></div>${(b.label||'Element').replace(/\n/g,' ').slice(0,22)}`;
    sh.appendChild(titleDiv);
    const btns=document.createElement('div');btns.style.cssText='display:flex;align-items:center;gap:6px';
    if(isEdit){btns.appendChild(mkBtn('btn-red','<i class="ti ti-trash"></i>',()=>{snapshot();state.buildings=state.buildings.filter(x=>x.id!==b.id);selectedIds.clear();scheduleSave();renderAll();}));}
    const xb=document.createElement('button');xb.style.cssText='background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:19px;padding:0';xb.textContent='×';xb.setAttribute('aria-label','Close');xb.onclick=()=>{selectedIds.clear();renderAll();};btns.appendChild(xb);
    sh.appendChild(btns);side.appendChild(sh);

    const sb=document.createElement('div');sb.className='side-body';
    const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:7px';
    const badge=document.createElement('span');badge.className='badge';badge.style.cssText=`background:${catColor};color:#374151`;badge.textContent=b.category;row.appendChild(badge);
    sb.appendChild(row);

    addField(sb,'Label',()=>{const ta=document.createElement('textarea');ta.className='ftxt';ta.rows=2;ta.value=b.label;ta.disabled=!isEdit;ta.oninput=()=>updateB(b.id,'label',ta.value);return ta;});
    addField(sb,'Category',()=>{const sel=document.createElement('select');sel.className='fsel';sel.disabled=!isEdit;CATS.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;if(c===b.category)o.selected=true;sel.appendChild(o);});sel.onchange=()=>updateB(b.id,'category',sel.value);return sel;});
    addField(sb,'Notes',()=>{const ta=document.createElement('textarea');ta.className='ftxt';ta.rows=2;ta.value=b.notes;ta.disabled=!isEdit;ta.placeholder='Add description…';ta.oninput=()=>updateB(b.id,'notes',ta.value);return ta;});

    if(isEdit){
      addField(sb,'Shape',()=>{const sel=document.createElement('select');sel.className='fsel';SHAPES.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s.charAt(0).toUpperCase()+s.slice(1);if(s===b.shape)o.selected=true;sel.appendChild(o);});sel.onchange=()=>updateB(b.id,'shape',sel.value);return sel;});
      addField(sb,'Fill color',()=>{
        const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-wrap:wrap;gap:4px;margin-top:3px';
        FILL_COLS.forEach(({l,v})=>{const sw=document.createElement('button');sw.className='sw'+(b.fillColor===v?' sw-on':'');sw.style.cssText=`background:${v};border-color:${b.fillColor===v?'#c8860a':'var(--border-t)'}`;sw.title=l;sw.onclick=()=>updateB(b.id,'fillColor',v);wrap.appendChild(sw);});
        const cpw=document.createElement('label');cpw.className='sw cp-wrap';cpw.style.cssText='background:var(--bg-secondary);border:2px dashed var(--border-t);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-tertiary);cursor:pointer';cpw.textContent='+';cpw.setAttribute('aria-label','Custom color');
        const cp=document.createElement('input');cp.type='color';cp.value=b.fillColor;cp.oninput=()=>updateB(b.id,'fillColor',cp.value);cpw.appendChild(cp);wrap.appendChild(cpw);
        return wrap;
      });
      addField(sb,'Position',()=>{
        const g=document.createElement('div');g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:6px';
        ['x','y'].forEach(ax=>{const d=document.createElement('div');d.innerHTML=`<span style="font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary)">${ax.toUpperCase()}</span>`;const inp=document.createElement('input');inp.type='number';inp.className='finp';inp.value=Math.round(b[ax]);inp.style.marginTop='3px';inp.oninput=()=>{const v=snapV(parseFloat(inp.value)||0);updateB(b.id,ax,v);};d.appendChild(inp);g.appendChild(d);});return g;
      });
      addField(sb,'Size',()=>{
        const g=document.createElement('div');g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:6px';
        [['width','W'],['height','H']].forEach(([k,lbl])=>{const d=document.createElement('div');d.innerHTML=`<span style="font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary)">${lbl}</span>`;const inp=document.createElement('input');inp.type='number';inp.className='finp';inp.value=Math.round(b[k]);inp.style.marginTop='3px';inp.oninput=()=>updateB(b.id,k,Math.max(10,parseFloat(inp.value)||10));d.appendChild(inp);g.appendChild(d);});return g;
      });
      addField(sb,'Rotation (°)',()=>{const inp=document.createElement('input');inp.type='number';inp.className='finp';inp.value=b.rotation;inp.oninput=()=>updateB(b.id,'rotation',parseFloat(inp.value)||0);return inp;});
      addField(sb,'Stroke color',()=>{
        const wrap=document.createElement('div');wrap.style.cssText='display:flex;align-items:center;gap:7px';
        const cpw=document.createElement('label');cpw.className='cp-wrap';cpw.style.cssText=`width:34px;height:26px;border-radius:4px;border:1.5px solid var(--border-t);cursor:pointer;overflow:hidden;display:block;background:${b.strokeColor}`;
        const cp=document.createElement('input');cp.type='color';cp.value=b.strokeColor;cp.oninput=()=>{cpw.style.background=cp.value;updateB(b.id,'strokeColor',cp.value);};cpw.appendChild(cp);
        wrap.appendChild(cpw);const lbl2=document.createElement('span');lbl2.style.cssText='font-size:11px;color:var(--text-tertiary)';lbl2.textContent=b.strokeColor;wrap.appendChild(lbl2);return wrap;
      });
    }
    if(!isEdit&&b.notes){
      const callout=document.createElement('div');callout.className='callout';
      callout.innerHTML=`<div class="callout-lbl">About this venue</div><div style="font-size:12px;color:var(--text-secondary);line-height:1.6">${b.notes}</div>`;
      sb.appendChild(callout);
    }
    side.appendChild(sb);

    // Component quick-add palette (edit mode)
    if(isEdit){
      const palHdr=document.createElement('div');palHdr.style.cssText='padding:10px 14px 5px;border-top:1px solid var(--border-t);flex-shrink:0';
      palHdr.innerHTML='<div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-tertiary);">Add Component</div>';
      side.appendChild(palHdr);
      renderComponentPalette(side);
    }
  }

  if(r&&editMode&&editTarget==='roads'){renderRoadPanel(side,r,'roads');}
  if(fp&&editMode&&editTarget==='roads'){renderRoadPanel(side,fp,'footpaths');}
}

function renderRoadPanel(side,item,collection){
  const isFP=collection==='footpaths';
  const sh=document.createElement('div');sh.className='side-hdr';sh.style.cssText=isFP?'background:#ecfdf5;border-bottom-color:rgba(16,185,129,.3)':'background:var(--amber-bg);border-bottom-color:rgba(200,134,10,.3)';
  const td=document.createElement('div');td.className='side-title';td.style.color=isFP?'#059669':'var(--amber)';
  td.innerHTML=`<i class="ti ${isFP?'ti-walk':'ti-route'}" style="font-size:13px"></i>${item.label.slice(0,20)}`;sh.appendChild(td);
  const btns=document.createElement('div');btns.style.cssText='display:flex;align-items:center;gap:6px';
  btns.appendChild(mkBtn('btn-red','<i class="ti ti-trash"></i>',()=>{snapshot();state[collection]=state[collection].filter(x=>x.id!==item.id);if(collection==='roads')selectedRoadId=null;else selectedPathId=null;scheduleSave();renderAll();}));
  const xb=document.createElement('button');xb.style.cssText='background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:19px;padding:0';xb.textContent='×';xb.setAttribute('aria-label','Close');xb.onclick=()=>{if(collection==='roads')selectedRoadId=null;else selectedPathId=null;renderAll();};btns.appendChild(xb);
  sh.appendChild(btns);side.appendChild(sh);
  const sb=document.createElement('div');sb.className='side-body';
  const tip=document.createElement('div');tip.style.cssText=`background:${isFP?'#ecfdf5':'var(--amber-bg)'};border:1px solid ${isFP?'#6ee7b7':'var(--amber-bd)'};border-left:3px solid ${isFP?'#10b981':'var(--amber)'};border-radius:4px;padding:7px 9px;font-size:10px;font-weight:500;color:${isFP?'#059669':'var(--amber)'};line-height:1.6`;
  tip.textContent='Drag ○ anchors to reshape · drag ◦ handles to curve';sb.appendChild(tip);
  addField(sb,'Name',()=>{const inp=document.createElement('input');inp.type='text';inp.className='finp';inp.value=item.label;inp.oninput=()=>updateR(item.id,'label',inp.value,collection);return inp;});
  const cols=isFP?PATH_COLS:ROAD_COLS;
  addField(sb,'Color',()=>{const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-wrap:wrap;gap:4px;margin-top:3px';cols.forEach(({l,v})=>{const sw=document.createElement('button');sw.className='sw'+(item.color===v?' sw-on':'');sw.style.cssText=`background:${v};border-color:${item.color===v?'#c8860a':'var(--border-t)'}`;sw.title=l;sw.onclick=()=>updateR(item.id,'color',v,collection);wrap.appendChild(sw);});return wrap;});
  addField(sb,`Width · ${item.width}px`,()=>{const inp=document.createElement('input');inp.type='range';inp.min=isFP?4:12;inp.max=isFP?30:80;inp.step=1;inp.value=item.width;inp.oninput=()=>updateR(item.id,'width',parseInt(inp.value),collection);return inp;});
  if(!isFP)addField(sb,'Centre dashes',()=>{const tog=mkTog(item.showDashes);tog.onclick=()=>updateR(item.id,'showDashes',!item.showDashes,collection);return tog;});
  if(isFP){
    addField(sb,'Style',()=>{const sel=document.createElement('select');sel.className='fsel';['solid','dashed','dotted'].forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s.charAt(0).toUpperCase()+s.slice(1);if(s===item.style)o.selected=true;sel.appendChild(o);});sel.onchange=()=>updateR(item.id,'style',sel.value,collection);return sel;});
  }
  side.appendChild(sb);
}

function renderComponentPalette(side){
  const body=document.createElement('div');body.style.cssText='padding:0 14px 12px;overflow-y:auto;max-height:320px;flex-shrink:0;border-top:none';
  body.style.overflowY='auto';
  COMPONENT_PRESETS.forEach(group=>{
    const gh=document.createElement('div');gh.style.cssText='font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);margin:9px 0 5px';gh.textContent=group.group;body.appendChild(gh);
    const grid=document.createElement('div');grid.className='comp-grid';
    group.items.forEach(item=>{
      const btn=document.createElement('button');btn.className='comp-btn';
      btn.innerHTML=`<div class="comp-icon">${item.icon}</div>${item.label}`;
      btn.onclick=()=>{
        if(item.data.isPath){
          // Add a footpath at default position
          snapshot();
          const id=`fp-${Date.now()}`;
          state.footpaths=[...state.footpaths,{id,label:item.data.label,start:{x:400,y:398},segments:[{type:'L',end:{x:600,y:398}}],color:item.data.color,width:item.data.width,style:item.data.style}];
          selectedPathId=id;editTarget='roads';scheduleSave();renderAll();
        } else {
          snapshot();
          const d=item.data;
          const id=`comp-${Date.now()}`;
          state.buildings=[...state.buildings,{id,label:d.label,x:500+Math.random()*200-100,y:250+Math.random()*100-50,width:d.w,height:d.h,rotation:0,fillColor:d.fill,strokeColor:d.stroke||'#374151',notes:d.notes||'',shape:d.shape,category:d.cat,emoji:d.emoji||false,isGate:d.isGate||false}];
          selectedIds.clear();selectedIds.add(id);scheduleSave();renderAll();
        }
      };
      grid.appendChild(btn);
    });
    body.appendChild(grid);
  });
  side.appendChild(body);
}

// ─── Edit mode ────────────────────────────────────────────────────────────────
function toggleEdit(){editMode=!editMode;selectedIds.clear();selectedRoadId=null;selectedPathId=null;drawMode=false;drawingPts=[];renderAll();}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function finishDraw(){
  if(drawingPts.length<2){drawMode=false;drawingPts=[];renderAll();return;}
  snapshot();
  const id=`${drawType}-${Date.now()}`;
  if(drawType==='footpath'){
    state.footpaths=[...state.footpaths,{id,label:`Footpath ${(state.footpaths||[]).length+1}`,start:drawingPts[0],segments:drawingPts.slice(1).map(p=>({type:'L',end:p})),color:'#D4B896',width:10,style:'solid'}];
    selectedPathId=id;editTarget='roads';
  } else {
    state.roads=[...state.roads,{id,label:`Road ${state.roads.length+1}`,start:drawingPts[0],segments:drawingPts.slice(1).map(p=>({type:'L',end:p})),color:'#FDE68A',width:44,showDashes:false}];
    selectedRoadId=id;editTarget='roads';
  }
  drawMode=false;drawingPts=[];scheduleSave();renderAll();
}
function cancelDraw(){drawMode=false;drawingPts=[];renderAll();}

// ─── Reset ────────────────────────────────────────────────────────────────────
function doReset(){if(!confirm('Reset to original campus layout? All changes will be lost.'))return;snapshot();state=JSON.parse(JSON.stringify(INITIAL_STATE));selectedIds.clear();selectedRoadId=null;selectedPathId=null;editMode=false;drawMode=false;drawingPts=[];scheduleSave();renderAll();}

// ─── Export SVG ───────────────────────────────────────────────────────────────
function shapeToSVG(b){
  const cx=b.x+b.width/2,cy=b.y+b.height/2;
  const tf=b.rotation!==0?` transform="rotate(${b.rotation} ${cx} ${cy})"`:''
  const sc=b.strokeColor,fc=b.fillColor;
  if(b.shape==='circle')return`  <circle cx="${cx}" cy="${cy}" r="${Math.min(b.width,b.height)/2}" fill="${fc}" stroke="${sc}" stroke-width="1.5"${tf}/>`;
  if(b.shape==='ellipse')return`  <ellipse cx="${cx}" cy="${cy}" rx="${b.width/2}" ry="${b.height/2}" fill="${fc}" stroke="${sc}" stroke-width="1.5"${tf}/>`;
  if(b.shape==='hexagon'){const r2=Math.min(b.width,b.height)/2;const pts=Array.from({length:6},(_,i)=>{const a=Math.PI/180*(60*i-30);return`${cx+r2*Math.cos(a)},${cy+r2*Math.sin(a)}`;}).join(' ');return`  <polygon points="${pts}" fill="${fc}" stroke="${sc}" stroke-width="1.5"${tf}/>`;}
  if(b.shape==='diamond')return`  <polygon points="${cx},${b.y} ${b.x+b.width},${cy} ${cx},${b.y+b.height} ${b.x},${cy}" fill="${fc}" stroke="${sc}" stroke-width="1.5"${tf}/>`;
  if(b.shape==='octagon'){const d2=Math.min(b.width,b.height)*.25;const pts=`${b.x+d2},${b.y} ${b.x+b.width-d2},${b.y} ${b.x+b.width},${b.y+d2} ${b.x+b.width},${b.y+b.height-d2} ${b.x+b.width-d2},${b.y+b.height} ${b.x+d2},${b.y+b.height} ${b.x},${b.y+b.height-d2} ${b.x},${b.y+d2}`;return`  <polygon points="${pts}" fill="${fc}" stroke="${sc}" stroke-width="1.5"${tf}/>`;}
  return`  <rect x="${b.x}" y="${b.y}" width="${b.width}" height="${b.height}" rx="4" fill="${fc}" stroke="${sc}" stroke-width="1.5"${tf}/>`;
}

function doExport(){
  const lines=[
    `<svg width="${MAP_W}" height="${MAP_H}" viewBox="0 0 ${MAP_W} ${MAP_H}" xmlns="http://www.w3.org/2000/svg">`,
    `  <title>Campus Map</title>`,
    `  <rect width="${MAP_W}" height="${MAP_H}" fill="#EEF0E8"/>`,
  ];
  // Footpaths
  for(const fp of (state.footpaths||[])){
    const d=roadPath(fp);
    const dash=fp.style==='dashed'?`stroke-dasharray="${fp.width*1.5} ${fp.width}"`:(fp.style==='dotted'?`stroke-dasharray="2 ${fp.width}"`:'');
    lines.push(`  <path d="${d}" stroke="rgba(0,0,0,.12)" stroke-width="${fp.width+2}" fill="none" stroke-linecap="round"/>`);
    lines.push(`  <path d="${d}" stroke="${fp.color}" stroke-width="${fp.width}" fill="none" stroke-linecap="round" stroke-linejoin="round" ${dash}/>`);
    if(fp.style==='solid'&&fp.width>8)lines.push(`  <path d="${d}" stroke="rgba(255,255,255,.35)" stroke-width="2" fill="none" stroke-dasharray="12 10" stroke-linecap="round"/>`);
  }
  // Roads
  for(const road of state.roads){
    const d=roadPath(road);
    lines.push(`  <path d="${d}" stroke="#C8860A" stroke-width="${road.width+8}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);
    lines.push(`  <path d="${d}" stroke="#E6A800" stroke-width="${road.width+4}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);
    lines.push(`  <path d="${d}" stroke="${road.color}" stroke-width="${road.width}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);
    if(road.showDashes)lines.push(`  <path d="${d}" stroke="white" stroke-width="2" fill="none" stroke-dasharray="22 14" stroke-linecap="round" opacity="0.7"/>`);
  }
  // Junctions
  for(const j of state.junctions)lines.push(`  <circle cx="${j.x}" cy="${j.y}" r="28" fill="#FDE68A" stroke="#E6A800" stroke-width="3"/>`);
  // Buildings
  for(const b of state.buildings){
    const cx=b.x+b.width/2,cy=b.y+b.height/2;
    const tf=b.rotation!==0?` transform="rotate(${b.rotation} ${cx} ${cy})"`:''
    lines.push(shapeToSVG(b));
    const isGate=b.isGate||b.category==='Gate';
    if(isGate){
      const bH=b.height*.55,bW=3.5;
      lines.push(`  <rect x="${cx-b.width*.22-bW/2}" y="${cy-bH/2}" width="${bW}" height="${bH}" fill="#9CA3AF" rx="1"${tf}/>`);
      lines.push(`  <rect x="${cx+b.width*.22-bW/2}" y="${cy-bH/2}" width="${bW}" height="${bH}" fill="#9CA3AF" rx="1"${tf}/>`);
      lines.push(`  <path d="M ${b.x+4} ${cy} Q ${cx} ${b.y+2} ${b.x+b.width-4} ${cy}" stroke="#9CA3AF" stroke-width="2" fill="none"${tf}/>`);
    }
    const isEmoji=b.emoji||['🌳','🌿','🌺','⛲'].includes(b.label);
    if(!isEmoji&&b.label){
      const lines2=b.label.split('\n').filter(Boolean);
      const baseY=isGate?cy+b.height*.3:cy;
      const startY=baseY-(lines2.length*12)/2+6;
      lines2.forEach((l,i)=>{
        const fill=isGate||b.fillColor==='#1F2937'||b.fillColor==='#374151'?'#F9FAFB':'#374151';
        lines.push(`  <text x="${cx}" y="${startY+i*12}" text-anchor="middle" dominant-baseline="middle" font-size="${isGate?7.5:9.5}" font-family="sans-serif" font-weight="700" fill="${fill}"${tf}>${l}</text>`);
      });
    } else if(isEmoji&&b.label){
      lines.push(`  <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" font-size="${Math.min(b.width,b.height)*.72}"${tf}>${b.label}</text>`);
    }
  }
  lines.push(`</svg>`);
  const code=lines.join('\n');

  const modal=document.getElementById('export-modal');
  modal.style.display='flex';modal.innerHTML='';
  const ov=document.createElement('div');ov.className='modal-overlay';
  const box=document.createElement('div');box.className='modal';
  const hdr2=document.createElement('div');hdr2.className='modal-hdr';
  hdr2.innerHTML=`<div><div class="modal-title">SVG Export</div><div class="modal-sub">Complete SVG — ${code.length.toLocaleString()} chars · all shapes, gates, footpaths & roads preserved</div></div>`;
  const closex=document.createElement('button');closex.style.cssText='background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-tertiary)';closex.textContent='×';closex.setAttribute('aria-label','Close');closex.onclick=()=>{modal.style.display='none';};hdr2.appendChild(closex);
  box.appendChild(hdr2);
  const ta=document.createElement('textarea');ta.readOnly=true;ta.value=code;ta.setAttribute('aria-label','SVG code');
  ta.style.cssText='flex:1;min-height:440px;padding:14px;font-family:monospace;font-size:11px;background:var(--bg-secondary);border:none;outline:none;resize:none;line-height:1.6;color:var(--text-primary);width:100%';
  ta.onclick=()=>ta.select();box.appendChild(ta);
  const foot=document.createElement('div');foot.className='modal-foot';
  foot.innerHTML=`<span style="margin-right:auto;font-size:10px;color:var(--text-tertiary)">${state.roads.length} roads · ${(state.footpaths||[]).length} footpaths · ${state.buildings.length} elements</span>`;
  const cpbtn=mkBtn('btn-amber','<i class="ti ti-copy"></i>Copy SVG',async()=>{try{await navigator.clipboard.writeText(code);}catch(e){ta.select();document.execCommand('copy');}cpbtn.innerHTML='<i class="ti ti-check"></i>Copied!';setTimeout(()=>{cpbtn.innerHTML='<i class="ti ti-copy"></i>Copy SVG';},2500);});
  foot.appendChild(cpbtn);

  // PNG export
  const pngbtn=mkBtn('btn-blue','<i class="ti ti-photo"></i>Download PNG',()=>{
    const canvas=document.createElement('canvas');canvas.width=MAP_W*2;canvas.height=MAP_H*2;
    const ctx=canvas.getContext('2d');
    const img=new Image();
    const blob=new Blob([code],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    img.onload=()=>{ctx.drawImage(img,0,0,MAP_W*2,MAP_H*2);URL.revokeObjectURL(url);const a=document.createElement('a');a.download='campus-map.png';a.href=canvas.toDataURL('image/png');a.click();};
    img.src=url;
  });
  foot.appendChild(pngbtn);
  foot.appendChild(mkBtn('btn-dark','Close',()=>{modal.style.display='none';}));
  box.appendChild(foot);
  ov.appendChild(box);modal.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)modal.style.display='none';});
}

// ─── Full render ──────────────────────────────────────────────────────────────
function renderAll(){renderHdr();renderSVG();renderSide();renderLegend();}

// ─── Init ─────────────────────────────────────────────────────────────────────
persistLoad().then(()=>{
  if(!state.footpaths)state.footpaths=[];
  renderAll();
  setTimeout(fitCanvas,80);
}).catch(()=>{
  state=JSON.parse(JSON.stringify(INITIAL_STATE));
  renderAll();
  setTimeout(fitCanvas,80);
});
</script>
