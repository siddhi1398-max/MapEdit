<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campus Map Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1c1a14;--ink2:#4a4535;--ink3:#7a7060;
  --parch:#f5f0e4;--paper:#faf7ef;--cream:#ede8d8;--border:#d4c9a8;--border2:#c4b88a;
  --amber:#c8860a;--amber-bg:#fdf3dc;--amber-bd:#e8c96a;
  --green:#2d6a3f;--red:#9b2c2c;--blue:#1e40af;
  --bg-primary:#ffffff;--bg-secondary:#f5f0e4;--bg-tertiary:#ede8d8;
  --text-primary:#1c1a14;--text-secondary:#4a4535;--text-tertiary:#7a7060;
  --border-t:rgba(212,201,168,.5);--border-s:rgba(196,184,138,.7);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1e1c16;--bg-secondary:#252318;--bg-tertiary:#2c2920;
    --text-primary:#f5f0e4;--text-secondary:#c8c0a8;--text-tertiary:#7a7060;
    --border-t:rgba(90,80,60,.5);--border-s:rgba(120,105,75,.6);
    --amber-bg:#2a2008;--amber-bd:#6b5400;
    --parch:#252318;--paper:#1e1c16;
  }
}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg-tertiary);color:var(--text-primary)}
/* Header */
.hdr{display:flex;align-items:center;gap:8px;padding:0 14px;height:54px;background:#1c1a14;border-bottom:2px solid #3a3020;flex-shrink:0;flex-wrap:wrap;position:relative;z-index:40}
.hdr-title{font-size:17px;font-weight:700;color:#f5f0e4;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:#5a5040;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:1px 7px;border-radius:3px}
.sp{flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:5px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;letter-spacing:.3px;cursor:pointer;border:1.5px solid;transition:all .12s;white-space:nowrap}
.btn-ghost{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.18);color:#c8c0a8}
.btn-ghost:hover{background:rgba(255,255,255,.14);color:#f5f0e4}
.btn-active{background:#fdf3dc;border-color:#e8c96a;color:#c8860a}
.btn-amber{background:#c8860a;border-color:#a06c00;color:#fff}
.btn-amber:hover{background:#a06c00}
.btn-green{background:#2d6a3f;border-color:#1e4a2c;color:#fff}
.btn-green:hover{background:#1e4a2c}
.btn-red{background:transparent;border-color:rgba(155,44,44,.4);color:#9b2c2c;padding:5px 10px;font-size:11px}
.btn-red:hover{background:rgba(155,44,44,.08)}
.btn-dark{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#7a7060}
.btn-dark:hover{color:#c8c0a8;border-color:rgba(255,255,255,.22)}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.tabs{display:inline-flex;border:1.5px solid rgba(255,255,255,.15);border-radius:5px;overflow:hidden}
.tab{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;cursor:pointer;border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;color:#7a7060;transition:all .12s;border-right:1.5px solid rgba(255,255,255,.1)}
.tab:last-child{border-right:none}
.tab:hover:not(.tab-on){background:rgba(255,255,255,.07);color:#c8c0a8}
.tab-on{background:rgba(200,134,10,.18);color:#e8c96a}
.draw-bann{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:5px;border:1.5px solid #e8c96a;background:#fdf3dc;font-size:11px;font-weight:600;color:#c8860a}
.wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.body{display:flex;flex:1;overflow:hidden;position:relative}
.map-area{flex:1;overflow:hidden;position:relative;background:#e8e4d8;cursor:default}
.map-area.cursor-cross{cursor:crosshair}
.map-area.cursor-grab{cursor:grab}
.map-area.cursor-grab:active{cursor:grabbing}
#canvas-wrap{position:absolute;transform-origin:0 0}
.side{width:284px;flex-shrink:0;background:var(--bg-primary);border-left:1px solid var(--border-t);display:flex;flex-direction:column;overflow:hidden}
.side-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border-t);background:var(--bg-secondary);flex-shrink:0}
.side-title{font-size:14px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:7px}
.side-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.side-body::-webkit-scrollbar{width:4px}
.side-body::-webkit-scrollbar-thumb{background:var(--border-t);border-radius:2px}
.flabel{display:block;font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:4px}
.finp,.fsel,.ftxt{width:100%;border:1.5px solid var(--border-t);border-radius:5px;background:var(--bg-secondary);color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:border-color .12s;-webkit-appearance:none;appearance:none}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:#e8c96a;box-shadow:0 0 0 2px rgba(200,134,10,.12)}
.finp:disabled,.fsel:disabled,.ftxt:disabled{opacity:.6;cursor:default}
.ftxt{resize:none;line-height:1.5}
.sw{width:26px;height:26px;border-radius:4px;cursor:pointer;transition:transform .1s;border:2px solid transparent}
.sw:hover{transform:scale(1.15)}
.sw-on{border-color:#c8860a !important;box-shadow:0 0 0 2px rgba(200,134,10,.25)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.callout{background:rgba(30,64,175,.08);border:1px solid rgba(30,64,175,.2);border-left:3px solid #60a5fa;border-radius:4px;padding:10px 12px}
.callout-lbl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#3b82f6;margin-bottom:4px}
.zoom-bar{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:4px;z-index:30}
.zoom-btn{width:36px;height:36px;border-radius:5px;border:1.5px solid var(--border-t);background:var(--bg-primary);color:var(--text-primary);font-size:18px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.zoom-btn:hover{background:var(--bg-secondary)}
.zoom-lbl{font-size:10px;font-weight:600;text-align:center;color:var(--text-secondary);padding:2px 0}
.legend{position:absolute;top:12px;left:12px;z-index:20;background:var(--bg-primary);border:1px solid var(--border-t);border-radius:5px;padding:11px 13px;min-width:155px;box-shadow:0 1px 4px rgba(28,26,20,.13)}
.leg-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-t);padding-bottom:6px}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:10px;font-weight:500;color:var(--text-secondary)}
.leg-sw{width:12px;height:12px;border-radius:2px;border:1px solid rgba(0,0,0,.12);flex-shrink:0}
.leg-n{margin-left:auto;color:var(--text-tertiary);font-size:9px}
.save-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;border:1.5px solid;font-size:10px;font-weight:600;letter-spacing:.5px;transition:all .15s;cursor:default}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--border-t);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:3px;background:#c8860a;cursor:pointer}
.tog{position:relative;display:inline-flex;align-items:center;width:38px;height:20px;border:1.5px solid var(--border-t);border-radius:3px;background:var(--bg-secondary);cursor:pointer;transition:all .15s}
.tog-on{border-color:#e8c96a;background:#fdf3dc}
.tog-k{position:absolute;left:2px;width:13px;height:13px;background:var(--border-s);border-radius:2px;transition:all .15s}
.tog-on .tog-k{left:21px;background:#c8860a}
.cp-wrap{position:relative;overflow:hidden}
.cp-wrap input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.coords{position:absolute;bottom:16px;left:16px;font-size:10px;font-weight:500;color:var(--text-tertiary);z-index:20;pointer-events:none;letter-spacing:.5px}
/* Export modal */
.modal-overlay{position:fixed;inset:0;background:rgba(28,26,20,.72);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg-primary);border:1px solid var(--border-t);border-radius:6px;width:min(860px,94vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 2px 40px rgba(28,26,20,.3)}
.modal-hdr{padding:15px 20px;border-bottom:1px solid var(--border-t);display:flex;justify-content:space-between;align-items:center;background:var(--bg-secondary)}
.modal-title{font-size:16px;font-weight:700;color:var(--text-primary)}
.modal-sub{font-size:10px;color:var(--text-tertiary);margin-top:3px;letter-spacing:.5px}
.modal-foot{padding:11px 20px;border-top:1px solid var(--border-t);display:flex;gap:8px;justify-content:flex-end;align-items:center;background:var(--bg-secondary)}
</style>
</head>
<body>
<div class="wrap" id="root">
  <header class="hdr" id="hdr"></header>
  <div class="body">
    <div class="map-area" id="map-area">
      <div id="canvas-wrap">
        <svg id="map-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="legend" id="legend"></div>
      <div class="zoom-bar">
        <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
        <div class="zoom-lbl" id="zoom-lbl">100%</div>
        <button class="zoom-btn" id="zoom-out" title="Zoom out">–</button>
        <button class="zoom-btn" id="zoom-fit" title="Fit to view" style="font-size:11px;font-weight:700">FIT</button>
      </div>
      <div class="coords" id="coords">x:0  y:0</div>
    </div>
    <aside class="side" id="side" style="display:none"></aside>
  </div>
</div>
<div id="export-modal" style="display:none"></div>

<script>
const MAP_W=1200,MAP_H=640,MINOR=40,MAJOR=200;
const CATS=['Academic','Medical','Sports','Facility','Dining','Gate','Nature','Other'];
const CAT_COLORS={Academic:'#BFDBFE',Medical:'#FCA5A5',Sports:'#BBF7D0',Facility:'#D1D5DB',Dining:'#FED7AA',Gate:'#374151',Nature:'#86EFAC',Other:'#DDD6FE'};
const FILL_COLS=[
  {l:'Gray',v:'#D1D5DB'},{l:'Blue',v:'#BFDBFE'},{l:'Green',v:'#BBF7D0'},{l:'Yellow',v:'#FEF08A'},
  {l:'Pink',v:'#FBCFE8'},{l:'Purple',v:'#DDD6FE'},{l:'Orange',v:'#FED7AA'},{l:'Red',v:'#FECACA'},
  {l:'White',v:'#F9FAFB'},{l:'Teal',v:'#CCFBF1'},{l:'Dark',v:'#374151'},{l:'Forest',v:'#166534'},{l:'Pool',v:'#67E8F9'}
];
const ROAD_COLS=[{l:'Yellow',v:'#FDE68A'},{l:'Amber',v:'#FCD34D'},{l:'Gray',v:'#D1D5DB'},{l:'White',v:'#F9FAFB'},{l:'Blue',v:'#BFDBFE'},{l:'Teal',v:'#99F6E4'}];
const SHAPES=['rect','circle','hexagon','diamond','octagon'];

const INITIAL_STATE={
  buildings:[
    {id:'sports-centre',label:'SPORTS\nCENTRE',x:62,y:145,width:135,height:90,rotation:-30,fillColor:'#D1D5DB',strokeColor:'#374151',notes:'Sports and recreation facility',shape:'rect',category:'Sports'},
    {id:'block-b',label:'BLOCK B',x:270,y:96,width:126,height:122,rotation:0,fillColor:'#DDD6FE',strokeColor:'#374151',notes:'Academic Block B',shape:'rect',category:'Academic'},
    {id:'cafe-top',label:'CAFE',x:398,y:100,width:54,height:44,rotation:0,fillColor:'#BFDBFE',strokeColor:'#374151',notes:'Campus café (upper)',shape:'rect',category:'Dining'},
    {id:'block-a',label:'BLOCK A',x:456,y:100,width:110,height:110,rotation:0,fillColor:'#D1D5DB',strokeColor:'#374151',notes:'Academic Block A',shape:'rect',category:'Academic'},
    {id:'hospital',label:'HOSPITAL',x:826,y:96,width:194,height:234,rotation:0,fillColor:'#DDD6FE',strokeColor:'#374151',notes:'Main Hospital Block',shape:'rect',category:'Medical'},
    {id:'knowledge-centre',label:'KNOWLEDGE\nCENTRE',x:648,y:170,width:144,height:158,rotation:0,fillColor:'#D1D5DB',strokeColor:'#374151',notes:'Library and research hub',shape:'rect',category:'Academic'},
    {id:'cafe',label:'CAFE',x:556,y:290,width:82,height:56,rotation:0,fillColor:'#BFDBFE',strokeColor:'#374151',notes:'Campus café',shape:'rect',category:'Dining'},
    {id:'auditorium',label:'AUDITORIUM',x:84,y:362,width:86,height:174,rotation:0,fillColor:'#D1D5DB',strokeColor:'#374151',notes:'Main auditorium',shape:'rect',category:'Facility'},
    {id:'ground',label:'GROUND',x:302,y:362,width:138,height:138,rotation:0,fillColor:'#BBF7D0',strokeColor:'#059669',notes:'Main sports ground',shape:'rect',category:'Sports'},
    {id:'chapel',label:'CHAPEL',x:452,y:356,width:100,height:150,rotation:0,fillColor:'#F9FAFB',strokeColor:'#374151',notes:'Chapel / Prayer Room',shape:'rect',category:'Other'},
    {id:'nursing',label:'NURSING\nCOLLEGE',x:648,y:390,width:140,height:140,rotation:0,fillColor:'#D1D5DB',strokeColor:'#374151',notes:'College of Nursing',shape:'rect',category:'Academic'},
    {id:'hospital2',label:'HOSPITAL',x:800,y:390,width:220,height:140,rotation:0,fillColor:'#D1D5DB',strokeColor:'#374151',notes:'Hospital — lower block',shape:'rect',category:'Medical'},
    {id:'canteen',label:'CANTEEN',x:1038,y:356,width:116,height:58,rotation:0,fillColor:'#BFDBFE',strokeColor:'#374151',notes:'Main canteen',shape:'rect',category:'Dining'},
    {id:'simlab',label:'SIM LAB',x:1038,y:424,width:116,height:58,rotation:0,fillColor:'#FFFFFF',strokeColor:'#374151',notes:'Simulation Laboratory',shape:'rect',category:'Academic'},
    {id:'parking',label:'PARKING',x:138,y:536,width:154,height:74,rotation:0,fillColor:'#FECACA',strokeColor:'#374151',notes:'Student & staff parking',shape:'rect',category:'Facility'},
    {id:'sjhall',label:'SILVER\nJUBILEE\nHALL',x:456,y:528,width:142,height:92,rotation:0,fillColor:'#DDD6FE',strokeColor:'#374151',notes:'Silver Jubilee Hall',shape:'rect',category:'Facility'},
    {id:'gate-main',label:'MAIN\nGATE',x:1158,y:320,width:32,height:44,rotation:0,fillColor:'#1F2937',strokeColor:'#374151',notes:'Main entrance gate',shape:'rect',category:'Gate'},
    {id:'gate-back',label:'BACK\nGATE',x:10,y:320,width:32,height:44,rotation:0,fillColor:'#1F2937',strokeColor:'#374151',notes:'Back/service gate',shape:'rect',category:'Gate'},
    {id:'tree-1',label:'🌳',x:225,y:295,width:38,height:38,rotation:0,fillColor:'#166534',strokeColor:'#14532d',notes:'Tree cluster',shape:'circle',category:'Nature'},
    {id:'tree-2',label:'🌳',x:590,y:150,width:34,height:34,rotation:0,fillColor:'#166534',strokeColor:'#14532d',notes:'Tree',shape:'circle',category:'Nature'},
    {id:'garden-1',label:'GARDEN',x:182,y:248,width:82,height:58,rotation:0,fillColor:'#86EFAC',strokeColor:'#166534',notes:'Landscaped garden area',shape:'rect',category:'Nature'},
    {id:'pool-1',label:'POOL',x:188,y:162,width:62,height:52,rotation:0,fillColor:'#67E8F9',strokeColor:'#0891B2',notes:'Swimming pool',shape:'rect',category:'Nature'},
  ],
  roads:[
    {id:'main-road',label:'Main Road',start:{x:30,y:342},segments:[{type:'L',end:{x:1170,y:342}}],color:'#FDE68A',width:44,showDashes:true},
    {id:'loop-up',label:'Campus Loop (Upper)',start:{x:195,y:342},segments:[{type:'C',cp1:{x:195,y:258},cp2:{x:210,y:196},end:{x:282,y:182}},{type:'L',end:{x:430,y:182}},{type:'C',cp1:{x:470,y:182},cp2:{x:522,y:215},end:{x:532,y:280}},{type:'L',end:{x:532,y:342}}],color:'#FDE68A',width:44,showDashes:false},
    {id:'loop-dn',label:'Campus Loop (Lower)',start:{x:195,y:342},segments:[{type:'C',cp1:{x:195,y:405},cp2:{x:210,y:488},end:{x:310,y:514}},{type:'C',cp1:{x:380,y:535},cp2:{x:440,y:530},end:{x:512,y:510}},{type:'C',cp1:{x:545,y:492},cp2:{x:548,y:418},end:{x:532,y:342}}],color:'#FDE68A',width:44,showDashes:false},
    {id:'block-branch',label:'Block Branch',start:{x:447,y:182},segments:[{type:'L',end:{x:447,y:278}}],color:'#FDE68A',width:44,showDashes:false},
    {id:'right-branch',label:'Right Branch',start:{x:648,y:342},segments:[{type:'C',cp1:{x:650,y:296},cp2:{x:654,y:270},end:{x:660,y:248}}],color:'#FDE68A',width:44,showDashes:false},
  ],
  junctions:[
    {id:'j1',x:195,y:342},{id:'j2',x:447,y:182},{id:'j3',x:532,y:342},{id:'j4',x:648,y:342}
  ]
};

let state=JSON.parse(JSON.stringify(INITIAL_STATE));
let selectedId=null,selectedRoadId=null;
let editMode=false,editTarget='buildings';
let drawRoadMode=false,drawingPts=[];
let showLegend=true;
let zoom=1,panX=0,panY=0;
let isPanning=false,panStart={x:0,y:0},panOrig={x:0,y:0};
let dragBldg=null,dragOff={x:0,y:0};
let saveStatus='saved',saveTimer=null;

const svg=document.getElementById('map-svg');
const mapArea=document.getElementById('map-area');
const canvasWrap=document.getElementById('canvas-wrap');
svg.setAttribute('width',MAP_W+40);svg.setAttribute('height',MAP_H+24);
svg.style.display='block';svg.style.overflow='visible';

// Storage
const SK='campus-map-v2';
async function persistSave(){try{if(localStorage)localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
async function persistLoad(){try{const d=localStorage.getItem(SK);if(d){const p=JSON.parse(d);if(p.buildings&&p.roads&&p.junctions)state=p;}}catch(e){}}
function scheduleSave(){saveStatus='unsaved';renderHdr();clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{saveStatus='saving';renderHdr();await persistSave();saveStatus='saved';renderHdr();},700);}

// Zoom/Pan
function applyTransform(){canvasWrap.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;document.getElementById('zoom-lbl').textContent=Math.round(zoom*100)+'%';}
function fitCanvas(){const rect=mapArea.getBoundingClientRect();const sx=(rect.width-40)/MAP_W,sy=(rect.height-40)/MAP_H;zoom=Math.min(sx,sy,.98);panX=(rect.width-MAP_W*zoom)/2;panY=(rect.height-MAP_H*zoom)/2;applyTransform();}
document.getElementById('zoom-in').onclick=()=>{zoom=Math.min(zoom*1.2,5);applyTransform()};
document.getElementById('zoom-out').onclick=()=>{zoom=Math.max(zoom/1.2,.15);applyTransform()};
document.getElementById('zoom-fit').onclick=fitCanvas;
mapArea.addEventListener('wheel',e=>{e.preventDefault();const rect=mapArea.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;const oz=zoom;zoom=e.deltaY<0?Math.min(zoom*1.1,5):Math.max(zoom/1.1,.15);panX=mx-(mx-panX)*zoom/oz;panY=my-(my-panY)*zoom/oz;applyTransform();},{passive:false});
mapArea.addEventListener('mousedown',e=>{if(e.button===1||(e.button===0&&e.altKey)){isPanning=true;panStart={x:e.clientX,y:e.clientY};panOrig={x:panX,y:panY};mapArea.classList.add('cursor-grab');e.preventDefault();}});
window.addEventListener('mousemove',e=>{
  if(isPanning){panX=panOrig.x+(e.clientX-panStart.x);panY=panOrig.y+(e.clientY-panStart.y);applyTransform();}
  const rect=mapArea.getBoundingClientRect();
  const cx=Math.round((e.clientX-rect.left-panX)/zoom),cy=Math.round((e.clientY-rect.top-panY)/zoom);
  document.getElementById('coords').textContent=`x:${cx}  y:${cy}`;
  if(dragBldg){const nx=Math.round((e.clientX-rect.left-panX)/zoom-dragOff.x);const ny=Math.round((e.clientY-rect.top-panY)/zoom-dragOff.y);state.buildings=state.buildings.map(b=>b.id===dragBldg?{...b,x:nx,y:ny}:b);renderSVG();}
});
window.addEventListener('mouseup',()=>{if(isPanning){isPanning=false;mapArea.classList.remove('cursor-grab');}if(dragBldg){dragBldg=null;scheduleSave();}});

function roadPath(road){let d=`M ${road.start.x} ${road.start.y}`;for(const s of road.segments){if(s.type==='L')d+=` L ${s.end.x} ${s.end.y}`;if(s.type==='C')d+=` C ${s.cp1.x} ${s.cp1.y} ${s.cp2.x} ${s.cp2.y} ${s.end.x} ${s.end.y}`;}return d;}

function mkEl(tag,attrs){const el=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);return el;}

function renderGrid(g){
  for(let x=0;x<=MAP_W;x+=MINOR){g.appendChild(mkEl('line',{x1:x,y1:0,x2:x,y2:MAP_H,stroke:x%MAJOR===0?'rgba(160,134,80,.22)':'rgba(160,134,80,.09)','stroke-width':x%MAJOR===0?.8:.4}));}
  for(let y=0;y<=MAP_H;y+=MINOR){g.appendChild(mkEl('line',{x1:0,y1:y,x2:MAP_W,y2:y,stroke:y%MAJOR===0?'rgba(160,134,80,.22)':'rgba(160,134,80,.09)','stroke-width':y%MAJOR===0?.8:.4}));}
  for(let x=0;x<=MAP_W;x+=MAJOR)for(let y=0;y<=MAP_H;y+=MAJOR){g.appendChild(mkEl('circle',{cx:x,cy:y,r:1.8,fill:'rgba(160,134,80,.45)'}));}
  for(let x=0;x<=MAP_W;x+=MAJOR){const t=mkEl('text',{x,y:MAP_H+14,'text-anchor':'middle','font-size':9,'font-family':'Outfit,sans-serif',fill:'rgba(122,112,96,.55)'});t.textContent=x;g.appendChild(t);}
  for(let y=0;y<=MAP_H;y+=MAJOR){const t=mkEl('text',{x:-5,y:y+3,'text-anchor':'end','font-size':9,'font-family':'Outfit,sans-serif',fill:'rgba(122,112,96,.55)'});t.textContent=y;g.appendChild(t);}
}

function renderSVG(){
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  svg.appendChild(mkEl('rect',{x:0,y:0,width:MAP_W,height:MAP_H,fill:'#EEF0E8'}));
  const gridG=mkEl('g',{});renderGrid(gridG);svg.appendChild(gridG);

  // Roads
  for(const road of state.roads){
    const d=roadPath(road);
    svg.appendChild(mkEl('path',{d,stroke:'#E6A800','stroke-width':road.width+6,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));
    svg.appendChild(mkEl('path',{d,stroke:road.color,'stroke-width':road.width,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));
    if(road.showDashes)svg.appendChild(mkEl('path',{d,stroke:'white','stroke-width':2,fill:'none','stroke-dasharray':'20 14','stroke-linecap':'round',opacity:.7}));
    if(selectedRoadId===road.id&&editMode&&editTarget==='roads'){svg.appendChild(mkEl('path',{d,stroke:'#f59e0b','stroke-width':road.width+12,fill:'none','stroke-linecap':'round',opacity:.25}));}
  }

  // Junctions
  for(const j of state.junctions){
    svg.appendChild(mkEl('circle',{cx:j.x,cy:j.y,r:28,fill:'#FDE68A',stroke:'#E6A800','stroke-width':3}));
    if(editMode&&editTarget==='roads'){
      const h=mkEl('circle',{cx:j.x,cy:j.y,r:28,fill:'transparent',stroke:'#f59e0b','stroke-width':2.5,cursor:'move',opacity:.7});
      h.addEventListener('mousedown',e=>{
        e.stopPropagation();
        const rect=mapArea.getBoundingClientRect();
        const ox=(e.clientX-rect.left-panX)/zoom-j.x,oy=(e.clientY-rect.top-panY)/zoom-j.y;
        let mv=false;
        const mm=ev=>{mv=true;const nx=Math.round((ev.clientX-rect.left-panX)/zoom-ox),ny=Math.round((ev.clientY-rect.top-panY)/zoom-oy);state.junctions=state.junctions.map(jj=>jj.id===j.id?{...jj,x:nx,y:ny}:jj);renderSVG();};
        const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);if(mv)scheduleSave();};
        window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
      });
      svg.appendChild(h);
    }
  }

  // Buildings
  for(const b of state.buildings){
    const cx=b.x+b.width/2,cy=b.y+b.height/2;
    const isSel=b.id===selectedId,isGate=b.category==='Gate';
    const g=mkEl('g',{});
    if(b.rotation!==0)g.setAttribute('transform',`rotate(${b.rotation} ${cx} ${cy})`);

    let shape;
    if(b.shape==='circle'){
      shape=mkEl('circle',{cx,cy,r:Math.min(b.width,b.height)/2,fill:b.fillColor,stroke:isSel?'#f59e0b':b.strokeColor,'stroke-width':isSel?2.5:1.5});
    } else if(b.shape==='hexagon'){
      const r2=Math.min(b.width,b.height)/2;
      const pts=Array.from({length:6},(_,i)=>{const a=Math.PI/180*(60*i-30);return`${cx+r2*Math.cos(a)},${cy+r2*Math.sin(a)}`;}).join(' ');
      shape=mkEl('polygon',{points:pts,fill:b.fillColor,stroke:isSel?'#f59e0b':b.strokeColor,'stroke-width':isSel?2.5:1.5});
    } else if(b.shape==='diamond'){
      shape=mkEl('polygon',{points:`${cx},${b.y} ${b.x+b.width},${cy} ${cx},${b.y+b.height} ${b.x},${cy}`,fill:b.fillColor,stroke:isSel?'#f59e0b':b.strokeColor,'stroke-width':isSel?2.5:1.5});
    } else if(b.shape==='octagon'){
      const d2=Math.min(b.width,b.height)*.25;
      const pts=`${b.x+d2},${b.y} ${b.x+b.width-d2},${b.y} ${b.x+b.width},${b.y+d2} ${b.x+b.width},${b.y+b.height-d2} ${b.x+b.width-d2},${b.y+b.height} ${b.x+d2},${b.y+b.height} ${b.x},${b.y+b.height-d2} ${b.x},${b.y+d2}`;
      shape=mkEl('polygon',{points:pts,fill:b.fillColor,stroke:isSel?'#f59e0b':b.strokeColor,'stroke-width':isSel?2.5:1.5});
    } else {
      shape=mkEl('rect',{x:b.x,y:b.y,width:b.width,height:b.height,rx:4,fill:b.fillColor,stroke:isSel?'#f59e0b':b.strokeColor,'stroke-width':isSel?2.5:1.5});
    }
    g.appendChild(shape);

    // Gate decorations
    if(isGate){
      const bH=b.height*.55,bW=3.5;
      g.appendChild(mkEl('rect',{x:cx-b.width*.22-bW/2,y:cy-bH/2,width:bW,height:bH,fill:'#9CA3AF',rx:1}));
      g.appendChild(mkEl('rect',{x:cx+b.width*.22-bW/2,y:cy-bH/2,width:bW,height:bH,fill:'#9CA3AF',rx:1}));
      g.appendChild(mkEl('path',{d:`M ${b.x+4} ${cy} Q ${cx} ${b.y+2} ${b.x+b.width-4} ${cy}`,stroke:'#9CA3AF','stroke-width':2,fill:'none'}));
    }

    // Label
    if(b.label&&b.label!=='🌳'){
      const lines=b.label.split('\n').filter(Boolean);
      const baseY=isGate?cy+b.height*.28:cy;
      const startY=baseY-(lines.length*13)/2+6.5;
      lines.forEach((line,i)=>{
        const t=mkEl('text',{x:cx,y:startY+i*13,'text-anchor':'middle','dominant-baseline':'middle','font-size':isGate?8:10,'font-family':'Outfit,sans-serif','font-weight':'700',fill:isGate?'#F9FAFB':'#374151'});
        t.textContent=line;g.appendChild(t);
      });
    } else if(b.label==='🌳'){
      const t=mkEl('text',{x:cx,y:cy+1,'text-anchor':'middle','dominant-baseline':'middle','font-size':Math.min(b.width,b.height)*.72});
      t.textContent='🌳';g.appendChild(t);
    }

    // Interaction
    shape.style.cursor=(editMode&&editTarget==='buildings')?'move':'pointer';
    if(editMode&&editTarget==='buildings'){
      shape.addEventListener('mousedown',e=>{
        e.stopPropagation();
        const rect=mapArea.getBoundingClientRect();
        dragBldg=b.id;dragOff.x=(e.clientX-rect.left-panX)/zoom-b.x;dragOff.y=(e.clientY-rect.top-panY)/zoom-b.y;
        selectedId=b.id;selectedRoadId=null;renderAll();
      });
    } else {
      shape.addEventListener('click',e=>{e.stopPropagation();selectedId=b.id;selectedRoadId=null;renderAll();});
    }
    svg.appendChild(g);
  }

  // Road edit handles
  if(editMode&&editTarget==='roads'){
    for(const road of state.roads){
      const allPts=[{key:'start',pos:road.start},...road.segments.flatMap((seg,i)=>{
        const r=[{key:`e${i}`,pos:seg.end}];
        if(seg.type==='C'){if(seg.cp1)r.push({key:`c${i}p1`,pos:seg.cp1,isH:true});if(seg.cp2)r.push({key:`c${i}p2`,pos:seg.cp2,isH:true});}
        return r;
      })];
      for(const{key,pos,isH}of allPts){
        if(!pos)continue;
        const c=mkEl('circle',{cx:pos.x,cy:pos.y,r:isH?5:7,fill:isH?'#7dd3fc':'#f59e0b',stroke:'white','stroke-width':1.5,cursor:'move'});
        c.addEventListener('mousedown',e=>{
          e.stopPropagation();
          if(!selectedRoadId){selectedRoadId=road.id;renderAll();}
          const rect=mapArea.getBoundingClientRect();
          const mm=ev=>{
            const nx=Math.round((ev.clientX-rect.left-panX)/zoom),ny=Math.round((ev.clientY-rect.top-panY)/zoom);
            state.roads=state.roads.map(r=>{
              if(r.id!==road.id)return r;
              if(key==='start')return{...r,start:{x:nx,y:ny}};
              if(key.startsWith('e')){const i=parseInt(key.slice(1));return{...r,segments:r.segments.map((s,j)=>j===i?{...s,end:{x:nx,y:ny}}:s)};}
              const m=key.match(/^c(\d+)(p[12])$/);
              if(m){const i=parseInt(m[1]),h=m[2];return{...r,segments:r.segments.map((s,j)=>{if(j!==i||s.type!=='C')return s;return h==='p1'?{...s,cp1:{x:nx,y:ny}}:{...s,cp2:{x:nx,y:ny}};})}}
              return r;
            });
            renderSVG();
          };
          const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave();};
          window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
        });
        svg.appendChild(c);
      }
    }
  }

  // Draw preview
  if(drawRoadMode&&drawingPts.length>0){
    let d=`M ${drawingPts[0].x} ${drawingPts[0].y}`;
    for(let i=1;i<drawingPts.length;i++)d+=` L ${drawingPts[i].x} ${drawingPts[i].y}`;
    svg.appendChild(mkEl('path',{d,stroke:'#f59e0b','stroke-width':3,fill:'none','stroke-dasharray':'8 4','stroke-linecap':'round'}));
    drawingPts.forEach(pt=>svg.appendChild(mkEl('circle',{cx:pt.x,cy:pt.y,r:5,fill:'#f59e0b',stroke:'white','stroke-width':1.5})));
  }
}

svg.addEventListener('click',e=>{
  if(drawRoadMode){
    const rect=mapArea.getBoundingClientRect();
    const x=Math.round((e.clientX-rect.left-panX)/zoom),y=Math.round((e.clientY-rect.top-panY)/zoom);
    drawingPts=[...drawingPts,{x,y}];renderSVG();renderHdr();return;
  }
  if(e.target===svg){selectedId=null;selectedRoadId=null;renderAll();}
});

function mkBtn(cls,html,onclick){const b=document.createElement('button');b.className='btn '+cls;b.innerHTML=html;if(onclick)b.onclick=onclick;return b;}

function renderHdr(){
  const hdr=document.getElementById('hdr');hdr.innerHTML='';
  // Title
  const t=document.createElement('div');t.className='hdr-title';
  t.innerHTML=`<i class="ti ti-map-pin" aria-hidden="true" style="color:#c8a84a;font-size:18px"></i>Campus Map<span class="hdr-sub">Editor</span>`;
  hdr.appendChild(t);
  // Save pill
  const cfgs={saved:{i:'ti-cloud-check',tx:'Saved',s:'border-color:#6ee7b7;color:#065f46;background:#ecfdf5'},saving:{i:'ti-loader',tx:'Saving…',s:'border-color:#93c5fd;color:#1e40af;background:#eff6ff'},unsaved:{i:'ti-device-floppy',tx:'Unsaved',s:'border-color:#fcd34d;color:#92400e;background:#fffbeb'}};
  const cf=cfgs[saveStatus]||cfgs.saved;
  const pill=document.createElement('div');pill.className='save-pill';pill.style.cssText=cf.s;
  pill.innerHTML=`<i class="ti ${cf.i}" style="font-size:13px"></i>${cf.tx}`;hdr.appendChild(pill);
  hdr.appendChild(Object.assign(document.createElement('div'),{className:'sp'}));

  if(drawRoadMode){
    const bann=document.createElement('div');bann.className='draw-bann';
    bann.innerHTML=`<i class="ti ti-pencil"></i>Drawing · ${drawingPts.length} pts`;
    if(drawingPts.length>0)bann.appendChild(mkBtn('btn-ghost','<i class="ti ti-arrow-back-up"></i>Undo',()=>{drawingPts=drawingPts.slice(0,-1);renderSVG();renderHdr();}));
    const fb=mkBtn('btn-green','<i class="ti ti-check"></i>Finish',finishRoad);fb.disabled=drawingPts.length<2;bann.appendChild(fb);
    const xb=document.createElement('button');xb.style.cssText='background:none;border:none;color:#7a7060;cursor:pointer;font-size:18px;padding:0 2px';xb.textContent='×';xb.onclick=cancelDraw;bann.appendChild(xb);
    hdr.appendChild(bann);
  }

  hdr.appendChild(mkBtn(showLegend?'btn-active':'btn-ghost','<i class="ti ti-layers" aria-hidden="true"></i>Legend',()=>{showLegend=!showLegend;renderLegend();renderHdr();}));
  hdr.appendChild(mkBtn(editMode?'btn-active':'btn-ghost',editMode?'<i class="ti ti-pencil"></i>Editing':'<i class="ti ti-eye"></i>View',toggleEdit));

  if(editMode&&!drawRoadMode){
    const tabs=document.createElement('div');tabs.className='tabs';
    [['buildings','<i class="ti ti-building"></i>Buildings'],['roads','<i class="ti ti-route"></i>Roads']].forEach(([tgt,lbl])=>{
      const tb=document.createElement('button');tb.className='tab'+(editTarget===tgt?' tab-on':'');tb.innerHTML=lbl;
      tb.onclick=()=>{editTarget=tgt;if(tgt==='buildings')selectedRoadId=null;else selectedId=null;renderAll();};
      tabs.appendChild(tb);
    });
    hdr.appendChild(tabs);
    if(editTarget==='buildings'){
      hdr.appendChild(mkBtn('btn-green','<i class="ti ti-plus"></i>Add',addBuilding));
      hdr.appendChild(mkBtn('btn-green','<i class="ti ti-plant"></i>Nature',addNature));
    } else {
      hdr.appendChild(mkBtn('btn-green','<i class="ti ti-route"></i>Draw Road',()=>{drawRoadMode=true;drawingPts=[];renderHdr();}));
      hdr.appendChild(mkBtn('btn-amber','<i class="ti ti-circle-plus"></i>Junction',()=>{state.junctions=[...state.junctions,{id:`j-${Date.now()}`,x:600,y:342}];scheduleSave();renderSVG();}));
    }
  }

  hdr.appendChild(mkBtn('btn-dark','<i class="ti ti-refresh"></i>',doReset));
  hdr.appendChild(mkBtn('btn-amber','<i class="ti ti-download"></i>Export SVG',doExport));
}

function renderLegend(){
  const leg=document.getElementById('legend');
  if(!showLegend){leg.style.display='none';return;}
  leg.style.display='block';leg.innerHTML='';
  const lt=document.createElement('div');lt.className='leg-title';lt.innerHTML='Legend<button onclick="showLegend=false;renderLegend()" style="background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:14px;line-height:1">×</button>';
  leg.appendChild(lt);
  CATS.forEach(cat=>{
    const count=state.buildings.filter(b=>b.category===cat).length;if(!count)return;
    const row=document.createElement('div');row.className='leg-row';
    row.innerHTML=`<div class="leg-sw" style="background:${CAT_COLORS[cat]}"></div>${cat}<span class="leg-n">${count}</span>`;
    leg.appendChild(row);
  });
  const hr=document.createElement('hr');hr.style.cssText='border:none;border-top:1px solid var(--border-t);margin:5px 0';leg.appendChild(hr);
  const rr=document.createElement('div');rr.className='leg-row';
  rr.innerHTML=`<div class="leg-sw" style="background:linear-gradient(90deg,#F59E0B,#FDE68A)"></div>Roads<span class="leg-n">${state.roads.length}</span>`;
  leg.appendChild(rr);
}

function addField(parent,label,inputFn){
  const wrap=document.createElement('div');
  const lbl=document.createElement('label');lbl.className='flabel';lbl.textContent=label;
  wrap.appendChild(lbl);wrap.appendChild(inputFn());parent.appendChild(wrap);
}
function updateB(id,key,val){state.buildings=state.buildings.map(b=>b.id===id?{...b,[key]:val}:b);scheduleSave();renderSVG();renderSide();}
function updateR(id,key,val){state.roads=state.roads.map(r=>r.id===id?{...r,[key]:val}:r);scheduleSave();renderSVG();renderSide();}

function renderSide(){
  const side=document.getElementById('side');
  const b=state.buildings.find(x=>x.id===selectedId);
  const r=state.roads.find(x=>x.id===selectedRoadId);
  if(!b&&!r){side.style.display='none';return;}
  side.style.display='flex';side.innerHTML='';

  if(b){
    const isEdit=editMode&&editTarget==='buildings';
    const catColor=CAT_COLORS[b.category]||'#E5E7EB';
    const sh=document.createElement('div');sh.className='side-hdr';
    const titleDiv=document.createElement('div');titleDiv.className='side-title';
    titleDiv.innerHTML=`<div style="width:11px;height:11px;border-radius:2px;background:${b.fillColor};border:1px solid var(--border-t);flex-shrink:0"></div>${(b.label||'Element').replace(/\n/g,' ').slice(0,22)}`;
    sh.appendChild(titleDiv);
    const btns=document.createElement('div');btns.style.cssText='display:flex;align-items:center;gap:8px';
    if(isEdit){const db=mkBtn('btn-red','<i class="ti ti-trash"></i>Del',()=>{state.buildings=state.buildings.filter(x=>x.id!==b.id);selectedId=null;scheduleSave();renderAll();});btns.appendChild(db);}
    const xb=document.createElement('button');xb.style.cssText='background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:20px;padding:0 2px';xb.textContent='×';xb.onclick=()=>{selectedId=null;renderAll();};btns.appendChild(xb);
    sh.appendChild(btns);side.appendChild(sh);

    const sb=document.createElement('div');sb.className='side-body';
    const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:8px';
    const badge=document.createElement('span');badge.className='badge';badge.style.cssText=`background:${catColor};color:#374151`;badge.textContent=b.category;row.appendChild(badge);
    if(!isEdit){const hint=document.createElement('span');hint.style.cssText='font-size:10px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px';hint.innerHTML='<i class="ti ti-info-circle"></i>View only';row.appendChild(hint);}
    sb.appendChild(row);

    addField(sb,'Label',()=>{const ta=document.createElement('textarea');ta.className='ftxt';ta.rows=2;ta.value=b.label;ta.disabled=!isEdit;ta.oninput=()=>updateB(b.id,'label',ta.value);return ta;});
    addField(sb,'Category',()=>{const sel=document.createElement('select');sel.className='fsel';sel.disabled=!isEdit;CATS.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;if(c===b.category)o.selected=true;sel.appendChild(o);});sel.onchange=()=>updateB(b.id,'category',sel.value);return sel;});
    addField(sb,'Notes',()=>{const ta=document.createElement('textarea');ta.className='ftxt';ta.rows=3;ta.value=b.notes;ta.disabled=!isEdit;ta.placeholder='Add description…';ta.oninput=()=>updateB(b.id,'notes',ta.value);return ta;});

    if(isEdit){
      addField(sb,'Shape',()=>{const sel=document.createElement('select');sel.className='fsel';SHAPES.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s.charAt(0).toUpperCase()+s.slice(1);if(s===b.shape)o.selected=true;sel.appendChild(o);});sel.onchange=()=>updateB(b.id,'shape',sel.value);return sel;});
      addField(sb,'Fill color',()=>{
        const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-wrap:wrap;gap:5px;margin-top:3px';
        FILL_COLS.forEach(({l,v})=>{const sw=document.createElement('button');sw.className='sw'+(b.fillColor===v?' sw-on':'');sw.style.cssText=`background:${v};border-color:${b.fillColor===v?'#c8860a':'var(--border-t)'}`;sw.title=l;sw.onclick=()=>updateB(b.id,'fillColor',v);wrap.appendChild(sw);});
        const cpw=document.createElement('label');cpw.className='sw cp-wrap';cpw.style.cssText='background:var(--bg-secondary);border:2px dashed var(--border-t);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text-tertiary);cursor:pointer';cpw.textContent='+';
        const cp=document.createElement('input');cp.type='color';cp.value=b.fillColor;cp.oninput=()=>updateB(b.id,'fillColor',cp.value);cpw.appendChild(cp);wrap.appendChild(cpw);
        return wrap;
      });
      addField(sb,'Position',()=>{
        const g=document.createElement('div');g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px';
        ['x','y'].forEach(ax=>{const d=document.createElement('div');d.innerHTML=`<span style="font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary)">${ax.toUpperCase()}</span>`;const inp=document.createElement('input');inp.type='number';inp.className='finp';inp.value=Math.round(b[ax]);inp.style.marginTop='3px';inp.oninput=()=>updateB(b.id,ax,parseFloat(inp.value)||0);d.appendChild(inp);g.appendChild(d);});
        return g;
      });
      addField(sb,'Size',()=>{
        const g=document.createElement('div');g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px';
        [['width','W'],['height','H']].forEach(([k,lbl])=>{const d=document.createElement('div');d.innerHTML=`<span style="font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary)">${lbl}</span>`;const inp=document.createElement('input');inp.type='number';inp.className='finp';inp.value=Math.round(b[k]);inp.style.marginTop='3px';inp.oninput=()=>updateB(b.id,k,parseFloat(inp.value)||10);d.appendChild(inp);g.appendChild(d);});
        return g;
      });
      addField(sb,'Rotation (°)',()=>{const inp=document.createElement('input');inp.type='number';inp.className='finp';inp.value=b.rotation;inp.oninput=()=>updateB(b.id,'rotation',parseFloat(inp.value)||0);return inp;});
      addField(sb,'Stroke color',()=>{
        const wrap=document.createElement('div');wrap.style.cssText='display:flex;align-items:center;gap:8px';
        const cpw=document.createElement('label');cpw.className='cp-wrap';cpw.style.cssText='width:36px;height:28px;border-radius:4px;border:1.5px solid var(--border-t);cursor:pointer;overflow:hidden;display:block';
        cpw.style.background=b.strokeColor;
        const cp=document.createElement('input');cp.type='color';cp.value=b.strokeColor;cp.oninput=()=>{cpw.style.background=cp.value;updateB(b.id,'strokeColor',cp.value);};cpw.appendChild(cp);
        wrap.appendChild(cpw);
        const lbl2=document.createElement('span');lbl2.style.cssText='font-size:11px;color:var(--text-tertiary)';lbl2.textContent=b.strokeColor;wrap.appendChild(lbl2);
        return wrap;
      });
    }
    if(!isEdit&&b.notes){
      const callout=document.createElement('div');callout.className='callout';
      callout.innerHTML=`<div class="callout-lbl">About this venue</div><div style="font-size:12px;color:var(--text-secondary);line-height:1.6">${b.notes}</div>`;
      sb.appendChild(callout);
    }
    side.appendChild(sb);
  }

  if(r&&editMode&&editTarget==='roads'){
    const sh=document.createElement('div');sh.className='side-hdr';sh.style.cssText='background:var(--amber-bg);border-bottom-color:rgba(200,134,10,.3)';
    const td=document.createElement('div');td.className='side-title';td.style.color='var(--amber)';td.innerHTML=`<i class="ti ti-route" style="font-size:14px"></i>${r.label.slice(0,20)}`;sh.appendChild(td);
    const btns=document.createElement('div');btns.style.cssText='display:flex;align-items:center;gap:8px';
    btns.appendChild(mkBtn('btn-red','<i class="ti ti-trash"></i>',()=>{state.roads=state.roads.filter(x=>x.id!==r.id);selectedRoadId=null;scheduleSave();renderAll();}));
    const xb=document.createElement('button');xb.style.cssText='background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:20px;padding:0 2px';xb.textContent='×';xb.onclick=()=>{selectedRoadId=null;renderAll();};btns.appendChild(xb);
    sh.appendChild(btns);side.appendChild(sh);
    const sb=document.createElement('div');sb.className='side-body';
    const tip=document.createElement('div');tip.style.cssText='background:var(--amber-bg);border:1px solid var(--amber-bd);border-left:3px solid var(--amber);border-radius:4px;padding:8px 10px;font-size:10px;font-weight:500;color:var(--amber);line-height:1.6';tip.textContent='Drag ○ anchors to reshape · drag ◦ handles to curve';sb.appendChild(tip);
    addField(sb,'Road name',()=>{const inp=document.createElement('input');inp.type='text';inp.className='finp';inp.value=r.label;inp.oninput=()=>updateR(r.id,'label',inp.value);return inp;});
    addField(sb,'Color',()=>{const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-wrap:wrap;gap:5px;margin-top:3px';ROAD_COLS.forEach(({l,v})=>{const sw=document.createElement('button');sw.className='sw'+(r.color===v?' sw-on':'');sw.style.cssText=`background:${v};border-color:${r.color===v?'#c8860a':'var(--border-t)'}`;sw.title=l;sw.onclick=()=>updateR(r.id,'color',v);wrap.appendChild(sw);});return wrap;});
    addField(sb,`Width · ${r.width}px`,()=>{const inp=document.createElement('input');inp.type='range';inp.min=12;inp.max=80;inp.value=r.width;inp.oninput=()=>updateR(r.id,'width',parseInt(inp.value));return inp;});
    addField(sb,'Centre dashes',()=>{const tog=document.createElement('button');tog.className='tog'+(r.showDashes?' tog-on':'');tog.innerHTML='<span class="tog-k"></span>';tog.onclick=()=>updateR(r.id,'showDashes',!r.showDashes);return tog;});
    side.appendChild(sb);
  }
}

function toggleEdit(){editMode=!editMode;selectedId=null;selectedRoadId=null;drawRoadMode=false;drawingPts=[];renderAll();}
function addBuilding(){
  const id=`bldg-${Date.now()}`;
  state.buildings=[...state.buildings,{id,label:'NEW',x:500,y:150,width:120,height:90,rotation:0,fillColor:'#BFDBFE',strokeColor:'#374151',notes:'',shape:'rect',category:'Other'}];
  selectedId=id;selectedRoadId=null;scheduleSave();renderAll();
}
function addNature(){
  const types=[
    {label:'🌳',w:42,h:42,shape:'circle',fill:'#166534',stroke:'#14532d',cat:'Nature',notes:'Tree'},
    {label:'GARDEN',w:110,h:70,shape:'rect',fill:'#86EFAC',stroke:'#166534',cat:'Nature',notes:'Garden area'},
    {label:'POOL',w:90,h:60,shape:'rect',fill:'#67E8F9',stroke:'#0891B2',cat:'Nature',notes:'Pool'},
    {label:'LAWN',w:130,h:90,shape:'rect',fill:'#bbf7d0',stroke:'#15803d',cat:'Nature',notes:'Lawn area'},
    {label:'POND',w:70,h:55,shape:'octagon',fill:'#93c5fd',stroke:'#1d4ed8',cat:'Nature',notes:'Ornamental pond'},
  ];
  const type=types[Math.floor(Math.random()*types.length)];
  const id=`nature-${Date.now()}`;
  state.buildings=[...state.buildings,{id,label:type.label,x:350+Math.random()*300,y:180+Math.random()*120,width:type.w,height:type.h,rotation:0,fillColor:type.fill,strokeColor:type.stroke,notes:type.notes,shape:type.shape,category:type.cat}];
  selectedId=id;scheduleSave();renderAll();
}
function finishRoad(){
  if(drawingPts.length<2){drawRoadMode=false;drawingPts=[];renderAll();return;}
  const id=`road-${Date.now()}`;
  state.roads=[...state.roads,{id,label:`Road ${state.roads.length+1}`,start:drawingPts[0],segments:drawingPts.slice(1).map(p=>({type:'L',end:p})),color:'#FDE68A',width:44,showDashes:false}];
  selectedRoadId=id;drawRoadMode=false;drawingPts=[];scheduleSave();renderAll();
}
function cancelDraw(){drawRoadMode=false;drawingPts=[];renderAll();}
function doReset(){if(!confirm('Reset to original campus layout? Unsaved changes will be lost.'))return;state=JSON.parse(JSON.stringify(INITIAL_STATE));selectedId=null;selectedRoadId=null;editMode=false;drawRoadMode=false;drawingPts=[];scheduleSave();renderAll();}

function doExport(){
  const lines=[`<svg width="${MAP_W}" height="${MAP_H}" viewBox="0 0 ${MAP_W} ${MAP_H}" xmlns="http://www.w3.org/2000/svg">`];
  lines.push(`  <rect width="${MAP_W}" height="${MAP_H}" fill="#EEF0E8"/>`);
  for(const road of state.roads){const d=roadPath(road);lines.push(`  <path d="${d}" stroke="#E6A800" stroke-width="${road.width+6}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);lines.push(`  <path d="${d}" stroke="${road.color}" stroke-width="${road.width}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);if(road.showDashes)lines.push(`  <path d="${d}" stroke="white" stroke-width="2" fill="none" stroke-dasharray="20 14" stroke-linecap="round" opacity="0.7"/>`);}
  for(const j of state.junctions)lines.push(`  <circle cx="${j.x}" cy="${j.y}" r="28" fill="#FDE68A" stroke="#E6A800" stroke-width="3"/>`);
  for(const b of state.buildings){
    const cx=b.x+b.width/2,cy=b.y+b.height/2;
    const tf=b.rotation!==0?` transform="rotate(${b.rotation} ${cx} ${cy})"`:''
    lines.push(`  <rect x="${b.x}" y="${b.y}" width="${b.width}" height="${b.height}" rx="4" fill="${b.fillColor}" stroke="${b.strokeColor}" stroke-width="1.5"${tf}/>`);
    const ll=(b.label||'').split('\n').filter(Boolean);
    const sy=cy-(ll.length*13)/2+6.5;
    ll.forEach((l,i)=>lines.push(`  <text x="${cx}" y="${sy+i*13}" text-anchor="middle" dominant-baseline="middle" font-size="10" font-family="Outfit,sans-serif" font-weight="700" fill="${b.category==='Gate'?'#F9FAFB':'#374151'}"${tf}>${l}</text>`));
  }
  lines.push(`</svg>`);
  const code=lines.join('\n');

  const modal=document.getElementById('export-modal');
  modal.style.display='flex';
  modal.innerHTML='';
  const ov=document.createElement('div');ov.className='modal-overlay';
  const box=document.createElement('div');box.className='modal';
  const hdr2=document.createElement('div');hdr2.className='modal-hdr';
  hdr2.innerHTML=`<div><div class="modal-title">SVG Export</div><div class="modal-sub">Click inside the code area to select all · ${code.length.toLocaleString()} chars</div></div>`;
  const closex=document.createElement('button');closex.style.cssText='background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-tertiary)';closex.textContent='×';closex.onclick=()=>{modal.style.display='none';};hdr2.appendChild(closex);
  box.appendChild(hdr2);
  const ta=document.createElement('textarea');ta.readOnly=true;ta.value=code;ta.style.cssText='flex:1;min-height:420px;padding:16px;font-family:monospace;font-size:11px;background:var(--bg-secondary);border:none;outline:none;resize:none;line-height:1.6;color:var(--text-primary);width:100%';
  ta.onclick=()=>ta.select();box.appendChild(ta);
  const foot=document.createElement('div');foot.className='modal-foot';
  foot.innerHTML=`<span style="margin-right:auto;font-size:10px;color:var(--text-tertiary);letter-spacing:.5px">${state.roads.length} roads · ${state.buildings.length} elements</span>`;
  let copied=false;
  const cpbtn=mkBtn('btn-amber','<i class="ti ti-copy"></i>Copy Code',async()=>{try{await navigator.clipboard.writeText(code);}catch(e){ta.select();document.execCommand('copy');}cpbtn.innerHTML='<i class="ti ti-check"></i>Copied!';setTimeout(()=>{cpbtn.innerHTML='<i class="ti ti-copy"></i>Copy Code';},2500);});
  foot.appendChild(cpbtn);
  foot.appendChild(mkBtn('btn-dark','Close',()=>{modal.style.display='none';}));
  box.appendChild(foot);
  ov.appendChild(box);modal.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)modal.style.display='none';});
}

function renderAll(){renderHdr();renderSVG();renderSide();renderLegend();}

// Init
persistLoad().then(()=>{renderAll();setTimeout(fitCanvas,80);}).catch(()=>{renderAll();setTimeout(fitCanvas,80);});
</script>
</body>
