<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campus Map Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1c1a14;--ink2:#4a4535;--ink3:#7a7060;
  --parch:#f5f0e4;--paper:#faf7ef;--cream:#ede8d8;--border:#d4c9a8;--border2:#c4b88a;
  --amber:#c8860a;--amber-bg:#fdf3dc;--amber-bd:#e8c96a;
  --green:#2d6a3f;--red:#9b2c2c;--blue:#1e40af;
  --bg-primary:#ffffff;--bg-secondary:#f5f0e4;--bg-tertiary:#ede8d8;
  --text-primary:#1c1a14;--text-secondary:#4a4535;--text-tertiary:#7a7060;
  --border-t:rgba(212,201,168,.5);--border-s:rgba(196,184,138,.7);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1e1c16;--bg-secondary:#252318;--bg-tertiary:#2c2920;
    --text-primary:#f5f0e4;--text-secondary:#c8c0a8;--text-tertiary:#7a7060;
    --border-t:rgba(90,80,60,.5);--border-s:rgba(120,105,75,.6);
    --amber-bg:#2a2008;--amber-bd:#6b5400;
    --parch:#252318;--paper:#1e1c16;
  }
}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg-tertiary);color:var(--text-primary)}
.hdr{display:flex;align-items:center;gap:6px;padding:0 12px;height:54px;background:#1c1a14;border-bottom:2px solid #3a3020;flex-shrink:0;flex-wrap:wrap;position:relative;z-index:40}
.hdr-title{font-size:17px;font-weight:700;color:#f5f0e4;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:#5a5040;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:1px 7px;border-radius:3px}
.sp{flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:5px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;letter-spacing:.3px;cursor:pointer;border:1.5px solid;transition:all .12s;white-space:nowrap;position:relative}
.btn-ghost{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.18);color:#c8c0a8}
.btn-ghost:hover{background:rgba(255,255,255,.14);color:#f5f0e4}
.btn-active{background:#fdf3dc;border-color:#e8c96a;color:#c8860a}
.btn-amber{background:#c8860a;border-color:#a06c00;color:#fff}
.btn-amber:hover{background:#a06c00}
.btn-green{background:#2d6a3f;border-color:#1e4a2c;color:#fff}
.btn-green:hover{background:#1e4a2c}
.btn-red{background:transparent;border-color:rgba(155,44,44,.4);color:#9b2c2c;padding:5px 10px;font-size:11px}
.btn-red:hover{background:rgba(155,44,44,.08)}
.btn-dark{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#7a7060}
.btn-dark:hover{color:#c8c0a8;border-color:rgba(255,255,255,.22)}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.tabs{display:inline-flex;border:1.5px solid rgba(255,255,255,.15);border-radius:5px;overflow:hidden}
.tab{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;cursor:pointer;border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;color:#7a7060;transition:all .12s;border-right:1.5px solid rgba(255,255,255,.1)}
.tab:last-child{border-right:none}
.tab:hover:not(.tab-on){background:rgba(255,255,255,.07);color:#c8c0a8}
.tab-on{background:rgba(200,134,10,.18);color:#e8c96a}
.draw-bann{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:5px;border:1.5px solid #e8c96a;background:#fdf3dc;font-size:11px;font-weight:600;color:#c8860a}
.wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.body{display:flex;flex:1;overflow:hidden;position:relative}
.map-area{flex:1;overflow:hidden;position:relative;background:#e8e4d8;cursor:default}
.map-area.cursor-cross{cursor:crosshair}
.map-area.cursor-grab{cursor:grab}
.map-area.cursor-grab:active{cursor:grabbing}
#canvas-wrap{position:absolute;transform-origin:0 0}
.side{width:290px;flex-shrink:0;background:var(--bg-primary);border-left:1px solid var(--border-t);display:flex;flex-direction:column;overflow:hidden}
.side-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border-t);background:var(--bg-secondary);flex-shrink:0}
.side-title{font-size:14px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:7px}
.side-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.side-body::-webkit-scrollbar{width:4px}
.side-body::-webkit-scrollbar-thumb{background:var(--border-t);border-radius:2px}
.flabel{display:block;font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:4px}
.finp,.fsel,.ftxt{width:100%;border:1.5px solid var(--border-t);border-radius:5px;background:var(--bg-secondary);color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:border-color .12s;-webkit-appearance:none;appearance:none}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:#e8c96a;box-shadow:0 0 0 2px rgba(200,134,10,.12)}
.finp:disabled,.fsel:disabled,.ftxt:disabled{opacity:.6;cursor:default}
.ftxt{resize:none;line-height:1.5}
.sw{width:26px;height:26px;border-radius:4px;cursor:pointer;transition:transform .1s;border:2px solid transparent}
.sw:hover{transform:scale(1.15)}
.sw-on{border-color:#c8860a !important;box-shadow:0 0 0 2px rgba(200,134,10,.25)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.callout{background:rgba(30,64,175,.08);border:1px solid rgba(30,64,175,.2);border-left:3px solid #60a5fa;border-radius:4px;padding:10px 12px}
.callout-lbl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#3b82f6;margin-bottom:4px}
.zoom-bar{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:4px;z-index:30}
.zoom-btn{width:36px;height:36px;border-radius:5px;border:1.5px solid var(--border-t);background:var(--bg-primary);color:var(--text-primary);font-size:18px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.zoom-btn:hover{background:var(--bg-secondary)}
.zoom-lbl{font-size:10px;font-weight:600;text-align:center;color:var(--text-secondary);padding:2px 0}
.legend{position:absolute;top:12px;left:12px;z-index:20;background:var(--bg-primary);border:1px solid var(--border-t);border-radius:5px;padding:11px 13px;min-width:155px;box-shadow:0 1px 4px rgba(28,26,20,.13)}
.leg-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-t);padding-bottom:6px}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:10px;font-weight:500;color:var(--text-secondary)}
.leg-sw{width:12px;height:12px;border-radius:2px;border:1px solid rgba(0,0,0,.12);flex-shrink:0}
.leg-n{margin-left:auto;color:var(--text-tertiary);font-size:9px}
.save-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;border:1.5px solid;font-size:10px;font-weight:600;letter-spacing:.5px;transition:all .15s;cursor:default}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--border-t);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:3px;background:#c8860a;cursor:pointer}
.tog{position:relative;display:inline-flex;align-items:center;width:38px;height:20px;border:1.5px solid var(--border-t);border-radius:3px;background:var(--bg-secondary);cursor:pointer;transition:all .15s}
.tog-on{border-color:#e8c96a;background:#fdf3dc}
.tog-k{position:absolute;left:2px;width:13px;height:13px;background:var(--border-s);border-radius:2px;transition:all .15s}
.tog-on .tog-k{left:21px;background:#c8860a}
.cp-wrap{position:relative;overflow:hidden}
.cp-wrap input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.coords{position:absolute;bottom:16px;left:16px;font-size:10px;font-weight:500;color:var(--text-tertiary);z-index:20;pointer-events:none;letter-spacing:.5px}
/* Export modal */
.modal-overlay{position:fixed;inset:0;background:rgba(28,26,20,.72);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg-primary);border:1px solid var(--border-t);border-radius:6px;width:min(860px,94vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 2px 40px rgba(28,26,20,.3)}
.modal-hdr{padding:15px 20px;border-bottom:1px solid var(--border-t);display:flex;justify-content:space-between;align-items:center;background:var(--bg-secondary)}
.modal-title{font-size:16px;font-weight:700;color:var(--text-primary)}
.modal-sub{font-size:10px;color:var(--text-tertiary);margin-top:3px;letter-spacing:.5px}
.modal-foot{padding:11px 20px;border-top:1px solid var(--border-t);display:flex;gap:8px;justify-content:flex-end;align-items:center;background:var(--bg-secondary)}
/* Dropdown */
.dropdown{position:relative;display:inline-block}
.dropdown-menu{position:absolute;top:calc(100% + 6px);left:0;background:#1c1a14;border:1.5px solid rgba(255,255,255,.18);border-radius:7px;padding:6px;min-width:220px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.4);display:none}
.dropdown-menu.open{display:block;animation:ddOpen .12s ease}
@keyframes ddOpen{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dd-section{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:#5a5040;padding:4px 8px 2px;margin-top:4px}
.dd-section:first-child{margin-top:0}
.dd-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:5px;cursor:pointer;border:none;background:none;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;color:#c8c0a8;width:100%;text-align:left;transition:background .1s}
.dd-item:hover{background:rgba(255,255,255,.1);color:#f5f0e4}
.dd-icon{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.dd-sep{height:1px;background:rgba(255,255,255,.08);margin:4px 0}
</style>
</head>
<body>
<div class="wrap" id="root">
  <header class="hdr" id="hdr"></header>
  <div class="body">
    <div class="map-area" id="map-area">
      <div id="canvas-wrap">
        <svg id="map-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="legend" id="legend"></div>
      <div class="zoom-bar">
        <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
        <div class="zoom-lbl" id="zoom-lbl">100%</div>
        <button class="zoom-btn" id="zoom-out" title="Zoom out">–</button>
        <button class="zoom-btn" id="zoom-fit" title="Fit to view" style="font-size:11px;font-weight:700">FIT</button>
      </div>
      <div class="coords" id="coords">x:0  y:0</div>
    </div>
    <aside class="side" id="side" style="display:none"></aside>
  </div>
</div>
<div id="export-modal" style="display:none"></div>
