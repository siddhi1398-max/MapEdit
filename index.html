// ─── GRID ──────────────────────────────────────
function renderGrid(g){
  if(!showGrid)return;
  for(let x=0;x<=MAP_W;x+=GRID_MINOR)g.appendChild(mkEl('line',{x1:x,y1:0,x2:x,y2:MAP_H,stroke:x%GRID_MAJOR===0?'rgba(100,84,50,.28)':'rgba(100,84,50,.08)','stroke-width':x%GRID_MAJOR===0?.8:.3}));
  for(let y=0;y<=MAP_H;y+=GRID_MINOR)g.appendChild(mkEl('line',{x1:0,y1:y,x2:MAP_W,y2:y,stroke:y%GRID_MAJOR===0?'rgba(100,84,50,.28)':'rgba(100,84,50,.08)','stroke-width':y%GRID_MAJOR===0?.8:.3}));
  for(let x=0;x<=MAP_W;x+=GRID_MAJOR)for(let y=0;y<=MAP_H;y+=GRID_MAJOR)g.appendChild(mkEl('circle',{cx:x,cy:y,r:2.5,fill:'rgba(120,100,60,.5)'}));
  const numStyle="font-size:14px;font-family:'Outfit',sans-serif;font-weight:700;paint-order:stroke";
  for(let x=GRID_MAJOR;x<=MAP_W;x+=GRID_MAJOR){const t=mkEl('text',{x,y:MAP_H+18,'text-anchor':'middle',style:numStyle,fill:'#6a5c3a',stroke:'rgba(238,240,232,0.9)','stroke-width':4,'paint-order':'stroke'});t.textContent=x;g.appendChild(t)}
  for(let y=GRID_MAJOR;y<=MAP_H;y+=GRID_MAJOR){const t=mkEl('text',{x:-6,y:y+4,'text-anchor':'end',style:numStyle,fill:'#6a5c3a',stroke:'rgba(238,240,232,0.9)','stroke-width':4,'paint-order':'stroke'});t.textContent=y;g.appendChild(t)}
}

// ─── SCALE BAR (in SVG) ────────────────────────
function drawScaleBar(g,x,y){
  const mpp=ST.metersPerPixel||2.5;
  const metres=[50,100,200,500];let targetPx=180,chosen=100;
  for(const m of metres){const px=m/mpp;if(Math.abs(px-targetPx)<Math.abs(chosen/mpp-targetPx))chosen=m}
  const barPx=chosen/mpp;
  g.appendChild(mkEl('rect',{x:x-6,y:y-18,width:barPx+12,height:26,rx:5,fill:'rgba(255,255,255,0.88)',stroke:'rgba(0,0,0,0.15)','stroke-width':1}));
  g.appendChild(mkEl('line',{x1:x,y1:y,x2:x+barPx,y2:y,stroke:'#374151','stroke-width':2.5,'stroke-linecap':'round'}));
  g.appendChild(mkEl('line',{x1:x,y1:y-5,x2:x,y2:y+3,stroke:'#374151','stroke-width':2,'stroke-linecap':'round'}));
  g.appendChild(mkEl('line',{x1:x+barPx,y1:y-5,x2:x+barPx,y2:y+3,stroke:'#374151','stroke-width':2,'stroke-linecap':'round'}));
  g.appendChild(mkEl('line',{x1:x+barPx/2,y1:y-3,x2:x+barPx/2,y2:y+2,stroke:'#374151','stroke-width':1.5,'stroke-linecap':'round'}));
  const lblStyle="font-size:12px;font-family:'Outfit',sans-serif;font-weight:700";
  const t0=mkEl('text',{x,y:y-7,'text-anchor':'middle',style:lblStyle,fill:'#374151'});t0.textContent='0';g.appendChild(t0);
  const t1=mkEl('text',{x:x+barPx,y:y-7,'text-anchor':'middle',style:lblStyle,fill:'#374151'});t1.textContent=chosen>=1000?`${chosen/1000}km`:`${chosen}m`;g.appendChild(t1);
  // Drag handle
  const handle=mkEl('rect',{x:x-6,y:y-18,width:barPx+12,height:26,rx:5,fill:'transparent',cursor:'move',opacity:0});
  handle.addEventListener('mousedown',e=>{e.stopPropagation();const p=toCanvas(e.clientX,e.clientY);scaleBarDrag={ox:p.x-ST.scaleBarPos.x,oy:p.y-ST.scaleBarPos.y}});
  g.appendChild(handle);
}

// ─── MAIN SVG RENDER ───────────────────────────
let svgRenderPending=false;
function renderSVG(){
  // Skip redundant renders during animation frame
  if(!svgEl)return;
  _doRenderSVG();
}
function _doRenderSVG(){
  while(svgEl.firstChild)svgEl.removeChild(svgEl.firstChild);
  svgEl.appendChild(mkEl('rect',{x:0,y:0,width:MAP_W,height:MAP_H,fill:'#EEF0E8'}));

  // Background image
  if(ST.backgroundImage?.src){
    const bi=ST.backgroundImage;
    const imgEl=mkEl('image',{x:bi.x,y:bi.y,width:bi.w,height:bi.h,opacity:bi.opacity||0.5,preserveAspectRatio:'xMidYMid meet'});
    imgEl.setAttributeNS('http://www.w3.org/1999/xlink','href',bi.src);
    svgEl.appendChild(imgEl);
    if(!bi.locked&&editMode){
      const brd=mkEl('rect',{x:bi.x,y:bi.y,width:bi.w,height:bi.h,fill:'transparent',stroke:'#60a5fa','stroke-width':1.5,'stroke-dasharray':'8 5',cursor:'move',opacity:.7});
      brd.addEventListener('mousedown',e=>{
        e.stopPropagation();const start=toCanvas(e.clientX,e.clientY);const ox=bi.x,oy=bi.y;
        const mm=ev=>{const p=toCanvas(ev.clientX,ev.clientY);ST.backgroundImage={...ST.backgroundImage,x:Math.round(ox+p.x-start.x),y:Math.round(oy+p.y-start.y)};renderSVG()};
        const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave()};
        window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
      });
      svgEl.appendChild(brd);
      const rh=mkEl('rect',{x:bi.x+bi.w-10,y:bi.y+bi.h-10,width:14,height:14,fill:'#60a5fa',stroke:'white','stroke-width':1.5,rx:3,cursor:'se-resize'});
      rh.addEventListener('mousedown',e=>{
        e.stopPropagation();const start=toCanvas(e.clientX,e.clientY);const ow=bi.w,oh=bi.h;
        const mm=ev=>{const p=toCanvas(ev.clientX,ev.clientY);const nw=Math.max(80,Math.round(ow+p.x-start.x)),nh=Math.max(60,Math.round(oh+p.y-start.y));ST.backgroundImage={...ST.backgroundImage,w:nw,h:nh};renderSVG()};
        const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave()};
        window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
      });
      svgEl.appendChild(rh);
    } else if(bi.locked&&editMode){
      // Show lock badge in SVG space
      const lockBadge=mkEl('rect',{x:bi.x+4,y:bi.y+4,width:60,height:16,rx:3,fill:'rgba(30,58,138,.7)'});
      svgEl.appendChild(lockBadge);
      const lockT=mkEl('text',{x:bi.x+34,y:bi.y+12,'text-anchor':'middle','dominant-baseline':'middle','font-size':9,'font-family':"'Outfit',sans-serif",'font-weight':'700',fill:'#93c5fd'});
      lockT.textContent='🔒 LOCKED';svgEl.appendChild(lockT);
    }
  }

  const gGrid=mkEl('g',{});renderGrid(gGrid);svgEl.appendChild(gGrid);

  // Footpaths
  for(const fp of(ST.footpaths||[])){
    const d=roadPath(fp);const isSel=selPath===fp.id&&editMode;
    if(isSel)svgEl.appendChild(mkEl('path',{d,stroke:'#f59e0b','stroke-width':fp.width+10,fill:'none','stroke-linecap':'round',opacity:.3}));
    svgEl.appendChild(mkEl('path',{d,stroke:'rgba(0,0,0,.12)','stroke-width':fp.width+2,fill:'none','stroke-linecap':'round'}));
    const da=fp.style==='dashed'?`${fp.width*1.5} ${fp.width}`:fp.style==='dotted'?`2 ${fp.width}`:'none';
    svgEl.appendChild(mkEl('path',{d,stroke:fp.color,'stroke-width':fp.width,fill:'none','stroke-linecap':'round','stroke-linejoin':'round','stroke-dasharray':da}));
    if(fp.style==='solid'&&fp.width>8)svgEl.appendChild(mkEl('path',{d,stroke:'rgba(255,255,255,.35)','stroke-width':2,fill:'none','stroke-dasharray':'12 10','stroke-linecap':'round'}));
    if(editMode&&editTarget==='roads')addPathHandles(fp,'footpaths');
  }

  // Roads
  for(const road of ST.roads){
    const d=roadPath(road);
    svgEl.appendChild(mkEl('path',{d,stroke:'#C8860A','stroke-width':road.width+8,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));
    svgEl.appendChild(mkEl('path',{d,stroke:'#E6A800','stroke-width':road.width+4,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));
    svgEl.appendChild(mkEl('path',{d,stroke:road.color,'stroke-width':road.width,fill:'none','stroke-linecap':'round','stroke-linejoin':'round'}));
    if(road.showDashes)svgEl.appendChild(mkEl('path',{d,stroke:'white','stroke-width':2,fill:'none','stroke-dasharray':'22 14','stroke-linecap':'round',opacity:.7}));
    if(selRoad===road.id&&editMode)svgEl.appendChild(mkEl('path',{d,stroke:'#f59e0b','stroke-width':road.width+14,fill:'none','stroke-linecap':'round',opacity:.2}));
    if(editMode&&editTarget==='roads')addPathHandles(road,'roads');
  }

  // Junctions
  for(const j of ST.junctions){
    const isSel=selJunction===j.id;
    svgEl.appendChild(mkEl('circle',{cx:j.x,cy:j.y,r:28,fill:'#FDE68A',stroke:isSel?'#f59e0b':'#E6A800','stroke-width':3}));
    if(isSel)svgEl.appendChild(mkEl('circle',{cx:j.x,cy:j.y,r:32,fill:'none',stroke:'#f59e0b','stroke-width':2,'stroke-dasharray':'5 3'}));
    const h=mkEl('circle',{cx:j.x,cy:j.y,r:28,fill:'transparent',stroke:editMode?'#f59e0b':'transparent','stroke-width':editMode?1.5:0,cursor:editMode?'pointer':'default',opacity:.5});
    h.addEventListener('click',e=>{e.stopPropagation();if(!editMode)return;selJunction=selJunction===j.id?null:j.id;selIds.clear();selRoad=selPath=selPrim=null;renderAll()});
    h.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();showCtxMenu(e.clientX,e.clientY,[{icon:'ti-trash',label:'Delete Junction',danger:true,fn:()=>{snap();M.delJ(j.id);if(selJunction===j.id)selJunction=null;scheduleSave();renderAll()}}])});
    if(editMode&&editTarget==='roads'){
      h.addEventListener('mousedown',e=>{
        if(e.button!==0)return;e.stopPropagation();
        const mm=ev=>{const p=toCanvas(ev.clientX,ev.clientY);ST.junctions=ST.junctions.map(jj=>jj.id===j.id?{...jj,x:sv(p.x),y:sv(p.y)}:jj);renderSVG()};
        const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave()};
        window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
      });
    }
    svgEl.appendChild(h);
  }

  // Buildings (only update changed ones ideally — render all for correctness)
  for(const b of ST.buildings){
    const cx=b.x+b.width/2,cy=b.y+b.height/2;const isSel=selIds.has(b.id);const isGate=b.isGate||b.category==='Gate';
    const g=mkEl('g',{});
    if(b.rotation)g.setAttribute('transform',`rotate(${b.rotation} ${cx} ${cy})`);
    if(isSel)g.appendChild(mkEl('rect',{x:b.x-5,y:b.y-5,width:b.width+10,height:b.height+10,rx:6,fill:'none',stroke:'#f59e0b','stroke-width':2,'stroke-dasharray':'6 3',opacity:.9}));
    const shapeSVG=makeShapeEl(b,isSel);g.appendChild(shapeSVG);
    if(isGate){const bH=b.height*.55,bW=3.5;g.appendChild(mkEl('rect',{x:cx-b.width*.22-bW/2,y:cy-bH/2,width:bW,height:bH,fill:'#9CA3AF',rx:1}));g.appendChild(mkEl('rect',{x:cx+b.width*.22-bW/2,y:cy-bH/2,width:bW,height:bH,fill:'#9CA3AF',rx:1}));g.appendChild(mkEl('path',{d:`M ${b.x+4} ${cy} Q ${cx} ${b.y+2} ${b.x+b.width-4} ${cy}`,stroke:'#9CA3AF','stroke-width':2,fill:'none'}))}
    if(b.isFountain){const r2=Math.min(b.width,b.height)/4;g.appendChild(mkEl('circle',{cx,cy,r:r2,fill:'#7dd3fc',stroke:'#0ea5e9','stroke-width':1}));g.appendChild(mkEl('line',{x1:cx,y1:cy-r2,x2:cx,y2:cy-r2*2.2,stroke:'#7dd3fc','stroke-width':2}))}
    if(b.isTree){const r2=Math.min(b.width,b.height)/2,nr=r2*.55;g.appendChild(mkEl('circle',{cx,cy,r:nr,fill:'#d9f99d',stroke:'none'}));g.appendChild(mkEl('line',{x1:cx,y1:cy+nr,x2:cx,y2:b.y+b.height,stroke:'#92400e','stroke-width':2}))}
    if(showBuildingIcons&&!b.isTree&&!b.isGate&&!b.isFountain&&b.width>35&&b.height>30){
      const icon=BUILDING_ICONS[b.label];
      if(icon){const icSz=Math.min(b.width,b.height)*0.38;const ic=Math.max(10,Math.min(icSz,32));const dark=['#1F2937','#374151','#166534','#14532d'].includes(b.fillColor);const iColor=dark?'rgba(255,255,255,0.6)':'rgba(55,65,81,0.38)';const iconG=mkEl('g',{'transform':`translate(${cx-ic/2},${cy-ic*0.72}) scale(${ic/24})`,color:iColor,fill:'none',stroke:iColor,'stroke-width':1.8,'stroke-linecap':'round','stroke-linejoin':'round'});iconG.innerHTML=icon;g.appendChild(iconG)}
    }
    const fs=b.fontSize||9.5;
    if(b.label&&!b.isTree){
      const lines=b.label.split('\n').filter(Boolean);
      // Clamp font size to fit within shape bounds
      const maxW=b.width*0.85;
      const longestLine=lines.reduce((a,l)=>l.length>a.length?l:a,'');
      const clampedFs=Math.min(fs,maxW/(longestLine.length*0.55));
      const lh=clampedFs*1.3;
      const hasIcon=showBuildingIcons&&BUILDING_ICONS[b.label]&&!isGate&&!b.isFountain&&b.width>35&&b.height>30;
      const iconShift=hasIcon?Math.min(b.height*0.2,12):0;
      const baseY=isGate?cy+b.height*.3:cy+iconShift;
      const sy=baseY-(lines.length*lh)/2+lh*.5;
      lines.forEach((line,i)=>{
        const t=mkEl('text',{x:cx,y:sy+i*lh,'text-anchor':'middle','dominant-baseline':'middle','font-size':clampedFs,'font-family':"'Outfit',sans-serif",'font-weight':'700',fill:(isGate||b.fillColor==='#1F2937'||b.fillColor==='#374151')?'#F9FAFB':'#374151'});
        t.textContent=line;g.appendChild(t);
      });
    }
    if(isSel&&editMode&&editTarget==='buildings'&&selIds.size===1){
      g.appendChild(mkEl('line',{x1:cx,y1:b.y,x2:cx,y2:b.y-18,stroke:'#f59e0b','stroke-width':1.5,'stroke-dasharray':'3 2',opacity:.7}));
      const rh=mkEl('circle',{cx,cy:b.y-24,r:8,fill:'rgba(200,134,10,.2)',stroke:'#c8860a','stroke-width':1.5,cursor:'crosshair'});
      const rt=mkEl('text',{x:cx,y:b.y-23,'text-anchor':'middle','dominant-baseline':'middle','font-size':10,fill:'#e8c96a',style:'pointer-events:none'});rt.textContent='↻';
      rh.addEventListener('mousedown',ev=>{ev.stopPropagation();ev.preventDefault();const p=toCanvas(ev.clientX,ev.clientY);rotDrag={id:b.id,cx,cy,sa:Math.atan2(p.y-cy,p.x-cx)*180/Math.PI,or:b.rotation||0};snap()});
      g.appendChild(rh);g.appendChild(rt);
    }
    shapeSVG.style.cursor=(editMode&&editTarget==='buildings')?'move':'pointer';
    if(editMode&&editTarget==='buildings'){
      shapeSVG.addEventListener('mousedown',ev=>{
        ev.stopPropagation();
        const p=toCanvas(ev.clientX,ev.clientY);
        if(!ev.shiftKey&&!selIds.has(b.id))selIds.clear();
        selIds.add(b.id);selRoad=selPath=selPrim=selJunction=null;
        dragId=b.id;dragOff={x:p.x-b.x,y:p.y-b.y};
        if(selIds.size>1){multiDragOff={};selIds.forEach(id=>{const bb=ST.buildings.find(x=>x.id===id);if(bb)multiDragOff[id]={x:p.x-bb.x,y:p.y-bb.y}})}
        else multiDragOff=null;
        // Compute snap targets excluding self
        snapTargets=computeSnapTargets([...selIds]);
        snap();renderAll();
      });
      shapeSVG.addEventListener('contextmenu',ev=>{ev.preventDefault();ev.stopPropagation();showCtxMenu(ev.clientX,ev.clientY,[
        {icon:'ti-copy',label:'Duplicate',fn:doDup},
        {icon:'ti-clipboard',label:'Copy',fn:doCopy},
        {icon:'ti-arrow-bar-to-up',label:'Bring to Front',fn:()=>{snap();M.toFront(b.id);scheduleSave();renderAll()}},
        {icon:'ti-arrow-bar-to-down',label:'Send to Back',fn:()=>{snap();M.toBack(b.id);scheduleSave();renderAll()}},
        {icon:'ti-pencil',label:'Rename',fn:()=>startInlineEdit(b.id)},
        {icon:'ti-trash',label:'Delete',danger:true,fn:()=>{snap();M.del(new Set([b.id]));selIds.clear();scheduleSave();renderAll()}}
      ])});
      // Double-click = inline rename
      shapeSVG.addEventListener('dblclick',ev=>{ev.stopPropagation();startInlineEdit(b.id)});
    }else{
      shapeSVG.addEventListener('click',ev=>{ev.stopPropagation();if(ev.shiftKey)selIds.has(b.id)?selIds.delete(b.id):selIds.add(b.id);else{selIds.clear();selIds.add(b.id)}selRoad=selPath=selPrim=selJunction=null;renderAll()});
      shapeSVG.addEventListener('dblclick',ev=>{ev.stopPropagation();const r=canvasEl.getBoundingClientRect();zoom=Math.min(3,zoom+.5);panX=r.width/2-cx*zoom;panY=r.height/2-cy*zoom;applyTr()});
    }
    svgEl.appendChild(g);
  }

  // Primitives
  for(const p of(ST.primitives||[])){
    svgEl.appendChild(renderPrimitive(p,selPrim===p.id));
  }

  // Scale bar (in SVG canvas, draggable)
  const scaleG=mkEl('g',{});drawScaleBar(scaleG,ST.scaleBarPos.x,ST.scaleBarPos.y);svgEl.appendChild(scaleG);

  // Draw preview
  if(drawMode&&drawPts.length>0){
    let d=`M ${drawPts[0].x} ${drawPts[0].y}`;for(let i=1;i<drawPts.length;i++)d+=` L ${drawPts[i].x} ${drawPts[i].y}`;
    const col=drawType==='footpath'?'#10b981':'#f59e0b';
    svgEl.appendChild(mkEl('path',{d,stroke:col,'stroke-width':drawType==='footpath'?4:6,fill:'none','stroke-dasharray':'8 4','stroke-linecap':'round'}));
    drawPts.forEach(pt=>svgEl.appendChild(mkEl('circle',{cx:pt.x,cy:pt.y,r:5,fill:col,stroke:'white','stroke-width':1.5})));
    const last=drawPts[drawPts.length-1];
    svgEl.appendChild(mkEl('line',{x1:last.x,y1:last.y,x2:curPos.x,y2:curPos.y,stroke:col,'stroke-width':2,opacity:.4,'stroke-dasharray':'5 4'}));
  }
  if(snapOn&&editMode)svgEl.appendChild(mkEl('circle',{cx:sv(curPos.x),cy:sv(curPos.y),r:3,fill:'#f59e0b',opacity:.5}));

  updateStatus();
  if(svgStripOpen)document.getElementById('svg-strip-ta').value=buildSVG(false);
  if(showLayerPanel)renderLayerPanel();
}

function makeShapeEl(b,isSel){
  const cx=b.x+b.width/2,cy=b.y+b.height/2;
  const sw=isSel?2.5:1.5,sc=isSel?'#f59e0b':b.strokeColor;
  if(b.shape==='circle')return mkEl('circle',{cx,cy,r:Math.min(b.width,b.height)/2,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='ellipse')return mkEl('ellipse',{cx,cy,rx:b.width/2,ry:b.height/2,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='hexagon'){const r2=Math.min(b.width,b.height)/2;const pts=Array.from({length:6},(_,i)=>{const a=Math.PI/180*(60*i-30);return`${cx+r2*Math.cos(a)},${cy+r2*Math.sin(a)}`}).join(' ');return mkEl('polygon',{points:pts,fill:b.fillColor,stroke:sc,'stroke-width':sw})}
  if(b.shape==='diamond')return mkEl('polygon',{points:`${cx},${b.y} ${b.x+b.width},${cy} ${cx},${b.y+b.height} ${b.x},${cy}`,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='octagon'){const d2=Math.min(b.width,b.height)*.25;const pts=`${b.x+d2},${b.y} ${b.x+b.width-d2},${b.y} ${b.x+b.width},${b.y+d2} ${b.x+b.width},${b.y+b.height-d2} ${b.x+b.width-d2},${b.y+b.height} ${b.x+d2},${b.y+b.height} ${b.x},${b.y+b.height-d2} ${b.x},${b.y+d2}`;return mkEl('polygon',{points:pts,fill:b.fillColor,stroke:sc,'stroke-width':sw})}
  if(b.shape==='triangle')return mkEl('polygon',{points:`${cx},${b.y} ${b.x+b.width},${b.y+b.height} ${b.x},${b.y+b.height}`,fill:b.fillColor,stroke:sc,'stroke-width':sw});
  if(b.shape==='pentagon'){const pts=Array.from({length:5},(_,i)=>{const a=Math.PI/180*(72*i-90);return`${cx+(b.width/2)*Math.cos(a)},${cy+(b.height/2)*Math.sin(a)}`}).join(' ');return mkEl('polygon',{points:pts,fill:b.fillColor,stroke:sc,'stroke-width':sw})}
  return mkEl('rect',{x:b.x,y:b.y,width:b.width,height:b.height,rx:4,fill:b.fillColor,stroke:sc,'stroke-width':sw});
}

function addPathHandles(item,collection){
  const pts=[{key:'start',pos:item.start},...item.segments.flatMap((seg,i)=>{const r=[{key:`e${i}`,pos:seg.end}];if(seg.type==='C'){if(seg.cp1)r.push({key:`c${i}p1`,pos:seg.cp1,isH:true});if(seg.cp2)r.push({key:`c${i}p2`,pos:seg.cp2,isH:true})}return r})];
  pts.forEach(({key,pos,isH})=>{
    if(!pos)return;const isFP=collection==='footpaths';
    const c=mkEl('circle',{cx:pos.x,cy:pos.y,r:isH?4:6,fill:isH?(isFP?'#86efac':'#7dd3fc'):(isFP?'#10b981':'#f59e0b'),stroke:'white','stroke-width':1.5,cursor:'move'});
    c.addEventListener('mousedown',e=>{
      e.stopPropagation();
      if(collection==='roads')selRoad=item.id;else selPath=item.id;
      renderAll();
      const mm=ev=>{const p=toCanvas(ev.clientX,ev.clientY);const nx=sv(p.x),ny=sv(p.y);ST[collection]=ST[collection].map(r=>{if(r.id!==item.id)return r;if(key==='start')return{...r,start:{x:nx,y:ny}};if(key.startsWith('e')){const i2=parseInt(key.slice(1));return{...r,segments:r.segments.map((s,j)=>j===i2?{...s,end:{x:nx,y:ny}}:s)}}const m=key.match(/^c(\d+)(p[12])$/);if(m){const i2=parseInt(m[1]),h=m[2];return{...r,segments:r.segments.map((s,j)=>{if(j!==i2||s.type!=='C')return s;return h==='p1'?{...s,cp1:{x:nx,y:ny}}:{...s,cp2:{x:nx,y:ny}}})}}return r});renderSVG()};
      const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);scheduleSave()};
      window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
    });
    c.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();showCtxMenu(e.clientX,e.clientY,[{icon:'ti-trash',label:`Delete ${isFP?'Path':'Road'}`,danger:true,fn:()=>{snap();if(isFP){M.delFP(item.id);selPath=null}else{M.delR(item.id);selRoad=null}scheduleSave();renderAll()}}])});
    svgEl.appendChild(c);
  });
}

function updateStatus(){const el=document.getElementById('bb-status');if(el)el.textContent=`${ST.buildings.length} bldg · ${ST.roads.length} roads · ${(ST.footpaths||[]).length} paths · ${(ST.primitives||[]).length} shapes`}

// ─── INLINE RENAME ─────────────────────────────
function startInlineEdit(id){
  const b=ST.buildings.find(x=>x.id===id);if(!b)return;
  const existing=document.getElementById('inline-edit-input');if(existing)existing.remove();
  const cx=b.x+b.width/2,cy=b.y+b.height/2;
  const screenX=cx*zoom+panX,screenY=cy*zoom+panY;
  const inp=document.createElement('textarea');
  inp.id='inline-edit-input';inp.className='inline-edit';
  inp.value=(b.label||'').replace(/\\n/g,'\n');
  inp.rows=Math.max(1,(b.label||'').split('\n').length);
  inp.style.cssText=`left:${screenX}px;top:${screenY}px;transform:translate(-50%,-50%);width:${Math.max(100,b.width*zoom)}px;font-size:${Math.max(10,(b.fontSize||9.5)*zoom)}px`;
  canvasEl.appendChild(inp);
  inp.focus();inp.select();
  const finish=()=>{
    const val=inp.value.trim();inp.remove();
    if(val!==b.label){snap();M.upd(id,{label:val});scheduleSave();renderAll()}
  };
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();finish()}if(e.key==='Escape'){inp.remove()}});
  inp.addEventListener('blur',finish);
}

// ─── COPY / PASTE ──────────────────────────────
function doCopy(){
  if(!selIds.size)return;
  const items=[...selIds].map(id=>ST.buildings.find(b=>b.id===id)).filter(Boolean);
  clipboard=JSON.parse(JSON.stringify(items));
  // Persist to sessionStorage for same-tab cross-session
  try{sessionStorage.setItem('cmap-clipboard',JSON.stringify(clipboard))}catch(e){}
  toast(`Copied ${items.length} item${items.length>1?'s':''}`, 'green');
}
function doPaste(){
  // Try sessionStorage first
  if(!clipboard){try{const raw=sessionStorage.getItem('cmap-clipboard');if(raw)clipboard=JSON.parse(raw)}catch(e){}}
  if(!clipboard||!clipboard.length)return;
  snap();
  const newIds=new Set();
  clipboard.forEach(b=>{
    const nid=`${b.id}-paste-${Date.now()%100000}`;
    M.add({...JSON.parse(JSON.stringify(b)),id:nid,x:b.x+SNAP,y:b.y+SNAP});
    newIds.add(nid);
  });
  selIds=newIds;scheduleSave();renderAll();toast(`Pasted ${newIds.size} item${newIds.size>1?'s':''}`, 'green');
}

// ─── DRAW FINISH ───────────────────────────────
function finishDraw(){
  if(drawPts.length<2){drawMode=false;drawPts=[];renderAll();return}
  snap();const id=`${drawType}-${Date.now()%100000}`;
  if(drawType==='footpath'){
    ST.footpaths=[...ST.footpaths,{id,label:`Path ${(ST.footpaths||[]).length+1}`,start:drawPts[0],segments:drawPts.slice(1).map(p=>({type:'L',end:p})),color:'#D4B896',width:10,style:'solid'}];
    selPath=id;editTarget='roads';
  }else{
    ST.roads=[...ST.roads,{id,label:`Road ${ST.roads.length+1}`,start:drawPts[0],segments:drawPts.slice(1).map(p=>({type:'L',end:p})),color:'#FDE68A',width:44,showDashes:false}];
    selRoad=id;editTarget='roads';
  }
  drawMode=false;drawPts=[];scheduleSave();renderAll();
}
function cancelDraw(){drawMode=false;drawPts=[];renderAll()}

// ─── LAYER PANEL ───────────────────────────────
function toggleLayerPanel(){
  showLayerPanel=!showLayerPanel;
  const lp=document.getElementById('layer-panel');
  lp.classList.toggle('open',showLayerPanel);
  if(showLayerPanel)renderLayerPanel();
}
let layerDragSrc=null;
function renderLayerPanel(){
  const list=document.getElementById('layer-list');if(!list)return;
  list.innerHTML='';
  // Show in reverse order (top = highest z)
  const reversed=[...ST.buildings].reverse();
  reversed.forEach((b,i)=>{
    const isSel=selIds.has(b.id);
    const item=document.createElement('div');
    item.className='layer-item'+(isSel?' selected':'');
    item.draggable=true;
    item.dataset.id=b.id;
    const swatch=document.createElement('div');swatch.className='layer-swatch';swatch.style.background=b.fillColor;
    const name=document.createElement('span');name.style.cssText='flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';name.textContent=(b.label||b.id).replace(/\n/g,' ');
    const acts=document.createElement('div');acts.className='layer-actions';
    const upBtn=document.createElement('button');upBtn.className='layer-action-btn';upBtn.innerHTML='↑';upBtn.title='Forward';
    upBtn.onclick=e=>{e.stopPropagation();snap();M.fwd(b.id);scheduleSave();renderSVG();renderLayerPanel()};
    const dnBtn=document.createElement('button');dnBtn.className='layer-action-btn';dnBtn.innerHTML='↓';dnBtn.title='Backward';
    dnBtn.onclick=e=>{e.stopPropagation();snap();M.bwd(b.id);scheduleSave();renderSVG();renderLayerPanel()};
    acts.appendChild(upBtn);acts.appendChild(dnBtn);
    item.appendChild(swatch);item.appendChild(name);item.appendChild(acts);
    item.onclick=()=>{selIds=new Set([b.id]);selRoad=selPath=selPrim=selJunction=null;renderAll()};
    // Drag reorder
    item.addEventListener('dragstart',e=>{layerDragSrc=b.id;e.dataTransfer.effectAllowed='move'});
    item.addEventListener('dragover',e=>{e.preventDefault();item.style.background='rgba(200,134,10,.1)'});
    item.addEventListener('dragleave',()=>item.style.background='');
    item.addEventListener('drop',e=>{
      e.preventDefault();item.style.background='';
      if(!layerDragSrc||layerDragSrc===b.id)return;
      snap();
      const srcIdx=ST.buildings.findIndex(x=>x.id===layerDragSrc);
      const dstIdx=ST.buildings.findIndex(x=>x.id===b.id);
      if(srcIdx<0||dstIdx<0)return;
      const arr=[...ST.buildings];const [moved]=arr.splice(srcIdx,1);arr.splice(dstIdx,0,moved);ST.buildings=arr;
      layerDragSrc=null;scheduleSave();renderSVG();renderLayerPanel();
    });
    item.addEventListener('dragend',()=>layerDragSrc=null);
    list.appendChild(item);
  });
}

// ─── INTERACTION ───────────────────────────────
function initInteraction(){
  document.getElementById('zoom-in').onclick=()=>{zoom=Math.min(zoom*1.2,8);applyTr()};
  document.getElementById('zoom-out').onclick=()=>{zoom=Math.max(zoom/1.2,.1);applyTr()};
  document.getElementById('zoom-fit').onclick=fitView;

  canvasEl.addEventListener('wheel',e=>{
    e.preventDefault();
    if(e.ctrlKey||e.metaKey){const r=canvasEl.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;const oz=zoom;zoom=e.deltaY<0?Math.min(zoom*1.1,8):Math.max(zoom/1.1,.1);panX=mx-(mx-panX)*zoom/oz;panY=my-(my-panY)*zoom/oz}
    else{panX-=e.deltaX||0;panY-=e.deltaY||0}
    applyTr();
  },{passive:false});

  window.addEventListener('keydown',e=>{if(e.code==='Space'&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)){if(!spaceDown){spaceDown=true;canvasEl.classList.add('pan-mode')}e.preventDefault()}});
  window.addEventListener('keyup',e=>{if(e.code==='Space'){spaceDown=false;if(!isPanning)canvasEl.classList.remove('pan-mode')}});

  canvasEl.addEventListener('mousedown',e=>{
    if(e.button===1||(e.button===0&&(e.altKey||spaceDown))){isPanning=true;panStart={x:e.clientX,y:e.clientY};panOrig={x:panX,y:panY};canvasEl.classList.add('pan-mode');e.preventDefault();return}
    if(e.button===0&&editMode&&editTarget==='buildings'&&!drawMode&&e.target===svgEl){
      const pt=toCanvas(e.clientX,e.clientY);selBox={active:true,start:{...pt},cur:{...pt}};
      if(!e.shiftKey)selIds.clear();e.preventDefault();
    }
  });

  // Snap indicator element
  const snapInd=document.getElementById('snap-indicator');

  window.addEventListener('mousemove',e=>{
    const pt=toCanvas(e.clientX,e.clientY);
    curPos={x:Math.round(pt.x),y:Math.round(pt.y)};
    const coords=document.getElementById('coords');if(coords)coords.textContent=`x:${curPos.x} y:${curPos.y}`;

    if(isPanning){panX=panOrig.x+(e.clientX-panStart.x);panY=panOrig.y+(e.clientY-panStart.y);applyTr();return}
    if(selBox.active){
      selBox.cur={...pt};
      const sb=document.getElementById('sel-box');
      const minX=Math.min(selBox.start.x,pt.x),minY=Math.min(selBox.start.y,pt.y),maxX=Math.max(selBox.start.x,pt.x),maxY=Math.max(selBox.start.y,pt.y);
      sb.style.display='block';sb.style.left=(minX*zoom+panX)+'px';sb.style.top=(minY*zoom+panY)+'px';sb.style.width=((maxX-minX)*zoom)+'px';sb.style.height=((maxY-minY)*zoom)+'px';
      return;
    }
    if(rotDrag){const{cx,cy,sa,or}=rotDrag;const ang=Math.atan2(pt.y-cy,pt.x-cx)*180/Math.PI;let nr=or+(ang-sa);if(e.shiftKey)nr=Math.round(nr/15)*15;M.upd(rotDrag.id,{rotation:nr});renderSVG();return}
    if(compassDrag){ST.compassPos={x:Math.max(10,Math.min(MAP_W-80,Math.round(pt.x-compassDrag.ox))),y:Math.max(10,Math.min(MAP_H-80,Math.round(pt.y-compassDrag.oy)))};updateCompassOverlay();return}
    if(scaleBarDrag){ST.scaleBarPos={x:Math.max(10,Math.min(MAP_W-220,Math.round(pt.x-scaleBarDrag.ox))),y:Math.max(10,Math.min(MAP_H-50,Math.round(pt.y-scaleBarDrag.oy)))};renderSVG();return}

    if(dragId){
      const ids=[...selIds];
      let nx,ny;
      if(ids.length>1&&multiDragOff){
        const base=multiDragOff[dragId];const cur=ST.buildings.find(b=>b.id===dragId);
        nx=sv(pt.x-base.x);ny=sv(pt.y-base.y);
        const dx=nx-cur.x,dy=ny-cur.y;
        ST.buildings=ST.buildings.map(b=>{if(!ids.includes(b.id))return b;return{...b,x:Math.max(0,Math.min(b.x+dx,MAP_W-b.width)),y:Math.max(0,Math.min(b.y+dy,MAP_H-b.height))}});
        snapInd.style.display='none';activeSnap=null;
      }else{
        const b=ST.buildings.find(b=>b.id===dragId);
        nx=sv(pt.x-dragOff.x);ny=sv(pt.y-dragOff.y);
        // Building-to-building snap
        const sx2=findSnap(nx,'x',b.width,b.height);
        const sy2=findSnap(ny,'y',b.width,b.height);
        if(sx2){nx=sx2.snapV}
        if(sy2){ny=sy2.snapV}
        // Show snap indicator
        if(sx2||sy2){
          const dispX=nx*zoom+panX,dispY=ny*zoom+panY;
          snapInd.style.display='block';
          snapInd.style.left=dispX+'px';snapInd.style.top=dispY+'px';
          snapInd.style.width=(b.width*zoom)+'px';snapInd.style.height=(b.height*zoom)+'px';
          activeSnap={sx:sx2,sy:sy2};
        }else{snapInd.style.display='none';activeSnap=null}
        M.upd(dragId,{x:Math.max(0,Math.min(nx,MAP_W-b.width)),y:Math.max(0,Math.min(ny,MAP_H-b.height))});
      }
      renderSVG();
    }
    if(drawMode)renderSVG();
  });

  window.addEventListener('mouseup',e=>{
    if(isPanning){isPanning=false;if(!spaceDown)canvasEl.classList.remove('pan-mode')}
    if(selBox.active&&selBox.start&&selBox.cur){
      selBox.active=false;document.getElementById('sel-box').style.display='none';
      const minX=Math.min(selBox.start.x,selBox.cur.x),minY=Math.min(selBox.start.y,selBox.cur.y),maxX=Math.max(selBox.start.x,selBox.cur.x),maxY=Math.max(selBox.start.y,selBox.cur.y);
      if(maxX-minX>5||maxY-minY>5){ST.buildings.forEach(b=>{if(b.x+b.width>minX&&b.x<maxX&&b.y+b.height>minY&&b.y<maxY)selIds.add(b.id)});renderAll()}
      selBox={active:false,start:null,cur:null};
    }
    if(rotDrag){rotDrag=null;scheduleSave();renderAll()}
    if(dragId){dragId=null;multiDragOff=null;snapTargets=[];document.getElementById('snap-indicator').style.display='none';activeSnap=null;scheduleSave();renderAll()}
    if(compassDrag){compassDrag=null;scheduleSave()}
    if(scaleBarDrag){scaleBarDrag=null;scheduleSave()}
  });

  // ─── TOUCH SUPPORT (tap + drag) ─────────────────
  let touchDragId=null,touchDragOff={x:0,y:0},touchStart=null,touchMoved=false;
  canvasEl.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const t0=e.touches[0],t1=e.touches[1];
      pinch={dist:Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY),zoom,panX,panY,mx:(t0.clientX+t1.clientX)/2,my:(t0.clientY+t1.clientY)/2};
      return;
    }
    if(e.touches.length===1){
      const t=e.touches[0];
      touchStart={x:t.clientX,y:t.clientY};touchMoved=false;
      const pt=toCanvas(t.clientX,t.clientY);
      // Check if touching a building
      if(editMode&&editTarget==='buildings'){
        const hit=[...ST.buildings].reverse().find(b=>{
          const cx=b.x+b.width/2,cy=b.y+b.height/2;
          return pt.x>=b.x&&pt.x<=b.x+b.width&&pt.y>=b.y&&pt.y<=b.y+b.height;
        });
        if(hit){
          touchDragId=hit.id;touchDragOff={x:pt.x-hit.x,y:pt.y-hit.y};
          snapTargets=computeSnapTargets([hit.id]);
        }
      }
    }
  },{passive:false});

  canvasEl.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&pinch){
      e.preventDefault();
      const t0=e.touches[0],t1=e.touches[1];
      const nd=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
      const sc=nd/pinch.dist;const nz=Math.min(Math.max(pinch.zoom*sc,.1),8);
      const r=canvasEl.getBoundingClientRect();const mx=pinch.mx-r.left,my=pinch.my-r.top;
      panX=mx-(mx-pinch.panX)*nz/pinch.zoom;panY=my-(my-pinch.panY)*nz/pinch.zoom;zoom=nz;applyTr();return;
    }
    if(e.touches.length===1){
      e.preventDefault();
      const t=e.touches[0];
      const dx=t.clientX-(touchStart?.x||0),dy=t.clientY-(touchStart?.y||0);
      if(Math.abs(dx)>4||Math.abs(dy)>4)touchMoved=true;
      const pt=toCanvas(t.clientX,t.clientY);
      if(touchDragId&&touchMoved){
        const b=ST.buildings.find(b=>b.id===touchDragId);
        let nx=sv(pt.x-touchDragOff.x),ny=sv(pt.y-touchDragOff.y);
        const sx2=findSnap(nx,'x',b.width,b.height);const sy2=findSnap(ny,'y',b.width,b.height);
        if(sx2)nx=sx2.snapV;if(sy2)ny=sy2.snapV;
        M.upd(touchDragId,{x:Math.max(0,Math.min(nx,MAP_W-b.width)),y:Math.max(0,Math.min(ny,MAP_H-b.height))});
        renderSVG();
      }else if(!touchDragId&&touchMoved){
        // Pan
        panX+=t.clientX-(touchStart?.x||t.clientX);panY+=t.clientY-(touchStart?.y||t.clientY);
        touchStart={x:t.clientX,y:t.clientY};applyTr();
      }
    }
  },{passive:false});

  canvasEl.addEventListener('touchend',e=>{
    if(e.changedTouches.length===1&&!touchMoved&&touchDragId){
      // Tap = select
      selIds=new Set([touchDragId]);selRoad=selPath=selPrim=selJunction=null;renderAll();
    }else if(e.changedTouches.length===1&&!touchMoved&&!touchDragId){
      selIds.clear();selRoad=selPath=selPrim=selJunction=null;renderAll();
    }
    if(touchDragId){snap();scheduleSave();renderSVG()}
    touchDragId=null;touchMoved=false;touchStart=null;snapTargets=[];
    pinch=null;
  });

  // ─── KEYBOARD ──────────────────────────────────
  window.addEventListener('keydown',e=>{
    const tag=document.activeElement.tagName;if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;if(e.code==='Space')return;
    const ctrl=e.ctrlKey||e.metaKey;
    if(ctrl&&!e.shiftKey&&(e.key==='z'||e.key==='Z')){e.preventDefault();undo();return}
    if((ctrl&&(e.key==='y'||e.key==='Y'))||(ctrl&&e.shiftKey&&(e.key==='z'||e.key==='Z'))){e.preventDefault();redo();return}
    if(ctrl&&(e.key==='d'||e.key==='D')){e.preventDefault();doDup();return}
    if(ctrl&&(e.key==='c'||e.key==='C')){e.preventDefault();doCopy();return}
    if(ctrl&&(e.key==='v'||e.key==='V')){e.preventDefault();doPaste();return}
    if(ctrl&&(e.key==='a'||e.key==='A')&&editMode){e.preventDefault();ST.buildings.forEach(b=>selIds.add(b.id));renderAll();return}
    if(ctrl&&e.key===']'&&selIds.size===1){e.preventDefault();snap();M.fwd([...selIds][0]);scheduleSave();renderAll();return}
    if(ctrl&&e.key==='['&&selIds.size===1){e.preventDefault();snap();M.bwd([...selIds][0]);scheduleSave();renderAll();return}
    if(e.key==='Escape'){selIds.clear();selRoad=selPath=selPrim=selJunction=null;if(drawMode)cancelDraw();const ie=document.getElementById('inline-edit-input');if(ie)ie.remove();renderAll();return}
    if(e.key==='Delete'||e.key==='Backspace'){
      if(selIds.size){snap();M.del(selIds);selIds.clear();scheduleSave();renderAll()}
      if(selRoad){snap();M.delR(selRoad);selRoad=null;scheduleSave();renderAll()}
      if(selPath){snap();M.delFP(selPath);selPath=null;scheduleSave();renderAll()}
      if(selPrim){snap();M.delPrim(selPrim);selPrim=null;scheduleSave();renderAll()}
      if(selJunction){snap();M.delJ(selJunction);selJunction=null;scheduleSave();renderAll()}
      return;
    }
    // Draw mode: undo last point with Ctrl+Z while drawing
    if(e.key==='f'||e.key==='F'){fitView();return}
    if(e.key==='g'||e.key==='G'){showGrid=!showGrid;renderSVG();return}
    if(e.key==='s'&&!ctrl){snapOn=!snapOn;renderNav();return}
    if(e.key==='l'||e.key==='L'){showLegend=!showLegend;renderLegend();return}
    if(e.key==='i'||e.key==='I'){showBuildingIcons=!showBuildingIcons;renderSVG();renderLside();toast('Building icons '+(showBuildingIcons?'on':'off'));return}
    if(e.key==='?'||e.key==='/'){showHelp();return}
    if(e.key==='F2'&&selIds.size===1){e.preventDefault();startInlineEdit([...selIds][0]);return}
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)&&selIds.size){
      e.preventDefault();const d=e.shiftKey?SNAP:4;const dx=e.key==='ArrowLeft'?-d:e.key==='ArrowRight'?d:0;const dy=e.key==='ArrowUp'?-d:e.key==='ArrowDown'?d:0;
      ST.buildings=ST.buildings.map(b=>selIds.has(b.id)?{...b,x:Math.max(0,Math.min(b.x+dx,MAP_W-b.width)),y:Math.max(0,Math.min(b.y+dy,MAP_H-b.height))}:b);
      renderSVG();scheduleSave();
    }
  });
}

function doAlign(type){
  if(selIds.size<2)return;snap();const sel=ST.buildings.filter(b=>selIds.has(b.id));
  const minX=Math.min(...sel.map(b=>b.x)),maxX=Math.max(...sel.map(b=>b.x+b.width)),minY=Math.min(...sel.map(b=>b.y)),maxY=Math.max(...sel.map(b=>b.y+b.height));
  const cx=(minX+maxX)/2,cy=(minY+maxY)/2;
  ST.buildings=ST.buildings.map(b=>{if(!selIds.has(b.id))return b;if(type==='l')return{...b,x:minX};if(type==='r')return{...b,x:maxX-b.width};if(type==='cx')return{...b,x:cx-b.width/2};if(type==='t')return{...b,y:minY};if(type==='b')return{...b,y:maxY-b.height};if(type==='cy')return{...b,y:cy-b.height/2};return b});
  scheduleSave();renderSVG();
}

function importJSON(){

  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const s=d.ST||d.state||d;if(!s?.buildings)throw 0;snap();ST=s;if(!ST.footpaths)ST.footpaths=[];if(!ST.junctions)ST.junctions=[];if(!ST.primitives)ST.primitives=[];if(!ST.compassPos)ST.compassPos={x:MAP_W-90,y:70};if(!ST.scaleBarPos)ST.scaleBarPos={x:40,y:MAP_H-36};if(!ST.metersPerPixel)ST.metersPerPixel=2.5;ST.buildings=ST.buildings.map(b=>({fontSize:9.5,...b}));selIds.clear();selRoad=selPath=selPrim=selJunction=null;scheduleSave();renderAll();toast('Map imported','green')}catch{toast('Invalid file','red')}};r.readAsText(f)};inp.click();
}

function renderRside(){
  const rs=document.getElementById('rside');if(!rs)return;
  const arr=[...selIds];const b=arr.length===1?ST.buildings.find(x=>x.id===arr[0]):null;
  const road=ST.roads.find(x=>x.id===selRoad);const fp=(ST.footpaths||[]).find(x=>x.id===selPath);
  const prim=(ST.primitives||[]).find(x=>x.id===selPrim);const multi=arr.length>1;
  const junc=ST.junctions.find(j=>j.id===selJunction);

  if(!b&&!road&&!fp&&!multi&&!prim&&!junc){rs.style.display='none';return}
  rs.style.display='flex';rs.innerHTML='';

  if(junc){
    rs.appendChild(mkRsideHdr('Junction','',[{icon:'ti-trash',fn:()=>{snap();M.delJ(junc.id);selJunction=null;scheduleSave();renderAll()},title:'Delete junction',red:true}]));
    const sb=document.createElement('div');sb.className='rside-body';
    const tip=document.createElement('div');tip.style.cssText='background:rgba(200,134,10,.07);border:1px solid rgba(200,134,10,.2);border-left:3px solid #c8860a;border-radius:4px;padding:6px 9px;font-size:10px;color:#e8c96a';tip.textContent='Drag to reposition · Right-click or Del to delete';sb.appendChild(tip);
    addField(sb,'Position X',()=>{const i=document.createElement('input');i.type='number';i.className='finp';i.value=Math.round(junc.x);i.oninput=()=>{ST.junctions=ST.junctions.map(j=>j.id===junc.id?{...j,x:parseFloat(i.value)||0}:j);scheduleSave();renderSVG()};return i});
    addField(sb,'Position Y',()=>{const i=document.createElement('input');i.type='number';i.className='finp';i.value=Math.round(junc.y);i.oninput=()=>{ST.junctions=ST.junctions.map(j=>j.id===junc.id?{...j,y:parseFloat(i.value)||0}:j);scheduleSave();renderSVG()};return i});
    rs.appendChild(sb);return;
  }
  if(prim){renderPrimPanel(rs,prim);return}
  if(multi&&!b){
    const sh=mkRsideHdr(`${arr.length} selected`,null,[{icon:'ti-copy',fn:doDup,title:'Duplicate'},{icon:'ti-clipboard',fn:doCopy,title:'Copy'},{icon:'ti-trash',fn:()=>{snap();M.del(selIds);selIds.clear();scheduleSave();renderAll()},title:'Delete all',red:true}]);rs.appendChild(sh);
    const ab=document.createElement('div');ab.style.cssText='padding:8px 12px;border-bottom:1px solid var(--border-t);background:var(--bg-secondary)';
    const al=document.createElement('div');al.style.cssText='font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:5px';al.textContent='Align';ab.appendChild(al);
    const ar=document.createElement('div');ar.className='align-row';[['ti-layout-align-left','Left','l'],['ti-layout-align-center','Centre H','cx'],['ti-layout-align-right','Right','r'],['ti-layout-align-top','Top','t'],['ti-layout-align-middle','Centre V','cy'],['ti-layout-align-bottom','Bottom','b']].forEach(([ic,ti,ty])=>{const btn=document.createElement('button');btn.className='abtn';btn.title=ti;btn.innerHTML=`<i class="ti ${ic}"></i>`;btn.onclick=()=>doAlign(ty);ar.appendChild(btn)});ab.appendChild(ar);rs.appendChild(ab);
    const sb=document.createElement('div');sb.className='rside-body';addField(sb,'Fill all',()=>{const w=document.createElement('div');w.className='sw-grid';FILL_COLS.forEach(({l,v})=>{const s=document.createElement('button');s.className='sw';s.style.background=v;s.title=l;s.onclick=()=>{snap();ST.buildings=ST.buildings.map(b2=>selIds.has(b2.id)?{...b2,fillColor:v}:b2);scheduleSave();renderSVG()};w.appendChild(s)});return w});rs.appendChild(sb);return;
  }
  if(b){renderBuildingPanel(rs,b,editMode&&editTarget==='buildings');return}
  if(road)renderRoadPanel(rs,road,'roads');
  else if(fp)renderRoadPanel(rs,fp,'footpaths');
}

function initSearch(){
  const searchInp=document.getElementById('search-inp');const searchRes=document.getElementById('search-results');if(!searchInp)return;
  searchInp.addEventListener('input',()=>{
    const q=searchInp.value.trim().toLowerCase();if(!q){searchRes.style.display='none';return}
    const hits=ST.buildings.filter(b=>(b.label||'').toLowerCase().includes(q)||(b.category||'').toLowerCase().includes(q)||(b.notes||'').toLowerCase().includes(q));
    if(!hits.length){searchRes.style.display='none';return}
    searchRes.style.display='block';searchRes.innerHTML='';
    hits.slice(0,8).forEach(b=>{const it=document.createElement('div');it.className='sr-item';const cc=CAT_FILL[b.category]||'#E5E7EB';it.innerHTML=`<div style="width:9px;height:9px;border-radius:2px;background:${cc};flex-shrink:0"></div><span>${(b.label||'').replace(/\n/g,' ')}</span><span style="margin-left:auto;font-size:9px;color:var(--text-tertiary)">${b.category}</span>`;it.onclick=()=>{selIds.clear();selIds.add(b.id);const cx=b.x+b.width/2,cy=b.y+b.height/2;const r=canvasEl.getBoundingClientRect();zoom=2;panX=r.width/2-cx*zoom;panY=r.height/2-cy*zoom;applyTr();searchInp.value='';searchRes.style.display='none';renderAll()};searchRes.appendChild(it)});
  });
  document.addEventListener('click',e=>{if(!searchRes.contains(e.target)&&e.target!==searchInp)searchRes.style.display='none'});
}

document.addEventListener('DOMContentLoaded',()=>{
  try{
    canvasEl=document.getElementById('canvas-wrap');
    trRoot=document.getElementById('transform-root');
    svgEl=document.getElementById('map-svg');
    svgEl.setAttribute('width',MAP_W+60);svgEl.setAttribute('height',MAP_H+30);
    svgEl.style.display='block';svgEl.style.overflow='visible';

    svgEl.addEventListener('mousemove',()=>{if(drawMode)renderSVG()});
    svgEl.addEventListener('click',e=>{
      if(drawMode){const p=toCanvas(e.clientX,e.clientY);drawPts=[...drawPts,{x:sv(p.x),y:sv(p.y)}];renderSVG();renderNav();return}
      if(e.target===svgEl){selIds.clear();selRoad=selPath=selPrim=selJunction=null;renderAll()}
    });
    svgEl.addEventListener('contextmenu',e=>{if(e.target===svgEl)e.preventDefault()});

    document.getElementById('lside-tog').onclick=()=>{
      lsideCollapsed=!lsideCollapsed;
      const ls=document.getElementById('lside');
      ls.classList.toggle('collapsed',lsideCollapsed);
      document.getElementById('lside-title').style.display=lsideCollapsed?'none':'';
      document.getElementById('lside-tog').innerHTML=lsideCollapsed?'&#9654;':'&#9664;';
      renderLside();
    };

    initInteraction();initSearch();initSidebarDrag();load();
    renderCompassOverlay();
    renderAll();renderBottomBar();
    requestAnimationFrame(()=>setTimeout(fitView,200));

    const overlay=document.getElementById('loading-overlay');
    if(overlay){overlay.classList.add('hidden');setTimeout(()=>overlay.remove(),400)}
  }catch(err){
    console.error('Init error:',err);
    const overlay=document.getElementById('loading-overlay');
    if(overlay)overlay.innerHTML=`<div class="loading-inner"><p style="color:#fca5a5">Failed to load</p><small>${err.message}</small><button onclick="location.reload()" style="margin-top:12px;padding:6px 16px;background:#c8860a;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600">Retry</button></div>`;
  }
});
</script>
</body>
</html>
